let AC=null;
function getAC(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; }
function resetAC(){
  // Ferme l'AudioContext courant → termine TOUS les oscillateurs en vol
  if(AC){ try{ AC.close(); }catch(e){} AC=null; }
}
function tone(freq,dur,type='square',vol=0.25,delay=0){
  if(!G.sound) return;
  try{const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;o.frequency.value=freq;
    const t=a.currentTime+delay;g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}
}
function noise(dur,fc=800,vol=0.3){
  if(!G.sound)return;
  try{const a=getAC(),buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=a.createBufferSource();src.buffer=buf;
    const f=a.createBiquadFilter();f.type='bandpass';f.frequency.value=fc;
    const g=a.createGain();g.gain.value=vol;src.connect(f);f.connect(g);g.connect(a.destination);src.start();}catch(e){}
}

const TOKTOK_OVERLAY_MSGS = [
  '⚡ AUCUN PROF PEUT TE TOUCHER ⚡',
  '📱 ABONNÉS : ∞  |  COLLES : 0 📱',
  '🔥 KEVIN EST INTOUCHABLE 🔥',

function drawTokTokOverlay(){
  if(KV.tokTok <= 0) return;
  const prog = Math.max(0, KV.tokTok / 5); // 1→0
  const f = G.frame;
  const hue = (f * 5) % 360;

  // Franges rainbow sur les bords
  ctx.save();
  ctx.globalAlpha = 0.22 + Math.sin(f * 0.3) * 0.08;
  const grdT = ctx.createLinearGradient(0,0,W,0);
  grdT.addColorStop(0, `hsl(${hue},100%,55%)`);
  grdT.addColorStop(0.5, `hsl(${(hue+120)%360},100%,55%)`);
  grdT.addColorStop(1, `hsl(${(hue+240)%360},100%,55%)`);
  ctx.fillStyle = grdT;
  ctx.fillRect(0, 48, W, 6);
  ctx.fillRect(0, H-60, W, 6);
  ctx.restore();

  // Texte rotatif (change toutes les 2s ≈ 120 frames)
  const msgIdx = ~~(((5 - KV.tokTok) / 5 * TOKTOK_OVERLAY_MSGS.length)) % TOKTOK_OVERLAY_MSGS.length;
  const msg = TOKTOK_OVERLAY_MSGS[msgIdx];

  // Fond semi-opaque derrière le texte
  const pulse = 1 + Math.sin(f * 0.2) * 0.06;
  const sz = ~~(18 * pulse);
  ctx.save();
  ctx.globalAlpha = 0.55 + Math.sin(f * 0.25) * 0.1;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, H/2 - sz - 6, W, sz * 2 + 18);
  ctx.restore();

  // Texte rainbow géant
  ctx.save();
  ctx.font = `900 ${sz}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Ombre noire
  ctx.lineWidth = 5; ctx.strokeStyle = '#000';
  ctx.globalAlpha = 0.9;
  ctx.strokeText(msg, W/2, H/2);
  // Dégradé rainbow
  const grd = ctx.createLinearGradient(0, H/2 - sz, 0, H/2 + sz);
  grd.addColorStop(0,   `hsl(${hue},100%,65%)`);
  grd.addColorStop(0.33,`hsl(${(hue+90)%360},100%,65%)`);
  grd.addColorStop(0.66,`hsl(${(hue+180)%360},100%,65%)`);
  grd.addColorStop(1,   `hsl(${(hue+270)%360},100%,65%)`);
  ctx.fillStyle = grd;
  ctx.fillText(msg, W/2, H/2);
  ctx.restore();

  // Barre de progression invincibilité
  const bw = W * 0.55, bx = W/2 - bw/2, by = H/2 + sz + 8;
  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#111'; ctx.fillRect(bx - 2, by - 2, bw + 4, 10);
  const barG = ctx.createLinearGradient(bx, 0, bx + bw * prog, 0);
  barG.addColorStop(0, `hsl(${hue},100%,55%)`);
  barG.addColorStop(1, `hsl(${(hue+120)%360},100%,55%)`);
  ctx.fillStyle = barG; ctx.fillRect(bx, by, bw * prog, 6);
  ctx.restore();

  // Sparkles orbitaux
  const emojis = ['⭐','✨','💫','🔥','📱','💸'];
  ctx.save();
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  for(let i = 0; i < 6; i++){
    const a = f * 0.07 + i * 1.047;
    const rx = ~~(W/2 + Math.cos(a) * 260);
    const ry = ~~(H/2 + Math.sin(a) * 90);
    const es = ~~(13 + Math.sin(f * 0.2 + i) * 3);
    ctx.globalAlpha = 0.8 + Math.sin(f * 0.15 + i) * 0.2;
    ctx.font = `${es}px monospace`;
    ctx.fillStyle = `hsl(${(hue + i*60) % 360},100%,70%)`;
    ctx.fillText(emojis[i], rx, ry);
  }
  ctx.restore();
}

  if(_shoutTO){ clearTimeout(_shoutTO); _shoutTO=null; }

function _doShout(){
  _shoutTO=null;
  if(G.state!==ST.PLAY||!G.sound) return;
  // Choisir une phrase différente de la précédente
  let p;
  do { p=PROF_PHRASES[~~(Math.random()*PROF_PHRASES.length)]; } while(p===_lastPhrase);
  _lastPhrase=p;
  // Afficher en jeu
  spawnFT('😤 '+p, W/2, 30+Math.random()*30, '#ff2200', true);
  // Voix synthétique
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(p);
    u.lang='fr-FR'; u.rate=1.0+Math.random()*.5; u.pitch=0.6+Math.random()*.5; u.volume=0.7;
    window.speechSynthesis.speak(u);
  }
  // Prochain cri dans 6-10s
  _shoutTO=setTimeout(_doShout, 6000+Math.random()*4000);
}

// ── Text-to-Speech (voix prof en colère) ──
function speak(text){
  if(!G.sound||!window.speechSynthesis)return;
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='fr-FR'; u.pitch=1.5; u.rate=1.05; u.volume=0.85;
    // Cherche une voix française si dispo
    const voices=window.speechSynthesis.getVoices();
    const frVoice=voices.find(v=>v.lang.startsWith('fr'));
    if(frVoice) u.voice=frVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function overlap(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }

function resetKevin(){
  KV.x=80; KV.y=GND-48; KV.vx=0; KV.vy=0; KV.facing=1;
  KV.onGnd=false; KV.action='idle';
  KV.frame=0; KV.fTimer=0;
  KV.hp=KV.maxHp; KV.invincT=0;
  KV.atkTimer=0; KV.atkCooldown=0; KV.atkPhase=0; KV.deadTimer=0;
  KV.hasBaguette=false; KV.hasBrosse=false; KV.defonce=0;
  KV.hasBoulette=false; KV.bouletteT=0; KV.tokTok=0;
  KV.intox=0; KV.slip=0;
  KV.boulettes=0; KV.slowT=0;
  KV.hasChair=false;
}

function updateKevin(dt){
  if(KV.action==='dead'){ KV.deadTimer+=dt*60; return; }

  // Défoncé (fumée) — décompte + effets
  if(KV.defonce>0){
    KV.defonce-=dt;
    if(KV.defonce<0) KV.defonce=0;
    // Saut automatique aléatoire (panique)
    if(KV.onGnd&&Math.random()<0.007*dt*60){
      KV.vy=JUMP_FORCE*0.75; KV.onGnd=false;
    }
  }

  // Cooldowns
  if(KV.invincT>0) KV.invincT-=dt*60;
  if(KV.atkCooldown>0) KV.atkCooldown-=dt;
  if(KV.atkTimer>0){
    KV.atkTimer-=dt;
    // Phase 0=windup(0.35→0.22) | 1=swing+hitbox(0.22→0.08) | 2=recovery(0.08→0)
    if(KV.atkTimer>0.22)      KV.atkPhase=0;
    else if(KV.atkTimer>0.08) KV.atkPhase=1;
    else                       KV.atkPhase=2;
    if(KV.atkTimer<=0){ KV.atkTimer=0; KV.atkPhase=0; KV.atkCooldown=0.42; }
  }

  // Mouvement horizontal (contrôles inversés si défoncé)
  // Ralentissement formule physique (niveau 1)
  if(KV.slowT>0){ KV.vx*=Math.pow(0.5, dt*60); KV.slowT-=dt*60; if(KV.slowT<0) KV.slowT=0; }

  if(KV.action!=='hurt'){
    const inv=KV.defonce>0; // inversion gauche/droite
    const goLeft  = inv ? CTRL.right : CTRL.left;
    const goRight = inv ? CTRL.left  : CTRL.right;
    if(goLeft)  { KV.vx=Math.max(KV.vx-ACCEL*dt*60, -MAX_VX); KV.facing=-1; }
    if(goRight) { KV.vx=Math.min(KV.vx+ACCEL*dt*60,  MAX_VX); KV.facing=1;  }
    if(!goLeft&&!goRight) KV.vx*=Math.pow(FRIC, dt*60);
  } else {
    // Knockback en cours
    KV.vx *= Math.pow(0.85, dt*60);
    if(Math.abs(KV.vx)<0.1) KV.action='idle';
  }

  // Clamp monde
  const _wlimit = (G.level===1 && G.worldW) ? G.worldW : WORLD_W;
  KV.x = Math.max(0, Math.min(_wlimit-32, KV.x + KV.vx*dt*60));

  // Gravité
  KV.vy += GRAVITY*dt*60;
  KV.y  += KV.vy*dt*60;

  // Collision plateformes (PLATS ou PLATS_L3 selon le niveau)
  KV.onGnd=false;
  for(const p of currentPlats){
    if(resolveKvPlat(p)) break;
  }
  // Bagarres au sol — bloquent uniquement quand Kevin est près du sol
  resolveKvBlockers();

  // ── Coyote time ──
  if(KV.onGnd){ coyoteT=COYOTE_F; }
  else if(coyoteT>0){ coyoteT--; }
  // ── Jump buffer ──
  if(jumpBufT>0){ jumpBufT--; if(KV.onGnd||coyoteT>0) _execJump(); }
  // ── Variable jump height (relâcher = couper le saut) ──
  if(!jumpHeld&&KV.vy<0) KV.vy*=0.90;

  // Action
  if(KV.action!=='hurt'&&KV.action!=='attack'){
    if(!KV.onGnd)       KV.action = KV.vy<0?'jump':'fall';
    else if(Math.abs(KV.vx)>0.4) KV.action='run';
    else                KV.action='idle';
  }
  if(KV.atkTimer>0) KV.action='attack';

  // Frames animation
  KV.fTimer+=dt*60;
  if(KV.fTimer>=6){ KV.fTimer=0; KV.frame=(KV.frame+1)%4; }

  // Poussière
  if(KV.onGnd&&KV.action==='run'&&KV.frame%2===0)
    spawnDust(KV.x+8, KV.y+46);
}

function resolveKvPlat(p){
  if(p.destroyed) return false;
  const kl=KV.x+4, kr=KV.x+28, kfeet=KV.y+48;
  // Vérif chevauchement horizontal
  if(kr<=p.x||kl>=p.x+p.w) return false;
  if(p.ground){
    // Sol : clamp simple, pas besoin de vérifier prev
    if(kfeet>=p.y&&KV.vy>=0){
      KV.y=p.y-48; KV.vy=0; KV.onGnd=true; return true;
    }
  } else {
    // Plateforme flottante : atterrir uniquement en tombant, depuis le dessus
    // Tolérance 20px pour éviter le tunneling à haute vitesse
    if(KV.vy>=0&&kfeet>=p.y&&kfeet<=p.y+20){
      // Pupitres destructibles (niveau 1) — chute rapide
      if(G.level===1 && !p.ground && !p.destroyed && KV.vy>=6){
        p.destroyed=true;
        spawnBurst(KV.x+16, p.y, '#8B4513', 16);
        spawnFT('PUPITRE CASSÉ !', KV.x+16, p.y-20, '#c08040', true);
        for(const e of enemies){
          if(!e.on||e.state==='dead') continue;
          if(e.x+e.w>p.x && e.x<p.x+p.w && e.y+e.h>=p.y && e.y<p.y+p.h+120){
            e.hitT=60; e.stunned=(e.stunned||0)+2;
            spawnFT('ASSOMMÉ !', e.x+e.w/2, e.y-20, '#ffcc00');
          }
        }
        return false; // ne pas atterrir (pupitre détruit)
      }
      KV.y=p.y-48; KV.vy=0; KV.onGnd=true; return true;
    }
  }
  return false;
}

function resolveKvBlockers(){
  // N'obstrue que si Kevin est au niveau du sol (pas en l'air sur plateforme)
  if(KV.y < GND-80) return;
  for(const b of blockers){
    const kl=KV.x+4, kr=KV.x+28;
    if(kr>b.x+4 && kl<b.x+b.w-4){
      if(KV.vx>=0 && KV.x+16 < b.x+b.w/2){ KV.x=b.x+4-28; KV.vx=0; }
      else if(KV.vx<=0 && KV.x+16 >= b.x+b.w/2){ KV.x=b.x+b.w-4-4; KV.vx=0; }
    }
  }
}

function doAtk(){
  if(G.level===1){
    // Niveau 1 : lancer chaise si disponible, sinon boulette de papier
    if(KV.action==='dead') return;
    if(KV.hasChair){
      KV.hasChair=false;
      projectiles.push({
        x: KV.x + (KV.facing>0?32:0), y: KV.y+10,
        vx: KV.facing * 8, vy: -4,
        life: 160, chaise: true, angle: 0, avel: 0.18,

      });
      spawnFT('🪑 CHAISE LANCÉE !!!', KV.x+16, KV.y-50, '#ffcc00', true);
      return;
    }
    if(KV.boulettes<=0){ spawnFT('PLUS DE BOULETTES !',KV.x+16,KV.y-40,'#ff4400'); sfx.bonk&&sfx.bonk(); return; }
    if(KV.bouletteT>0) return;
    KV.boulettes--;
    KV.bouletteT=0.28;
    projectiles.push({
      x: KV.x + (KV.facing>0?32:0),
      y: KV.y + 10,
      vx: KV.facing * 7,
      vy: -1.5,
      life: 120,
      boulettePaper: true,
    });
    sfx.bonk&&sfx.bonk();
    return;
  }
  if(G.level===4){
    if(!KV.hasBrosse){ spawnFT('Trouve une brosse à chiottes !',KV.x+16,KV.y-40,C.LGRAY); return; }
  } else {
    if(!KV.hasBaguette){ spawnFT('Trouve une baguette !',KV.x+16,KV.y-40,C.LGRAY); return; }
  }
  if(KV.atkTimer>0||KV.atkCooldown>0||KV.action==='dead') return;
  KV.atkTimer=0.35; KV.atkPhase=1;
  sfx.croc();
}

function drawKevin(sx,sy){
  const x=~~sx, y=~~sy;
  const fl=KV.facing<0;

  ctx.save();
  // globalAlpha DANS le save/restore pour qu'il soit bien reset
  const blink=KV.invincT>0&&Math.floor(KV.invincT/5)%2===0;
  if(blink) ctx.globalAlpha=.35;

  if(fl){
    // Flip horizontal autour du centre du sprite (largeur 32px)
    // Après translate+scale, on dessine à (0,y) au lieu de (x,y)
    ctx.translate(x+32, 0);
    ctx.scale(-1, 1);
    _kevinBody(0, y, KV.frame, KV.action);
  } else {
    _kevinBody(x, y, KV.frame, KV.action);
  }

  ctx.restore(); // restaure aussi globalAlpha

  // Arme (hors save/restore, coords écran directes)
  if(KV.atkTimer>0){
    if(KV.hasBrosse)  _drawBrosse(x,y,KV.facing,KV.atkTimer);
    else if(KV.hasBaguette) _drawBaguette(x,y,KV.facing,KV.atkTimer);
  }
}

  if(atkTimer<=0) return;

  // Pivot = main droite de Kevin
  const hx = facing>0 ? kx+28 : kx+4;
  const hy = ky+20;

  // Progression 0→1 sur toute l'animation
  const prog = Math.max(0, Math.min(1, 1 - atkTimer/0.35));

  // Arc de balayage façon coup d'épée :
  // Droite : -120° (levé derrière) → +30° (étendu devant en bas)
  // Gauche : miroir
  const ARC_START = -Math.PI * 0.68; // levé haut-arrière
  const ARC_END   =  Math.PI * 0.18; // étendu bas-avant
  // Easing : lent au départ, ultra-rapide au milieu, ralentit en fin
  const ease = prog < 0.5
    ? 2 * prog * prog
    : 1 - Math.pow(-2*prog+2, 2)/2;
  const angle = ARC_START + (ARC_END - ARC_START) * ease;
  // Miroir si face gauche
  const finalAngle = facing>0 ? angle : Math.PI - angle;

  // ── Traînée motion-blur (3 fantômes) ──
  // uniquement pendant la phase de balayage rapide (prog 0.25→0.85)
  if(prog>0.25 && prog<0.85){
    for(let t=1;t<=3;t++){
      const tp = Math.max(0, prog - t*0.09);
      const te = tp<0.5 ? 2*tp*tp : 1-Math.pow(-2*tp+2,2)/2;
      const ta = ARC_START+(ARC_END-ARC_START)*te;
      const tfa = facing>0 ? ta : Math.PI-ta;
      ctx.save();
      ctx.globalAlpha=(4-t)*.08;
      ctx.translate(hx,hy); ctx.rotate(tfa);
      ctx.fillStyle=C.LBGE; ctx.fillRect(-3,-52,7,64);
      ctx.restore();
    }
  }

  // ── Baguette principale ──
  ctx.save();
  ctx.translate(hx,hy);
  ctx.rotate(finalAngle);
  // Corps
  ctx.fillStyle=C.BGUE; ctx.fillRect(-3,-52,8,65);
  ctx.fillStyle=C.LBGE; ctx.fillRect(-1,-50,4,61);
  // Entailles (grignées, c'est la cantine)
  ctx.fillStyle=C.BGUE;
  ctx.fillRect(-2,-40,7,2); ctx.fillRect(-2,-25,7,2); ctx.fillRect(-2,-10,7,2);
  // Pointe
  ctx.fillStyle=C.BGUE; ctx.fillRect(-2,-57,6,9);
  ctx.fillStyle=C.LBGE; ctx.fillRect(-1,-55,3,6);
  ctx.restore();
  ctx.globalAlpha=1;
}

// ═══ PIXEL ART - ENNEMIS ═══
function drawEnemy(e){
  if(!e.on) return;
  const sx=~~wx(e.x), sy=~~wy(e.y);
  if(sx<-e.def.w-10||sx>W+10) return;

  const fl=e.facing<0;

  ctx.save();
  // Flash DANS le save pour restauration automatique
  const flash=e.hitT>0&&Math.floor(e.hitT/3)%2===0;
  if(flash) ctx.globalAlpha=.4;

  if(fl){
    ctx.translate(sx+e.def.w, 0);
    ctx.scale(-1, 1);
    switch(e.type){
      case 'FOUI': _drawFouine(0,sy,e.frame); break;
      case 'CALC': _drawCalc(0,sy,e.frame);   break;
      case 'GROG': _drawGrog(0,sy);           break;
      case 'KEKE': _drawKeke(0,sy,e.frame);   break;
      case 'TONY': _drawTony(0,sy,e.frame);   break;
      case 'MBAT': _drawMbat(0,sy,e.frame);   break;
      case 'PION': _drawPion(0,sy,e.frame);   break;
      case 'DAME': _drawDame(0,sy,e.frame,e.facing);  break;
      case 'MALADE': _drawMalade(0,sy,e.frame);       break;
      case 'BAGARR': _drawBagarr(0,sy,e.frame,e.facing); break;
      case 'INTELLO': case 'INTELLO_S': case 'INTELLO_J':
        _drawIntelloEnemy(0,sy,e.frame,e); break;
      case 'INTELLO_D': _drawIntelloD(0,sy,e.frame,e); break;
      case 'INTELLO_GROS': _drawIntelloGros(0,sy,e.frame,e); break;
      case 'PHYSIK':  _drawPhysik(0,sy,e.frame,e);       break;
    }
  } else {
    switch(e.type){
      case 'FOUI': _drawFouine(sx,sy,e.frame); break;
      case 'CALC': _drawCalc(sx,sy,e.frame);   break;
      case 'GROG': _drawGrog(sx,sy);           break;
      case 'KEKE': _drawKeke(sx,sy,e.frame);   break;
      case 'TONY': _drawTony(sx,sy,e.frame);   break;
      case 'MBAT': _drawMbat(sx,sy,e.frame);   break;
      case 'PION': _drawPion(sx,sy,e.frame);   break;
      case 'DAME': _drawDame(sx,sy,e.frame,e.facing);  break;
      case 'MALADE': _drawMalade(sx,sy,e.frame);       break;
      case 'BAGARR': _drawBagarr(sx,sy,e.frame,e.facing); break;
      case 'INTELLO': case 'INTELLO_S': case 'INTELLO_J':
        _drawIntelloEnemy(sx,sy,e.frame,e); break;
      case 'INTELLO_D': _drawIntelloD(sx,sy,e.frame,e); break;
      case 'INTELLO_GROS': _drawIntelloGros(sx,sy,e.frame,e); break;
      case 'PHYSIK':  _drawPhysik(sx,sy,e.frame,e);       break;
    }
  }
  ctx.restore(); // restaure globalAlpha + transform

  // HP bar
  if(e.hp<e.def.hp&&e.hp>0){
    const bw=e.def.w, bx=sx, by=sy-10;
    r(bx,by,bw,5,C.DRED);
    r(bx,by,~~(bw*e.hp/e.def.hp),5,C.GREEN);
    rOut(bx,by,bw,5,'rgba(0,0,0,0)',C.BLACK);
  }

  // Nom
  ctx.font='bold 7px monospace'; ctx.textAlign='center';
  ctx.strokeStyle=C.BLACK; ctx.lineWidth=2;
  ctx.strokeText(e.def.name,sx+e.def.w/2,sy-12);
  ctx.fillStyle=C.WHITE; ctx.fillText(e.def.name,sx+e.def.w/2,sy-12);

  // Phrase — bulle lisible au-dessus du nom
  if(e.phraseT>0){
    const al=Math.min(1,e.phraseT/30);
    const tx=sx+e.def.w/2, ty=sy-30;
    ctx.globalAlpha=al;
    // Fond bulle
    ctx.font='bold 10px monospace';
    const tw=ctx.measureText(e.def.phrase).width;
    r(tx-tw/2-4,ty-12,tw+8,16,'rgba(0,0,0,.75)');
    // Texte
    ctx.textAlign='center';
    ctx.fillStyle=e.type==='FOUI'||e.type==='CALC'||e.type==='GROG'?C.ORANGE:C.NEON;
    ctx.fillText(e.def.phrase,tx,ty);
    ctx.globalAlpha=1;
  }
}

function _drawBrosse(kx,ky,facing,atkTimer){

  const hx=facing>0?kx+28:kx+4, hy=ky+20;

  const ARC_START=-Math.PI*0.68, ARC_END=Math.PI*0.18;
  const ease=prog<0.5?2*prog*prog:1-Math.pow(-2*prog+2,2)/2;
  const angle=ARC_START+(ARC_END-ARC_START)*ease;
  const finalAngle=facing>0?angle:Math.PI-angle;
  ctx.save();
  ctx.translate(hx,hy); ctx.rotate(finalAngle);
  // Manche bois
  r(-3,-50,6,58,'#c08040'); r(-1,-48,3,54,'#d09050');

// ── Fumeurs + nuages toxiques ──
function updateSmokeItems(dt){
  const F=dt*60;
  for(const s of smokeItems){
    s.frame+=F;
    s.puffT-=dt;
    if(s.puffT<=0){
      s.puffT=0.7+Math.random()*0.6;
      s.clouds.push({
        x:s.x+(Math.random()*16-8),
        y:s.y-8,
        vx:(Math.random()-.5)*0.35,
        vy:-0.28-Math.random()*0.3,
        r:10, maxR:26+Math.random()*12,
        life:1, decay:0.0035+Math.random()*0.003,
      });
    }
    for(let i=s.clouds.length-1;i>=0;i--){
      const c=s.clouds[i];
      c.x+=c.vx*F; c.y+=c.vy*F;
      c.r=Math.min(c.r+0.12*F, c.maxR);
      c.life-=c.decay*F;
      if(c.life<=0){ s.clouds.splice(i,1); continue; }
      // Collision Kevin (coordonnées monde)
      if(KV.action!=='dead'&&KV.defonce<=0){
        const dxw=KV.x+16-c.x, dyw=KV.y+24-c.y;
        if(Math.sqrt(dxw*dxw+dyw*dyw)<c.r+14){
          KV.defonce=3.2;
          spawnFT('DÉFONCÉ... 🌿',KV.x+16,KV.y-50,'#60dd60',true);
          if(G.sound){ tone(220,.2,'sawtooth',.25); tone(165,.4,'triangle',.18,.1); }
        }
      }
    }
  }
}

function drawBlockers(){
  for(const b of blockers){
    const sx=~~wx(b.x);
    if(sx>W+b.w+20||sx<-b.w-20) continue;
    // ── COUPLE QUI S'EMBRASSE (niveau 3) ──
    if(b.couple){
      const gy2=GND-52, f=b.frame;
      const bx1=sx+8, bx2=sx+b.w-36;
      // Corps
      r(bx1,   gy2+14,18,24,'#e05030'); r(bx2,gy2+14,18,24,'#cc4488');
      // Têtes
      r(bx1+2, gy2,   14,14,C.SKIN);   r(bx2+2,gy2,   14,14,C.SKIN);
      r(bx1,   gy2-4, 16, 6,C.DBROWN); r(bx2,  gy2-4, 16, 6,C.YELLOW);
      // Yeux fermés (bisous !)
      r(bx1+4, gy2+4,  6,2,'#70402a'); r(bx2+4,gy2+4,  6,2,'#70402a');
      // Bras enlacés
      r(bx1+16,gy2+14,14,8,C.SKIN);   r(bx2-4, gy2+14,14,8,C.SKIN);
      // Jambes
      r(bx1+2, gy2+38, 6,14,C.BLUE);  r(bx1+10,gy2+38, 6,14,C.BLUE);
      r(bx2+2, gy2+38, 6,14,'#603080');r(bx2+10,gy2+38, 6,14,'#603080');
      // Cœurs flottants
      const ht=~~(Math.sin(f*1.4)*5);
      ctx.font='14px monospace'; ctx.textAlign='center'; ctx.fillStyle=C.RED;
      ctx.globalAlpha=.92; ctx.fillText('❤',sx+b.w/2,gy2-16+ht);
      ctx.font='10px monospace'; ctx.globalAlpha=.72;
      ctx.fillText('❤',sx+b.w/2-12,gy2-6+~~(ht*.5));
      ctx.fillText('❤',sx+b.w/2+12,gy2-6+~~(ht*.5));
      ctx.globalAlpha=1;
      // Label
      ctx.font='bold 11px monospace'; ctx.textAlign='center';
      ctx.lineWidth=3; ctx.strokeStyle=C.BLACK;
      ctx.strokeText('💋 CÂLIN 💋',sx+b.w/2,gy2-30);
      ctx.fillStyle=C.PINK; ctx.fillText('💋 CÂLIN 💋',sx+b.w/2,gy2-30);
      // Bordure rose pulsée
      const pp=Math.sin(f*1.2)*.2+.22;
      ctx.globalAlpha=pp;
      ctx.strokeStyle=C.PINK; ctx.lineWidth=2;
      ctx.strokeRect(sx,gy2-34,b.w,84);
      ctx.globalAlpha=1;
      continue; // ne pas tomber dans le code bagarre
    }

    // ── BAGARRE (niveau 2) ──
    const gy2=GND-44;
    const f=b.frame;
    const n=3, sw=~~(b.w/n);

    // Nuages de fumée/poussière de bagarre (fond, avant les persos)
    for(let c=0;c<5;c++){
      const ca=f*.07+c*1.26;
      const cx=sx+b.w*.2+c*(b.w*.15)+Math.sin(ca)*8;
      const cy=gy2+12+Math.cos(ca*.7)*10;
      const cr=10+Math.sin(ca+c)*.5*6+c*2;
      const al=Math.sin(ca*.8)*.22+0.28;
      ctx.globalAlpha=al;
      ctx.fillStyle=`rgba(220,220,220,1)`;
      ctx.beginPath(); ctx.arc(~~cx,~~cy,~~cr,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // Personnages
    for(let i=0;i<n;i++){
      const ex=sx+i*sw+6, ey=gy2;
      const t=f*.10+i*2.1;
      const arm=~~(Math.sin(t)*10);
      const bob=~~(Math.abs(Math.sin(t))*4);
      const c1=['#e05030','#30a050','#3050e0'][i%3];
      const hc=[C.DBROWN,C.DGRAY,C.YELLOW][i%3];
      // Corps
      r(ex+2,ey+14-bob,16,22,c1);
      // Tête (bouge vers le haut à l'impact)
      r(ex+4,ey+2-bob,12,13,C.SKIN);
      r(ex+3,ey-2-bob,14,6,hc);
      // Yeux (colère)
      r(ex+6,ey+5-bob,3,2,C.BLACK); r(ex+11,ey+5-bob,3,2,C.BLACK);
      // Bras — swing énergique
      r(ex-6+arm, ey+14,7,13,C.SKIN);
      r(ex+13-arm,ey+14,7,13,C.SKIN);
      // Poings
      r(ex-8+arm, ey+25,7,7,C.DSKIN);
      r(ex+13-arm,ey+25,7,7,C.DSKIN);
      // Jambes écartées
      r(ex+3, ey+36,7,14,C.BLUE); r(ex+12,ey+36,7,14,C.BLUE);
      r(ex+1, ey+48,9, 5,C.BLACK); r(ex+12,ey+48,9, 5,C.BLACK);

      // Étoiles/impacts aux poings
      if(~~(t*2.5)%4===0){
        ctx.font='13px monospace'; ctx.textAlign='center';
        ctx.globalAlpha=.95;
        const starCols=[C.YELLOW,C.RED,C.WHITE];
        ctx.fillStyle=starCols[~~(t)%3];
        ctx.fillText('★',ex+9+arm,ey+20-bob);
        ctx.globalAlpha=1;
      }
      if(~~(t*2)%5===0){
        ctx.font='11px monospace'; ctx.textAlign='center'; ctx.fillStyle=C.ORANGE;
        ctx.globalAlpha=.85; ctx.fillText('💥',ex+9-arm,ey+18); ctx.globalAlpha=1;
      }
    }

    // Label BAGARRE! — gros, visible, avec outline
    ctx.font='bold 15px monospace'; ctx.textAlign='center';
    ctx.lineWidth=4; ctx.strokeStyle=C.BLACK;
    ctx.strokeText('⚡ BAGARRE ! ⚡',sx+b.w/2,gy2-12);
    ctx.fillStyle=~~(f*.08)%2===0?C.RED:C.YELLOW;
    ctx.fillText('⚡ BAGARRE ! ⚡',sx+b.w/2,gy2-12);

    // Flash orange autour de la zone
    const pulse=Math.sin(f*.15)*.3+.25;
    ctx.globalAlpha=pulse;
    ctx.strokeStyle=C.ORANGE; ctx.lineWidth=3;
    ctx.strokeRect(sx,gy2-16,b.w,66);
    ctx.globalAlpha=1;
  }
}

  ctx.strokeText(t,0,0);
  ctx.fillStyle=c; ctx.fillText(t,0,0);
  ctx.shadowBlur=0;
  ctx.restore();
}

function triggerKillFlash(e){
  const isN3 = G.level===4; // seulement toilettes = brosse words
  const isImportant = BATMAN_IMPORTANT.has(e.type);
  const doFreeze = isImportant && Math.random()<0.33;
  const words = isN3 ? BATMAN_WORDS_N3 : BATMAN_WORDS_N2;
  const quips = isN3 ? BATMAN_QUIPS_N3 : BATMAN_QUIPS_N2;
  const dur = doFreeze ? (120+~~(Math.random()*60)) : 50; // frames
  killFlash = {
    word: words[~~(Math.random()*words.length)],
    quip: quips[~~(Math.random()*quips.length)],
    col:  BATMAN_COLS[~~(Math.random()*BATMAN_COLS.length)],
    col2: BATMAN_COLS[~~(Math.random()*BATMAN_COLS.length)],
    timer: dur, maxTimer: dur,
    freeze: doFreeze,
    enemyType: e.type,
    angle: (Math.random()-0.5)*0.18,
    sx: ~~wx(e.x+e.w/2), sy: ~~(e.y+e.h/2), // screen pos at kill moment
  };
  if(doFreeze) speak(killFlash.quip);
}

function drawKillFlash(){
  if(!killFlash) return;
  const t = killFlash.timer, mt = killFlash.maxTimer;
  const progress = t/mt; // 1→0 as it expires
  const fadeIn  = Math.min(1, (mt-t)/(mt*0.15));  // fast fade-in
  const fadeOut = Math.min(1, t/(mt*0.25));         // fade out at end

  // Full-screen freeze overlay (portrait)
  if(killFlash.freeze){
    // Dark overlay
    ctx.save();
    ctx.globalAlpha = Math.min(0.82, fadeIn*0.82);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0,0,W,H);
    ctx.restore();

    // Scanlines effect
    ctx.save();
    ctx.globalAlpha = Math.min(0.15, fadeIn*0.15);
    for(let y=0;y<H;y+=4){
      ctx.fillStyle='#000';
      ctx.fillRect(0,y,W,2);
    }
    ctx.restore();

    // Giant pixelated enemy portrait (center screen)
    const shake = t<10 ? (Math.random()-0.5)*8 : 0;
    const wiggle = Math.sin(G.frame*0.5)*6*(progress*0.7+0.3);
    const px = W/2 + shake + wiggle*0.5;
    const py = H/2 - 20 + shake*0.5;
    drawBatmanPortrait(killFlash.enemyType, px, py, progress, G.frame);

    // Freeze quip text
    const qa = fadeIn*fadeOut;
    if(qa>0.05){
      ctx.save();
      ctx.globalAlpha = qa;
      ctx.textAlign = 'center';
      const qsize = Math.min(22, 14+Math.floor(fadeIn*8));
      ctx.font = `bold ${qsize}px monospace`;
      ctx.lineWidth = 5; ctx.strokeStyle = '#000';
      ctx.strokeText(killFlash.quip, W/2, H-38);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(killFlash.quip, W/2, H-38);
      ctx.restore();
    }
  }

  // Batman WORD — always shown
  const wordAlpha = fadeIn * (killFlash.freeze ? 1 : fadeOut);
  if(wordAlpha>0.04){
    const pulse = killFlash.freeze ? 1 : (1+Math.sin(G.frame*0.35)*0.1);
    const baseSize = killFlash.freeze ? 96 : 72;
    const sz = ~~(baseSize * pulse * (0.6+fadeIn*0.4));
    const wx2 = killFlash.freeze ? W/2 : Math.min(Math.max(killFlash.sx, sz/2+10), W-sz/2-10);
    const wy  = killFlash.freeze ? H/2-90 : Math.max(killFlash.sy-60, sz/2+10);

    ctx.save();
    ctx.globalAlpha = wordAlpha;
    ctx.translate(wx2, wy);
    ctx.rotate(killFlash.angle);

    // Shadow / outline
    ctx.font = `900 ${sz}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Thick black outline
    ctx.lineWidth = sz*0.12;
    ctx.strokeStyle = '#000000';
    ctx.strokeText(killFlash.word, 0, 0);

    // Secondary color (offset)
    ctx.fillStyle = killFlash.col2;
    ctx.fillText(killFlash.word, sz*0.04, sz*0.04);

    // Main color
    ctx.fillStyle = killFlash.col;
    ctx.fillText(killFlash.word, 0, 0);

    // White highlight
    ctx.globalAlpha = wordAlpha*0.5;
    ctx.fillStyle = '#ffffff';
    ctx.font = `900 ${~~(sz*0.9)}px monospace`;
    ctx.fillText(killFlash.word, 0, 0);

    ctx.restore();
  }

  // Small quip (non-freeze mode)
  if(!killFlash.freeze){
    const qa = fadeIn*fadeOut;
    if(qa>0.05){
      ctx.save();
      ctx.globalAlpha = qa;
      ctx.textAlign='center';
      ctx.font=`bold 14px monospace`;
      const qx = Math.min(Math.max(killFlash.sx, 80), W-80);
      const qy = Math.max(killFlash.sy-120, 20);
      ctx.lineWidth=4; ctx.strokeStyle='#000';
      ctx.strokeText(killFlash.quip, qx, qy);
      ctx.fillStyle=killFlash.col;
      ctx.fillText(killFlash.quip, qx, qy);
      ctx.restore();
    }
  }
}

function drawBatmanPortrait(type, cx, cy, progress, frame){
  // Pixelated oversized dying prof portrait
  const s = 5; // pixel scale (each "pixel" = 5px)
  const wigX = Math.sin(frame*0.6)*s*2;
  const wigY = Math.cos(frame*0.4)*s*1.5;

  ctx.save();
  ctx.imageSmoothingEnabled = false;

  const P = (px,py,pw,ph,col,alpha)=>{
    ctx.globalAlpha = (alpha||1)*Math.min(1, (1-progress)*4+0.4);
    ctx.fillStyle=col;
    ctx.fillRect(~~(cx+px*s+wigX),~~(cy+py*s+wigY),pw*s,ph*s);
  };

  // Face / corps selon type
  if(type==='FOUI'||type==='CALC'){
    // Prof classique (tête ronde, costume)
    P(-4,-14,8,8,C.SKIN);     // tête
    P(-2,-16,4,3,'#605030');  // cheveux
    P(-4,-7,8,12,'#334488');  // corps
    P(-6,-5,3,10,'#334488');  // bras G
    P(3,-5,3,10,'#334488');   // bras D
    P(-3,5,3,8,'#223');       // jambe G
    P(0,5,3,8,'#223');        // jambe D
    P(-3,-12,2,3,C.WHITE);    // oeil G
    P(1,-12,2,3,C.WHITE);     // oeil D
    P(-2,-11,2,2,'#000');     // pupille G (spirale mort)
    P(1,-11,2,2,'#000');      // pupille D
    P(-3,-11,6,1,'#000');     // sourcils froncés
    P(-2,-9,4,1,C.RED);       // bouche ouverte (cri)
    // Baguette dans la tête
    const bagAngle = Math.sin(frame*0.8)*0.3+0.1;
    ctx.save();
    ctx.translate(cx+wigX, cy+(-16)*s+wigY);
    ctx.rotate(bagAngle);
    ctx.globalAlpha = Math.min(1,(1-progress)*4+0.4);
    ctx.fillStyle=C.BGUE; ctx.fillRect(-s,-8*s,s*2,s*10);
    ctx.fillStyle=C.LBGE; ctx.fillRect(0,-8*s,s,s*10);
    ctx.fillStyle=C.YELLOW; ctx.fillRect(-s,-9*s,s*2,s*2); // pain de mie qui dépasse
    ctx.restore();
    // Étoiles de mort autour de la tête
    for(let i=0;i<5;i++){
      const a = frame*0.15+i*1.257;
      const sr = (7+i)*s;
      const sx2=cx+Math.cos(a)*sr+wigX, sy2=cy+(-10)*s+Math.sin(a)*sr*0.6+wigY;
      ctx.globalAlpha=0.9*Math.min(1,(1-progress)*4+0.4);
      ctx.fillStyle=['#ff0','#f80','#f00','#ff0','#fff'][i];
      ctx.fillRect(~~sx2,~~sy2,s*2,s*2);
    }
  } else if(type==='GROG'){
    // Grogneur / videur costaud
    P(-5,-12,10,9,C.SKIN);    // grosse tête
    P(-5,-14,10,4,'#111');    // crâne rasé
    P(-6,-6,12,14,'#553322'); // corps massif
    P(-9,-5,4,12,'#553322');  // bras G
    P(5,-5,4,12,'#553322');   // bras D
    P(-4,8,4,10,'#223');      // jambe G
    P(0,8,4,10,'#223');       // jambe D
    P(-3,-10,3,3,C.WHITE);    P(0,-10,3,3,C.WHITE); // yeux
    P(-2,-9,3,3,'#000');      P(1,-9,3,3,'#000');   // pupilles X
    // X sur les yeux
    ctx.globalAlpha=0.9; ctx.fillStyle='#f00';
    P(-3,-11,6,1,'#f00'); P(-3,-8,1,4,'#f00'); P(2,-8,1,4,'#f00');
    P(-2,-9,4,1,C.RED);   // bouche criante
    // Baguette dans le crâne
    const ba2=Math.sin(frame*0.9)*0.4;
    ctx.save(); ctx.translate(cx+wigX,cy+(-14)*s+wigY); ctx.rotate(ba2);
    ctx.globalAlpha=Math.min(1,(1-progress)*4+0.4);
    ctx.fillStyle=C.BGUE; ctx.fillRect(-s,-9*s,s*2,s*12);
    ctx.fillStyle=C.LBGE; ctx.fillRect(0,-9*s,s,s*12);
    ctx.restore();
  } else if(type==='PION'){
    // Pion / surveillant
    P(-3,-12,7,8,C.SKIN);     // tête
    P(-3,-14,7,3,'#664422');  // cheveux
    P(-4,-6,8,11,'#336644');  // corps (veste verte)
    P(-2,-9,4,2,'#fff');      // chemise
    P(-5,-5,2,9,'#336644');   // bras G
    P(3,-5,2,9,'#336644');    // bras D
    P(-3,5,3,8,'#112');       // jambe G
    P(0,5,3,8,'#112');        // jambe D
    P(-2,-10,2,2,C.WHITE); P(1,-10,2,2,C.WHITE);  // yeux
    P(-1,-9,2,2,'#000');  P(1,-9,2,2,'#000');     // pupilles
    P(-2,-8,4,1,'#f00');      // bouche
    // Baguette
    const ba3=Math.sin(frame*0.7)*0.35-0.2;
    ctx.save(); ctx.translate(cx+wigX,cy+(-12)*s+wigY); ctx.rotate(ba3);
    ctx.globalAlpha=Math.min(1,(1-progress)*4+0.4);
    ctx.fillStyle=C.BGUE; ctx.fillRect(-s,-8*s,s*2,s*9);
    ctx.fillStyle=C.LBGE; ctx.fillRect(0,-8*s,s,s*9);
    ctx.restore();
  } else if(type==='TONY'){
    // Tony / élève problemat
    P(-3,-11,7,8,'#d0a070');  // tête
    P(-3,-13,7,3,'#111');     // capuche
    P(-4,-5,8,10,'#333');     // hoodie
    P(-5,-4,2,8,'#333');  P(3,-4,2,8,'#333');  // bras
    P(-3,5,3,7,'#223');   P(0,5,3,7,'#223');   // jambes
    P(-2,-9,2,2,C.WHITE); P(1,-9,2,2,C.WHITE); // yeux
    P(-1,-8,2,2,'#000');  P(1,-8,2,2,'#000');  // pupilles
    P(-2,-7,4,1,'#f00');  // bouche
    // Baguette
    const ba4=Math.sin(frame*1.1)*0.4;
    ctx.save(); ctx.translate(cx+wigX,cy+(-13)*s+wigY); ctx.rotate(ba4);
    ctx.globalAlpha=Math.min(1,(1-progress)*4+0.4);
    ctx.fillStyle=C.BGUE; ctx.fillRect(-s,-7*s,s*2,s*9);
    ctx.fillStyle=C.LBGE; ctx.fillRect(0,-7*s,s,s*9);
    ctx.restore();
  } else {
    // fallback générique
    P(-3,-10,7,8,C.SKIN);
    P(-4,-6,8,11,'#445566');
    P(-2,-8,2,2,C.WHITE); P(1,-8,2,2,C.WHITE);
    P(-1,-7,2,2,'#000');  P(1,-7,2,2,'#000');
    P(-2,-6,4,1,'#f00');
  }

  ctx.restore();
}

function drawBiteBonus(){
  if(!_biteBonus||_biteBonus.timer<=0) return;
  const t=_biteBonus.timer, mt=_biteBonus.maxTimer;
  const fadeIn  = Math.min(1,(mt-t)/(mt*0.12));
  const fadeOut = Math.min(1, t/(mt*0.3));
  const alpha   = fadeIn * fadeOut;
  if(alpha<0.03){ _biteBonus=null; return; }

  const pulse = 1 + Math.sin(G.frame*0.6)*0.08;
  const sz    = ~~(74 * pulse * (0.5+fadeIn*0.5));

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(W/2, H/2 - 40);
  ctx.rotate(_biteBonus.angle);

  // Étoile de fond (jaune-orange)
  ctx.beginPath();
  for(let i=0;i<14;i++){
    const a=i*Math.PI/7, ri=i%2===0?(sz+22):(sz*0.45);
    i===0 ? ctx.moveTo(Math.cos(a)*ri, Math.sin(a)*ri)
          : ctx.lineTo(Math.cos(a)*ri, Math.sin(a)*ri);
  }
  ctx.closePath();
  ctx.fillStyle='#ff8800'; ctx.fill();
  ctx.fillStyle='#ffdd00';
  ctx.beginPath();
  for(let i=0;i<14;i++){
    const a=i*Math.PI/7, ri=i%2===0?(sz+10):(sz*0.38);
    i===0 ? ctx.moveTo(Math.cos(a)*ri, Math.sin(a)*ri)
          : ctx.lineTo(Math.cos(a)*ri, Math.sin(a)*ri);
  }
  ctx.closePath(); ctx.fill();

  // Texte "BONUS BITE !!!"
  ctx.font=`900 ${sz}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineWidth=6; ctx.strokeStyle='#000';
  ctx.strokeText('BONUS',0,-sz*0.52);
  ctx.strokeText('BITE !!!',0, sz*0.1);

  const grd=ctx.createLinearGradient(0,-sz,0,sz);
  grd.addColorStop(0,'#ff4444'); grd.addColorStop(0.5,'#ff0066'); grd.addColorStop(1,'#ff2200');
  ctx.fillStyle=grd;
  ctx.fillText('BONUS',0,-sz*0.52);
  ctx.fillText('BITE !!!',0, sz*0.1);

  // Sous-titre "+2000 PTS"
  ctx.font=`bold ${~~(sz*0.3)}px monospace`;

  ctx.strokeText('+2000 PTS',0, sz*0.72);
  ctx.fillStyle='#ffffff';
  ctx.fillText('+2000 PTS',0, sz*0.72);

  ctx.restore();
}

// ═══ UPDATE ENNEMIS ═══
function updateEnemies(dt){
  for(const e of enemies){
    if(!e.on) continue;
    if(e.state==='dead'){
      e.deadT+=dt*60;
      e.y+=dt*60*2; // tombe
      if(e.deadT>60){ e.on=false; } continue;
    }
    if(e.hitT>0) e.hitT-=dt*60;
    if(e.state==='hurt'){ e.x+=e.vx*dt*60; e.hitT-=0; if(e.hitT<=0) e.state='patrol'; }

    // Y sinusoïdal pour les volantes (avant le reste)
    if(e.def.flying){
      e.y = e.baseY + Math.sin(Date.now()/480 + e.phaseOff)*16;
    }

    const dist=Math.abs(e.x+e.def.w/2 - KV.x-16);
    // IA
    if(dist < e.def.sight && e.state!=='hurt'){
      e.state='chase';
      e.phraseT=Math.max(e.phraseT,70);
    } else if(dist>e.def.sight*1.3 && e.state==='chase'){
      e.state='patrol';
    }
    if(e.state==='patrol'){
      e.x+=e.vx*dt*60;
      if(e.x<=e.patrolL||e.x>=e.patrolR){ e.vx*=-1; }
    } else if(e.state==='chase'){
      const dir=KV.x<e.x?-1:1;
      e.vx=e.def.spd*1.2*dir;
      e.x+=e.vx*dt*60;
    }
    e.facing = e.vx<0?-1:1;
    e.frame+=dt*60;
    if(e.phraseT>0) e.phraseT-=dt*60;

    // Calcul lance équation / Pion lance serpillère
    if(e.type==='CALC'&&e.state==='chase'){
      e.projTimer+=dt;
      if(e.projTimer>3){ e.projTimer=0; spawnProj(e.x+e.w/2,e.y+20); }
    }
    if(e.type==='PION'&&e.state==='chase'){
      e.projTimer+=dt;
      if(e.projTimer>3.5){ e.projTimer=0; spawnMopProj(e.x+e.w/2,e.y+22); }
    }
    // Dame de cantine lance purée
    if(e.type==='DAME'){
      e.projTimer+=dt;
      if(e.projTimer>2.5&&Math.abs(KV.x-e.x)<300){
        e.projTimer=0;
        spawnPureeProj(e.x+e.w/2, e.y+18);
        const ph=DAME_PHRASES[~~(Math.random()*DAME_PHRASES.length)];
        spawnFT(ph, e.x+e.w/2, e.y-20, '#f0e060', true);
        speak(ph);
      }
    }
    // Gamin malade vomit par intermittence
    if(e.type==='MALADE'){
      e.projTimer+=dt;
      if(e.projTimer>3.5+Math.random()*2){
        e.projTimer=0;
        spawnVomitProj(e.x+e.w/2, e.y+8);
        spawnFT('🤢', e.x+e.w/2, e.y-16, '#90c040');
      }
      // MALADE ne se déplace pas
      e.vx=0;
    }
    // INTELLO (tous types) — phrases + saut + tir
    if(e.type==='INTELLO'||e.type==='INTELLO_S'||e.type==='INTELLO_J'||e.type==='INTELLO_GROS'||e.type==='INTELLO_D'){
      // Étranglé : ne bouge pas
      if(e.strangled>0){ e.strangled-=dt; continue; }
      // Stunned : ralentissement
      if(e.stunned>0){ e.stunned-=dt; e.vx*=0.6; }
      // Panic : fuite rapide
      if(e.panic>0){
        e.panic-=dt;
        e.vx=(e.panicDir||1)*e.def.spd*2.5;
        e.x+=e.vx*dt*60;
        e.state='patrol';
        e.phraseT=Math.max(e.phraseT||0, 60);
        if(e.phraseT>0 && G.frame%45===0){
          spawnFT(['AU SECOURS !','COURS !!!','MAMAN !!!'][~~(Math.random()*3)], e.x+e.w/2, e.y-20, '#ff8800');
        }
        e.facing=e.vx<0?-1:1;
        e.frame+=dt*60;
        continue;
      }
      // Délation quand Kevin approche
      if(e.state==='patrol' && dist < e.def.sight && !e.delated){
        e.delated=true;
        e.delationCooldown=12;
        const delatPhrase=['MADAME, IL Y A KEVIN QUI S\'ÉCHAPPE !!!',
          'MONSIEUR, KEVIN FUIT !!!','MADAME MADAME IL S\'EN VA !!!',
          'AU SECOURS KEVIN PARTE !!!'][~~(Math.random()*4)];
        spawnFT(delatPhrase, e.x+e.w/2, e.y-30, '#ff4400', true);
        for(const ph of enemies){
          if(ph.on && ph.type==='PHYSIK' && Math.abs(ph.x-e.x)<300){
            ph.projTimer=Math.max(ph.projTimer||0, 1.5);
            ph.alerted=2;
          }
        }
      }
      if(e.delationCooldown>0) e.delationCooldown-=dt;
      if(e.delationCooldown<=0) e.delated=false;
      if(e.state==='chase'){
        // Phrase
        if(e.intelloPhraseT===undefined) e.intelloPhraseT=0;
        e.intelloPhraseT-=dt;
        if(e.intelloPhraseT<=0){
          e.intelloPhraseT=2.5+Math.random()*2;
          const ph=INTELLO_PHRASES[~~(Math.random()*INTELLO_PHRASES.length)];
          spawnFT(ph, e.x+e.w/2, e.y-22, '#ffee00', false);
        }
      }
      // Gravité sur les sauteurs (et obèses aussi)
      if(e.def.jumper||e.type==='INTELLO_GROS'){
        if(e.vy===undefined){ e.vy=0; e.onGnd=true; }
        e.vy+=0.4*dt*60; // gravité légère ennemi
        e.y+=e.vy*dt*60;
        // Collision sol
        if(e.y>=GND-e.h){ e.y=GND-e.h; e.vy=0; e.onGnd=true; }
        // Collision plateformes (pupitres)
        for(const p of currentPlats){
          if(p.ground||p.destroyed) continue;
          const eL=e.x+4, eR=e.x+e.w-4, eFeet=e.y+e.h;
          if(eR>p.x&&eL<p.x+p.w&&e.vy>=0&&eFeet>=p.y&&eFeet<=p.y+18){
            e.y=p.y-e.h; e.vy=0; e.onGnd=true; break;
          }
        }
      }
      // INTELLO_J : saute vers Kevin s'il est en hauteur
      if(e.type==='INTELLO_J'&&e.state==='chase'){
        if(e.vy===undefined){ e.vy=0; e.onGnd=true; }
        if(e.onGnd&&KV.y<e.y-30&&e.vy===0){
          e.vy=-10; e.onGnd=false; // saut vers Kevin
        }
      }
      // INTELLO_S : lance projectile varié
      if(e.type==='INTELLO_S'){
        if(e.projTimer===undefined) e.projTimer=1+Math.random()*2;
        if(e.state==='chase'||Math.abs(KV.x-e.x)<200){
          e.projTimer-=dt;
          if(e.projTimer<=0){
            e.projTimer=2.5+Math.random()*1.5;
            const dir=KV.x<e.x?-1:1;
            const rng=Math.random();
            if(rng<0.5){
              projectiles.push({x:e.x+e.w/2, y:e.y+14, vx:dir*4.5, vy:-1, life:100, boulettePaper:true, fromEnemy:true});
              spawnFT('📄', e.x+e.w/2, e.y-10, '#ffcc00');
            } else if(rng<0.8){
              projectiles.push({x:e.x+e.w/2, y:e.y+14, vx:dir*2.5, vy:0, life:140, gomme:true, fromEnemy:true, bounces:1, angle:0});
              spawnFT('GOMME !', e.x+e.w/2, e.y-10, '#ff99cc');
            } else {
              projectiles.push({x:e.x+e.w/2, y:e.y+14, vx:dir*9, vy:0, life:80, stylo:true, fromEnemy:true, inkTrail:[]});
              spawnFT('STYLO !', e.x+e.w/2, e.y-10, '#4466ff');
            }
          }
        }
      }
    }
    // PHYSIK — lance un nuage de formule + étrangle les intellos
    if(e.type==='PHYSIK'){
      // Étranglement
      if(!e.strangleTimer) e.strangleTimer=10+Math.random()*10;
      e.strangleTimer-=dt;
      if(e.strangleTimer<=0 && !e.strangling){
        const victim=enemies.find(en=>en.on && !en.strangled &&
          (en.type==='INTELLO'||en.type==='INTELLO_J'||en.type==='INTELLO_S') &&
          Math.abs(en.x-e.x)<90 && en.state!=='dead');
        if(victim){
          e.strangling=3.0; e.strangleVictim=victim;
          victim.strangled=3.0; victim.vx=0;
          e.strangleTimer=15+Math.random()*10;
          spawnFT("ÇA NE VA JAMAIS RENTRER DANS TA TÊTE DE PIAF !", e.x+e.w/2, e.y-35, '#ff4400', true);
        } else {
          e.strangleTimer=5+Math.random()*5;
        }
      }
      if(e.strangling>0){
        e.strangling-=dt;
        e.projTimer=99; // ne tire pas pendant l'étranglement
        if(e.strangleVictim){
          e.strangleVictim.x+=Math.sin(G.frame*0.8)*1.2;
          if(G.frame%40===0) spawnFT('🫠', e.strangleVictim.x+14, e.strangleVictim.y-10, '#aaffaa');
        }
        if(e.strangling<=0 && e.strangleVictim){
          e.strangleVictim.strangled=0;
          e.strangleVictim=null;
        }
      }
      if(e.strangling<=0){
        e.projTimer=(e.projTimer||0)+dt;
        const interval=2.0+Math.random()*1.0;
        if(e.projTimer>interval&&Math.abs(KV.x-e.x)<320){
          e.projTimer=0;
          spawnFormulaCloud(e.x+e.w/2, e.y+20);
          const ph=PHYSIK_PHRASES[~~(Math.random()*PHYSIK_PHRASES.length)];
          spawnFT(ph, e.x+e.w/2, e.y-20, '#88ff44', true);
        }
      }
    }
    // FOUI boss (niveau 1 uniquement) — phase 2 : livres tombants
    if(e.type==='FOUI'&&G.level===1){
      if(e.bossPhase===undefined){
        e.bossPhase=1;
        e.bodyguardsSpawned=false;
        e.bookTimer=0;
        e.chargeTimer=0;
      }
      // Phase 2 : HP ≤ 5
      if(e.hp<=5&&e.bossPhase===1){
        e.bossPhase=2;
        spawnFT('PHASE 2 ! LIVRES EN CHUTE !', e.x+e.w/2, e.y-40, C.RED, true);
      }
      if(e.bossPhase===2){
        e.bookTimer+=dt;
        if(e.bookTimer>1.8){
          e.bookTimer=0;
          const bx=KV.x+(Math.random()-0.5)*120;
          projectiles.push({x:bx, y:0, vx:0, vy:4, life:180, bookFall:true});
        }
      }
      // Formule toutes les 80 frames environ
      e.projTimer+=dt;
      if(e.projTimer>1.35&&Math.abs(KV.x-e.x)<350){
        e.projTimer=0;
        spawnFormulaCloud(e.x+e.w/2, e.y+20);
      }
    }

    // Gamin bagarreur lance bouffe
    if(e.type==='BAGARR'){
      e.projTimer+=dt;
      if(e.projTimer>1.8+Math.random()*1.5&&Math.abs(KV.x-e.x)<350){
        e.projTimer=0;
        spawnBouffe(e.x+e.w/2, e.y+10);
        spawnFT(['MANGE ÇA !','PREND ÇA !','BOUFFE!'][~~(Math.random()*3)], e.x, e.y-16, C.ORANGE);
      }
    }

    // Collision baguette de Kevin
    const bgHB=getBaguetteHB();
    if(bgHB&&e.state!=='hurt'&&e.hitT<=0){
      const eHB={x:e.x,y:e.y,w:e.w,h:e.h};
      if(overlap(bgHB,eHB)){
        hitEnemy(e);
      }
    }
    // Collision corps Kevin
    if(e.state!=='dead'){
      const kh=kvHB();
      const eh={x:e.x+4,y:e.y+4,w:e.w-8,h:e.h-8};
      if(overlap(kh,eh)) hurtKevin(e.x+e.w/2, e.type);
    }
  }
  // Projectiles (coordonnées MONDE)
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    // Les nuages de formule ne subissent pas la gravité
    if(!p.formulaCloud && !p.bookFall && !p.gomme && !p.stylo && !p.chaise) p.vy+=.12*dt*60;
    // Chaise : gravité normale
    if(p.chaise) p.vy+=.14*dt*60;
    p.x+=p.vx*dt*60; p.y+=p.vy*dt*60; p.life-=dt*60;
    if(p.mop) p.angle=(p.angle||0)+p.avel*dt*60; // rotation serpillère
    const _pw=(G.level===1&&G.worldW)?G.worldW:WORLD_W;
    if(p.life<=0||p.x<-50||p.x>_pw+50){ projectiles.splice(i,1); continue; }
    // bookFall : tombe verticalement, disparaît au sol
    if(p.bookFall && p.y>=GND){ projectiles.splice(i,1); continue; }
    // Chaise : disparaît au sol
    if(p.chaise && p.y>=GND){ projectiles.splice(i,1); continue; }

    // Gomme : rebond + rotation
    if(p.gomme){
      p.angle=(p.angle||0)+0.12*dt*60*(p.vx>0?1:-1);
      if(p.bounces>0){
        for(const pl of currentPlats){
          if(pl.destroyed) continue;
          if(p.x>pl.x&&p.x<pl.x+pl.w&&p.y>=pl.y&&p.y<=pl.y+16&&p.vy>0){
            p.vy*=-0.6; p.bounces--; break;
          }
        }
        if(p.y>=GND){ p.vy*=-0.5; p.bounces--; }
      }
      p.vy+=0.1*dt*60; // gravité légère sur la gomme
    }

    // Stylo : traînée d'encre
    if(p.stylo&&p.inkTrail){
      if(!p._trailTimer) p._trailTimer=0;
      p._trailTimer-=dt;
      if(p._trailTimer<=0){
        p.inkTrail.push({x:p.x, y:p.y});
        if(p.inkTrail.length>8) p.inkTrail.shift();
        p._trailTimer=0.05;
      }
    }

    // Boulette papier — hit enemy (sauf si tirée par un ennemi)
    if(p.boulettePaper && !p.fromEnemy){
      let hitE=false;
      for(const e of enemies){
        if(e.state==='dead'||!e.on) continue;
        if(p.x>e.x+2&&p.x<e.x+e.w-2&&p.y>e.y+2&&p.y<e.y+e.h-2){
          hitEnemy(e);
          // Intello mort lâche boulettes
          if(e.hp<=0&&(e.type==='INTELLO'||e.type==='INTELLO_S'||e.type==='INTELLO_J'||e.type==='INTELLO_GROS'||e.type==='INTELLO_D')){
            bouletteItems.push({on:true,x:e.x,y:GND-14,glowT:0,count:3,classroomDrop:true});
          }
          projectiles.splice(i,1); hitE=true; break;
        }
      }
      if(hitE) continue;
    }

    // Chaise — traverse plusieurs ennemis
    if(p.chaise){
      for(const e of enemies){
        if(e.state==='dead'||!e.on) continue;
        if(p.x>e.x+2&&p.x<e.x+e.w-2&&p.y>e.y+2&&p.y<e.y+e.h-2){
          hitEnemy(e);
          if(e.hp<=0&&(e.type==='INTELLO'||e.type==='INTELLO_S'||e.type==='INTELLO_J'||e.type==='INTELLO_GROS'||e.type==='INTELLO_D')){
            bouletteItems.push({on:true,x:e.x,y:GND-14,glowT:0,count:3,classroomDrop:true});
          }
          p.hits=(p.hits||0)+1;
          if(p.hits>=(p.maxHits||3)){ projectiles.splice(i,1); break; }
        }
      }
      if(i>=projectiles.length||projectiles[i]!==p) continue;
    }

    if(KV.invincT<=0&&KV.action!=='dead'){
      const kb=kvHB();
      // formulaCloud — collision sphérique
      if(p.formulaCloud){
        if(Math.abs(p.x-(kb.x+13))<28&&Math.abs(p.y-(kb.y+22))<28){
          projectiles.splice(i,1);
          hurtKevin(p.x, 'PHYSIK');
          KV.slowT=60;
          spawnFT('TROP NUL EN PHYSIQUE !',KV.x+16,KV.y-50,'#88ff44',true);
        }
        continue;
      }
      // bookFall — collision avec Kevin
      if(p.bookFall){
        if(p.x>kb.x&&p.x<kb.x+kb.w&&p.y>kb.y&&p.y<kb.y+kb.h){
          projectiles.splice(i,1);
          hurtKevin(p.x, 'FOUI');
          spawnFT('UN LIVRE SUR LA TETE !',KV.x+16,KV.y-50,C.BROWN,true);
        }
        continue;
      }
      // Boulette ENNEMIE touche Kevin
      if(p.boulettePaper&&p.fromEnemy&&p.x>kb.x&&p.x<kb.x+kb.w&&p.y>kb.y&&p.y<kb.y+kb.h){
        projectiles.splice(i,1);
        hurtKevin(p.x,'INTELLO_S');
        spawnFT('📄 DANS LA TÊTE !',KV.x+16,KV.y-44,'#ffcc00',true);
        continue;
      }
      // Gomme touche Kevin
      if(p.gomme&&p.fromEnemy&&p.x>kb.x&&p.x<kb.x+kb.w&&p.y>kb.y&&p.y<kb.y+kb.h){
        projectiles.splice(i,1);
        hurtKevin(p.x,'INTELLO_S');
        spawnFT('💢 GOMME !',KV.x+16,KV.y-44,'#ff99cc',true);
        continue;
      }
      // Stylo touche Kevin
      if(p.stylo&&p.fromEnemy&&p.x>kb.x&&p.x<kb.x+kb.w&&p.y>kb.y&&p.y<kb.y+kb.h){
        projectiles.splice(i,1);
        hurtKevin(p.x,'INTELLO_S');
        spawnFT('✒️ STYLO DANS L\'ŒIL !',KV.x+16,KV.y-44,'#4466ff',true);
        continue;
      }
      if(p.x>kb.x&&p.x<kb.x+kb.w&&p.y>kb.y&&p.y<kb.y+kb.h){
        const killer = p.mop?'PION': p.puree?'DAME': p.vomit?'MALADE': p.bouffe?'BAGARR':'CALC';
        projectiles.splice(i,1);
        hurtKevin(p.x, killer);
        if((p.puree||p.vomit||p.bouffe) && KV.tokTok<=0 && Math.random()<0.65) startIntox();
      }
    }
  }
}

function spawnProj(worldX, wy2){
  const dir=KV.x<worldX?-1:1;
  const fm=CALC_FORMULAS[~~(Math.random()*CALC_FORMULAS.length)];
  projectiles.push({x:worldX, y:wy2, vx:dir*2.5, vy:-4, life:120, formula:fm.txt, col:fm.col});
}
function spawnMopProj(worldX, wy2){
  const dir=KV.x<worldX?-1:1;
  projectiles.push({x:worldX, y:wy2, vx:dir*3.2, vy:-3.5, life:110, mop:true, angle:0, avel:dir*0.2});
}
function spawnPureeProj(worldX, wy2){
  const dir=KV.x<worldX?-1:1;
  projectiles.push({x:worldX, y:wy2, vx:dir*2.2, vy:-3.5, life:130, puree:true, splat:0});
}
function spawnVomitProj(worldX, wy2){
  // arc vers le haut
  const dir=(Math.random()<0.5)?-1:1;
  projectiles.push({x:worldX, y:wy2, vx:dir*1.8, vy:-6, life:100, vomit:true});
}
function spawnBouffe(worldX, wy2){
  const dir=KV.x<worldX?-1:1;
  projectiles.push({x:worldX, y:wy2, vx:dir*3.5, vy:-5+Math.random()*2, life:90, bouffe:true});
}
function spawnFormulaCloud(worldX, wy2){
  const dir=KV.x<worldX?-1:1;
  const formulaTexts=['E=mc²','F=ma','PV=nRT','ΔE=hf','∇²ψ=0','a²+b²=c²'];
  projectiles.push({
    x:worldX, y:wy2,
    vx:dir*1.5, vy:0,
    life:200, formulaCloud:true,
    formulaText:formulaTexts[~~(Math.random()*formulaTexts.length)],
    alpha:0.7,
  });
}

function hitEnemy(e){
  e.hp--;
  e.hitT=18;
  sfx.bonk();
  spawnBurst(e.x+e.w/2,e.y+e.h/2,C.RED,8);
  const hitMsg=G.level===4?'BROSSE DE CHIOTTES !!!':(G.level===3?'BAGUETTE DANS LA PURÉE !!!':(G.level===1?'BOULETTE EN PLEINE TETE !':'BAGUETTE POURRIE DE CANTINE!!!'));
  spawnFT(hitMsg,e.x+e.w/2,e.y-20,C.YELLOW,true);
  G.killScore+=50;
  if(e.hp<=0){
    e.state='dead'; e.deadT=0;
    spawnBurst(e.x+e.w/2,e.y+e.h/2,C.ORANGE,18);
    const killPts={FOUI:100,CALC:150,GROG:500,KEKE:75,TONY:120,PION:130,DAME:180,MALADE:40,BAGARR:90,INTELLO_D:200}[e.type]||100;
    G.killScore+=killPts;
    spawnFT(`+${killPts}!`,e.x+e.w/2,e.y-30,C.NEON);
    triggerKillFlash(e);
    // INTELLO_D mort : démotivation collective
    if(e.type==='INTELLO_D'){
      for(const en of enemies){
        if(!en.on||en.state==='dead') continue;
        if(Math.abs(en.x-e.x)<250 && (en.type==='INTELLO'||en.type==='INTELLO_J'||en.type==='INTELLO_S'||en.type==='INTELLO_GROS')){
          en.stunned=(en.stunned||0)+10;
        }
      }
      spawnFT('DÉMOTIVATION COLLECTIVE !', e.x+14, e.y-50, '#ffcc00', true);
    }
    // Panique collective (niveau 1)
    if(G.level===1){
      for(const en of enemies){
        if(!en.on||en.state==='dead') continue;
        if(Math.abs(en.x-e.x)<220 && en.type!=='PHYSIK' && en.type!=='FOUI'){
          en.panic=3.0;
          en.panicDir=en.x < e.x ? 1 : -1;
        }
      }
    }
  } else {
    e.state='hurt'; e.vx=(KV.x<e.x?3:-3);
  }
}

// ═══ BONUS ═══
function updateBonuses(dt){
  for(const b of bonuses){
    if(!b.on) continue;
    b.bob+=.05*dt*60; b.glowT+=dt;
    const bobY=b.y+Math.sin(b.bob)*5;
    const kb=kvHB(); // coords monde
    if(overlap(kb,{x:b.x,y:bobY,w:b.w,h:b.h})) collectBonus(b);
  }
}
function collectBonus(b){
  b.on=false; sfx.pick();
  spawnBurst(b.x+b.w/2,b.y,b.def.col,10);
  const pts=Math.abs(b.def.pts);
  G.killScore+=pts;
  spawnFT(b.type==='SAC'?'MERDE...':`+${pts}`,b.x+b.w/2,b.y-15,b.def.col);
  // Effets spéciaux
  switch(b.type){
    case 'PIZZA': KV.vx*=1.5; spawnFT("PIZZA POWER!",KV.x+16,KV.y-40,C.ORANGE); break;
    case 'PHONE': KV.invincT=240; break;
    case 'BELL':
      sfx.bell();
      enemies.forEach(e=>{ if(e.on&&e.state!=='dead'){ e.state='patrol'; e.vx=e.def.spd*3*(e.x>KV.x?1:-1); } });
      spawnFT('RÉCRÉ !!!',KV.x+16,KV.y-50,C.YELLOW); break;
    case 'MOT':
      G.killScore+=300;
      spawnFT('×2 SCORE!',KV.x+16,KV.y-40,C.WHITE); break;
    case 'CAFE':
      // Slow-mo (on réduit temporairement vitesse ennemis)
      enemies.forEach(e=>{ if(e.on) e.def={...e.def,spd:e.def.spd*.4}; });
      setTimeout(()=>{ enemies.forEach(e=>{ if(e.on) e.def={...e.def,spd:EDEFS[e.type].spd}; }); },3000);
      spawnFT("J'aurais pas dû...",KV.x+16,KV.y-40,C.BROWN); break;
    case 'SAC': KV.vx*=.3; sfx.hurt(); break;
  }
}
function drawBonuses(){
  for(const b of bonuses){
    if(!b.on) continue;
    const bobY=~~(b.y+Math.sin(b.bob)*5);
    const bsx=~~wx(b.x);
    if(bsx<-30||bsx>W+30) continue;
    ctx.shadowColor=b.def.col; ctx.shadowBlur=5+Math.sin(b.glowT*5)*4;
    r(bsx,bobY,b.w,b.h,b.def.col);
    ctx.shadowBlur=0;
    ctx.font=`${b.h-2}px monospace`; ctx.textAlign='center';
    ctx.fillText(b.def.ico,bsx+b.w/2,bobY+b.h-1);
    if(~~(b.glowT*6)%2===0){
      ctx.strokeStyle=C.WHITE; ctx.lineWidth=1.5;
      ctx.strokeRect(bsx,bobY,b.w,b.h);
    }
  }
}

function updateCopines(dt){
  let _autoKissed = false;
  for(const c of copines){
    if(!c.on) continue;
    c.frame+=dt*60;
    c.near = Math.abs(KV.x+16 - (c.x+14)) < 55;
    // Auto-kiss sur mobile : pas besoin de bouton
    if(isMobile && !_autoKissed && c.on && c.near && KV.hp < KV.maxHp && KV.onGnd){
      doKiss(); _autoKissed = true;
    }
  }
}
function _drawCopine(x,y,frame,variant,near){
  const lo=~~frame%2?2:0;
  const hc = variant==='brune' ? C.DBROWN : variant==='blonde' ? C.YELLOW : C.ORANGE;
  const dc = variant==='brune' ? '#c03068' : variant==='blonde' ? '#5090f0' : '#30b860';

  // Cheveux selon variante
  r(x+4,y-3,20,7,hc);
  if(variant==='brune'){ r(x+2,y+2,4,18,hc); r(x+20,y+2,4,18,hc); } // cheveux longs droits
  if(variant==='blonde'){ r(x+20,y-5,6,14,hc); r(x+3,y-5,4,8,hc); } // frange + nœud
  if(variant==='rousse'){                                               // frisés/bouclés
    r(x+3,y-7,4,6,hc); r(x+9,y-9,4,8,hc); r(x+15,y-7,4,6,hc);
    r(x+4,y-4,2,4,'#ff9040'); r(x+10,y-6,2,5,'#ff9040');
  }

  // Tête
  r(x+5,y+4,18,13,C.SKIN);

  // Yeux mignons
  r(x+7,y+6,6,5,C.WHITE);   r(x+15,y+6,6,5,C.WHITE);
  r(x+8,y+7,4,3,'#9040c0'); r(x+16,y+7,4,3,'#9040c0'); // iris violet
  r(x+9,y+7,2,2,C.BLACK);   r(x+17,y+7,2,2,C.BLACK);   // pupille
  r(x+8,y+7,2,1,C.WHITE);   r(x+16,y+7,2,1,C.WHITE);   // reflet
  // Cils (petits traits)
  r(x+7,y+5,1,3,'#401820');  r(x+12,y+5,1,3,'#401820');
  r(x+15,y+5,1,3,'#401820'); r(x+20,y+5,1,3,'#401820');

  // Sourire
  r(x+9,y+13,2,2,C.PINK);   r(x+11,y+14,4,1,C.PINK);  r(x+15,y+13,2,2,C.PINK);

  // Robe
  r(x+3,y+17,22,18,dc);
  r(x+3,y+17,22,3,'rgba(255,255,255,.3)');   // reflet col

  // Bras
  r(x-1,y+17+lo,5,11,C.SKIN); r(x+24,y+17-lo,5,11,C.SKIN);

  // Jambes
  r(x+6,y+35,7,12,C.SKIN);  r(x+15,y+35,7,12,C.SKIN);
  // Chaussures
  r(x+4, y+46,10,4,C.DBROWN); r(x+14,y+46,10,4,C.DBROWN);

  // Cœurs flottants si Kevin est proche
  if(near){
    const ht=~~(Math.sin(Date.now()/200)*3);
    ctx.font='13px monospace'; ctx.textAlign='center'; ctx.fillStyle=C.RED;
    ctx.globalAlpha=.9; ctx.fillText('❤',x+14,y-10+ht);
    ctx.font='9px monospace'; ctx.globalAlpha=.7;
    ctx.fillText('❤',x+5, y-5+~~(ht*.6));
    ctx.fillText('❤',x+23,y-5+~~(ht*.6));
    ctx.globalAlpha=1;
    // Invitation (PC uniquement - mobile = auto)
    if(!isMobile){
      ctx.font='bold 8px monospace'; ctx.textAlign='center';
      ctx.strokeStyle=C.BLACK; ctx.lineWidth=2;
      ctx.strokeText('[E] Bisous',x+14,y-22);
      ctx.fillStyle=C.LPINK;
      ctx.fillText('[E] Bisous',x+14,y-22);
    }
  }
}

function initClassroom(){
  Object.keys(CTRL).forEach(k=>{ CTRL[k]=false; });
  // Kevin démarre en bas-gauche entre col0 et col1 (sous rangée A)
  CK.x=68; CK.y=368; CK.dir=3; CK.vx=0; CK.vy=0; CK.sprinting=false;
  // Prof 1 (Mme Atomique) — démarre haut-droit pour laisser Kevin respirer
  CT.x=643; CT.y=118; CT.angle=Math.PI;
  CT.ptIdx=5; CT.ptTimer=2.0;
  CT.phraseT=0; CT.phrase=''; CT.fireT=0; CT.mutterT=1.8+Math.random()*1.5;
  CT.alertT=0; CT.throwTimer=2.5+Math.random()*3; CT.throwing=0; CT.speedBoost=0;
  // Prof 2 (Mme Curie) — zone haute
  CT2.x=460; CT2.y=160; CT2.angle=Math.PI;
  CT2.ptIdx=0; CT2.ptTimer=1;
  CT2.phraseT=0; CT2.phrase=''; CT2.alertT=0; CT2.speedBoost=0;
  // Intellos
  CL_INTELLOS.forEach(il=>{ il.alertT=0; il.shoutT=0; });
  CL_GRENADES=[]; CL_ZONES=[]; classBoulettes=[];
  CL_STU_REACT.forEach(r2=>{ r2.t=0; r2.msg=''; });
  CK.hasBoulette=true; CK.bouletteT=0;
  G.classroomGrace=2.0; // 2s d'invincibilité au départ
  cam.x=0;
  PTPOOL.forEach(p=>p.on=false); FTPOOL.forEach(f=>f.on=false);
}

function updateClassroom(dt){
  const F=dt*60;
  if(G.classroomGrace>0) G.classroomGrace-=dt;

  // ── Kevin mouvement avec accélération/décélération ──
  const isMoving = CTRL.left||CTRL.right||(CTRL.up||CTRL.jump)||(CTRL.down||CTRL.atk);
  const maxSpd = CK.sprinting ? 4.4 : 3.0;
  const accel  = 0.4;
  const fric   = Math.pow(0.78, F);
  let mvx=0, mvy=0;
  if(CTRL.left)            mvx=-1;
  if(CTRL.right)           mvx= 1;
  if(CTRL.up  ||CTRL.jump) mvy=-1;
  if(CTRL.down||CTRL.atk)  mvy= 1;
  if(mvx&&mvy){ const n=1/Math.SQRT2; mvx*=n; mvy*=n; }
  // Mise à jour de la direction de regard seulement si Kevin bouge
  if(mvx>0.1) CK.dir=0; else if(mvy>0.1) CK.dir=1;
  else if(mvx<-0.1) CK.dir=2; else if(mvy<-0.1) CK.dir=3;
  // Appliquer accélération ou friction
  if(mvx){ CK.vx=Math.max(-maxSpd,Math.min(maxSpd, CK.vx+mvx*accel*F)); }
  else    { CK.vx*=fric; if(Math.abs(CK.vx)<0.05) CK.vx=0; }
  if(mvy){ CK.vy=Math.max(-maxSpd,Math.min(maxSpd, CK.vy+mvy*accel*F)); }
  else    { CK.vy*=fric; if(Math.abs(CK.vy)<0.05) CK.vy=0; }

  // Collision pupitres — axe X séparé
  const BUF=9;
  let nx=CK.x+CK.vx;
  for(const d of CL_DESKS){
    if(nx>d.x-BUF&&nx<d.x+d.w+BUF&&CK.y>d.y-BUF&&CK.y<d.y+d.h+BUF){
      if(CK.vx>0){ nx=d.x-BUF-0.5; CK.vx=0; }
      else        { nx=d.x+d.w+BUF+0.5; CK.vx=0; }
    }
  }
  CK.x=Math.max(22,Math.min(W-22,nx));
  // Collision pupitres — axe Y séparé
  let ny=CK.y+CK.vy;
  for(const d of CL_DESKS){
    if(CK.x>d.x-BUF&&CK.x<d.x+d.w+BUF&&ny>d.y-BUF&&ny<d.y+d.h+BUF){
      if(CK.vy>0){ ny=d.y-BUF-0.5; CK.vy=0; }
      else        { ny=d.y+d.h+BUF+0.5; CK.vy=0; }
    }
  }
  CK.y=Math.max(22,Math.min(H-22,ny));
  // Poussière si sprint
  if(CK.sprinting&&isMoving&&G.frame%3===0) spawnDust(CK.x,CK.y);

  // ── Mme Atomique — patrouille ──
  CT.ptTimer-=dt;
  const pt=CT_PATROL[CT.ptIdx%CT_PATROL.length];
  const pdx=pt.x-CT.x, pdy=pt.y-CT.y;
  const pdist=Math.sqrt(pdx*pdx+pdy*pdy);
  if(pdist<8||CT.ptTimer<=0){
    CT.ptIdx=(CT.ptIdx+1)%CT_PATROL.length;
    CT.ptTimer=(CT.ptIdx===0)?2.5:0.5+Math.random()*1.2;
  }
  if(pdist>8){
    const sp1=CT.speed*(CT.speedBoost>0?1.7:1);
    CT.x+=(pdx/pdist)*sp1*F;
    CT.y+=(pdy/pdist)*sp1*F;
    CT.angle=Math.atan2(pdy,pdx);
  } else {
    CT.angle+=0.028*F;
  }
  CT.throwing=Math.max(0,CT.throwing-dt);

  // ── Feu aléatoire ──
  CT.fireT=Math.max(0,CT.fireT-dt);
  CT.mutterT-=dt;
  if(CT.mutterT<=0){
    CT.mutterT=2+Math.random()*2.5;
    CT.phrase=CL_INSULTS[~~(Math.random()*CL_INSULTS.length)];
    CT.phraseT=75; CT.fireT=1.4;
    const spk=['VOUS ÊTES TOUS NULS !','VOUS ÊTES LA PIRE CLASSE !','Boulard, collé 3h !','Silence immédiatement !','C\'est inadmissible !'];
    speak(spk[~~(Math.random()*spk.length)]);
    for(let i=0;i<8;i++){
      const p=_getPT(); if(!p) continue;
      const fa=CT.angle+(Math.random()-.5)*Math.PI/2.2;
      const fv=1.4+Math.random()*2.8;
      Object.assign(p,{on:true,wx:CT.x+Math.cos(CT.angle)*24,
        wy:CT.y+Math.sin(CT.angle)*24,
        col:Math.random()<.5?C.RED:C.ORANGE,type:'exp',
        vx:Math.cos(fa)*fv,vy:Math.sin(fa)*fv,
        life:1,decay:.028+Math.random()*.04,size:4+~~(Math.random()*7)});
    }
  }

  // ── LANCEMENT DE GRENADE CHIMIQUE ──
  CT.throwTimer-=dt;
  if(CT.throwTimer<=0){
    throwFormulaGrenade();
    CT.throwTimer=3+Math.random()*4;
    CT.throwing=0.6;
  }

  // ── Grenades en vol ──
  for(let i=CL_GRENADES.length-1;i>=0;i--){
    const g=CL_GRENADES[i];
    g.prog+=g.spd*F;
    if(g.prog>=1){ landGrenade(g); CL_GRENADES.splice(i,1); continue; }
    // Position Bézier (arc parabolique)
    const p=g.prog;
    const bx=(1-p)*(1-p)*g.sx+2*(1-p)*p*((g.sx+g.tx)/2)+p*p*g.tx;
    const by=(1-p)*(1-p)*g.sy+2*(1-p)*p*(Math.min(g.sy,g.ty)-90)+p*p*g.ty;
    g.cx=bx; g.cy=by; // stocker pour dessin
  }

  // ── Zones de danger au sol ──
  for(let i=CL_ZONES.length-1;i>=0;i--){
    const z=CL_ZONES[i];
    z.life-=z.decay*F;
    if(z.life<=0){ CL_ZONES.splice(i,1); continue; }
    const dx=CK.x-z.x, dy=CK.y-z.y;
    if(Math.sqrt(dx*dx+dy*dy)<z.r*.75){
      CT.phrase='AH AH ! TU AS MARCHÉ DEDANS !!!'; CT.phraseT=120;
      sfx.bonk();
      spawnBurst(CK.x,CK.y,z.col2,18);
      caughtInClassroom(); return;
    }
  }

  if(CT.phraseT>0) CT.phraseT-=F;
  if(CT.alertT>0) CT.alertT-=dt;
  if(CT.speedBoost>0) CT.speedBoost-=dt;

  // Throw boulette classroom
  if(CTRL.kiss && CK.hasBoulette && CK.bouletteT<=0){
    CK.bouletteT=0.5;
    classBoulettes.push({x:CK.x, y:CK.y, vx:CK.dir===1||CK.dir===3?4:-4, vy:0, life:1.5});
  }
  if(CK.bouletteT>0) CK.bouletteT-=dt;
  // Update classBoulettes
  for(let i=classBoulettes.length-1;i>=0;i--){
    const b=classBoulettes[i];
    b.x+=b.vx*dt*60; b.y+=b.vy*dt*60; b.life-=dt;
    if(b.life<=0||b.x<0||b.x>W||b.y<0||b.y>H){ classBoulettes.splice(i,1); continue; }
    // Collision intellos → +500pts
    let hit=false;
    for(const il of CL_INTELLOS){
      if(Math.abs(b.x-il.x)<18&&Math.abs(b.y-il.y)<18){
        il.shoutT=0.1; // mini-stun
        G.killScore+=500; G.score=G.killScore;
        spawnFT('💥 +500 BOULETTE !!!',il.x,il.y-30,C.YELLOW,true);
        spawnBurst(il.x,il.y,C.YELLOW,10);
        if(G.sound) tone(600,.1,'square',.3);
        classBoulettes.splice(i,1); hit=true; break;
      }
    }
    if(hit) continue;
    // Collision profs → rebondit (immortels)
    for(const ct of [CT,CT2]){
      if(Math.abs(b.x-ct.x)<22&&Math.abs(b.y-ct.y)<22){
        b.vx=-b.vx; b.vy=-b.vy;
        spawnFT('IMMORTELLE !',ct.x,ct.y-30,'#ff8080');
        break;
      }
    }
  }

  // ── Intello balances : alertent la prof si Kevin approche ──
  for(const il of CL_INTELLOS){
    if(il.shoutT>0) il.shoutT-=dt;
    if(il.alertT>0) il.alertT-=dt;
    const dix=CK.x-il.x, diy=CK.y-il.y;
    const didist=Math.sqrt(dix*dix+diy*diy);
    if(didist<88 && il.shoutT<=0){
      il.shoutT=3.5; il.alertT=3.5;
      il.msg=INTELLO_SHOUTS[~~(Math.random()*INTELLO_SHOUTS.length)];
      // Boost les deux profs
      CT.speedBoost=3.5; CT2.speedBoost=3.5;
      spawnFT(il.msg,il.x,il.y-30,'#ffee00',true);
      if(G.sound){ tone(880,.06,'square',.35); tone(1200,.04,'square',.3,.06); }
    }
  }

  // ── Patrouille Prof 2 (Mme Curie) ──
  CT2.ptTimer-=dt;
  const pt2=CT2_PATROL[CT2.ptIdx%CT2_PATROL.length];
  const pd2x=pt2.x-CT2.x, pd2y=pt2.y-CT2.y;
  const pd2dist=Math.sqrt(pd2x*pd2x+pd2y*pd2y);
  if(pd2dist<8||CT2.ptTimer<=0){
    CT2.ptIdx=(CT2.ptIdx+1)%CT2_PATROL.length;
    CT2.ptTimer=0.6+Math.random()*0.8;
  }
  if(pd2dist>8){
    const sp2=CT2.speed*(CT2.speedBoost>0?1.7:1);
    CT2.x+=(pd2x/pd2dist)*sp2*F; CT2.y+=(pd2y/pd2dist)*sp2*F;
    CT2.angle=Math.atan2(pd2y,pd2x);
  } else CT2.angle+=0.04*F;
  if(CT2.phraseT>0) CT2.phraseT-=F;
  if(CT2.alertT>0) CT2.alertT-=dt;
  if(CT2.speedBoost>0) CT2.speedBoost-=dt;

  // ── Cône de vision (Prof 1) ──
  const spd1boost=CT.speedBoost>0;
  const vrange=CT.fireT>0?170:(CK.sprinting?145:110)+(spd1boost?25:0);
  const vhalf =CT.fireT>0?Math.PI/2.0:(CK.sprinting?Math.PI/2.5:Math.PI/3.0);
  const kdx=CK.x-CT.x, kdy=CK.y-CT.y;
  const kdist=Math.sqrt(kdx*kdx+kdy*kdy);
  let spotted=false;
  if(kdist<vrange){
    const aToK=Math.atan2(kdy,kdx);
    let diff=aToK-CT.angle;
    while(diff>Math.PI) diff-=Math.PI*2; while(diff<-Math.PI) diff+=Math.PI*2;
    if(Math.abs(diff)<vhalf) spotted=true;
  }
  if(kdist<28) spotted=true;

  // ── Cône de vision Prof 2 ──
  if(!spotted){
    const vr2=95+(CT2.speedBoost>0?25:0);
    const k2dx=CK.x-CT2.x, k2dy=CK.y-CT2.y;
    const k2dist=Math.sqrt(k2dx*k2dx+k2dy*k2dy);
    if(k2dist<vr2){
      const aToK2=Math.atan2(k2dy,k2dx);
      let diff2=aToK2-CT2.angle;
      while(diff2>Math.PI) diff2-=Math.PI*2; while(diff2<-Math.PI) diff2+=Math.PI*2;
      if(Math.abs(diff2)<Math.PI/2.8) spotted=true;
    }
    if(k2dist<24) spotted=true;
  }

  if(spotted && G.classroomGrace<=0){
    CT.phrase='JE TE VOIS !!!'; CT.phraseT=120; CT.alertT=0.5;
    CT2.phrase='ARRÊTEZ-VOUS !!!'; CT2.phraseT=120; CT2.alertT=0.5;
    sfx.bonk(); sfx.hurt();
    spawnBurst(CK.x,CK.y,C.RED,22);
    caughtInClassroom(); return;
  }

  // ── Porte de sortie (haut-droit) ──
  if(CK.x>CL_DOOR.x-10 && CK.x<CL_DOOR.x+CL_DOOR.w+10 && CK.y<CL_DOOR.y+CL_DOOR.h+10){
    escapedClassroom(); return;
  }

  updateStudentReactions(dt);
  updateParticles(dt);
}

function throwFormulaGrenade(){
  const type=CL_GRENADE_TYPES[~~(Math.random()*CL_GRENADE_TYPES.length)];
  // Cible aléatoire dans la salle (peut atterrir n'importe où !)
  const tx=30+Math.random()*(W-60);
  const ty=100+Math.random()*(H-130);
  const phrase=CL_THROW_PHRASES[~~(Math.random()*CL_THROW_PHRASES.length)];
  CT.phrase=phrase; CT.phraseT=100;
  CL_GRENADES.push({
    sx:CT.x, sy:CT.y, tx, ty, cx:CT.x, cy:CT.y,
    prog:0, spd:0.016+Math.random()*0.01,
    type, rot:0,
  });
  if(G.sound){ tone(350+Math.random()*150,.05,'sawtooth',.35); }
}

function landGrenade(g){
  const type=g.type;
  // Zone de danger
  CL_ZONES.push({
    x:g.tx, y:g.ty, r:type.r,
    life:1, decay:0.0025,  // dure ~240 frames = 4s
    col:type.zCol, col2:type.col, zBord:type.zBord,
    name:type.name, msg:type.msg, zMsg:type.zMsg,
    pulse:Math.random()*6.28,
  });
  // Explosion de particules
  for(let i=0;i<18;i++){
    const p=_getPT(); if(!p) continue;
    const a=Math.random()*Math.PI*2;
    const v=1.5+Math.random()*3.5;
    Object.assign(p,{on:true,wx:g.tx,wy:g.ty,
      col:Math.random()<.5?type.col:C.YELLOW,type:'exp',
      vx:Math.cos(a)*v,vy:Math.sin(a)*v,
      life:1,decay:.02+Math.random()*.035,size:5+~~(Math.random()*10)});
  }
  spawnFT(type.msg,g.tx,g.ty-25,type.col,true);
  if(G.sound){ noise(.25,800,.6); tone(130,.18,'sawtooth',.45); }
  // Réaction des élèves proches (dans les 90px)
  const ELEVE_REACT=['MAMAN !!!','AU SECOURS !','JE SAVAIS PAS QUE CHIMIE=ÇA!','SCANDALEUX !!!','PAS ENCORE!!!','MON CAHIER !!!','MAIS POURQUOI ?!'];
  CL_STUDENTS.forEach((s,i)=>{
    const ex=s.x+22, ey=s.y-6;
    if(Math.sqrt((ex-g.tx)**2+(ey-g.ty)**2)<90){
      CL_STU_REACT[i].t=120;
      CL_STU_REACT[i].msg=ELEVE_REACT[~~(Math.random()*ELEVE_REACT.length)];
    }
  });
}

// Réactions élèves (timer update)
function updateStudentReactions(dt){
  for(const r2 of CL_STU_REACT) r2.t=Math.max(0,r2.t-dt*60);
}

function caughtInClassroom(){
  G.state=ST.OVER; G.level=1; G.killer='ATOMI';
  stopMusic(); stopClassroomMusic();
  window.speechSynthesis&&window.speechSynthesis.cancel();
}
function escapedClassroom(){
  G.killScore += 500; // bonus évasion salle de classe
  G.score = G.killScore;
  G.levelScore = G.score; // score N1 pour l'affichage transition
  G.state=ST.CTRANSIT; G.transitStart=Date.now();
  stopClassroomMusic();
  window.speechSynthesis&&window.speechSynthesis.cancel();
  sfx.win();
  setTimeout(()=>{ if(G.state===ST.CTRANSIT) startCorridor(); },3200);
}

// ── Grenades et zones chimiques (dessin) ──
function drawClassroomGrenades(){
  // 1) Zones de contamination au sol
  for(const z of CL_ZONES){
    const pulse=Math.sin(Date.now()*.006+z.pulse)*.15+0.85;
    ctx.save();
    ctx.globalAlpha=z.life*pulse;
    // Remplissage
    ctx.fillStyle=z.col;
    ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
    // Contour pulsé
    ctx.strokeStyle=z.zBord; ctx.lineWidth=2;
    ctx.setLineDash([6,3]); ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // Label formule au centre
    ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,.92)';
    ctx.fillText(z.zMsg,z.x,z.y-2);
    ctx.font='7px monospace'; ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.fillText(`${~~(z.life*100)}%`,z.x,z.y+10);
    ctx.restore();
  }

  // 2) Grenades en vol (arc parabolique)
  for(const g of CL_GRENADES){
    const cx=~~g.cx, cy=~~g.cy;
    const rot=g.prog*Math.PI*5; // rotation pendant le vol
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(rot);
    // Corps du flacon chimique
    r(-5,-9,10,8,g.type.col);      // corps
    r(-3,-13,6,5,'rgba(255,255,255,.75)'); // liquide
    r(-2,-15,4,4,C.DGRAY);           // bouchon
    // Bulles/fumée
    ctx.globalAlpha=.6+Math.sin(g.prog*20)*.2;
    ctx.fillStyle=g.type.col;
    ctx.fillRect(-1,-17,2,2);
    ctx.restore();
    // Traînée
    ctx.globalAlpha=.25;
    for(let t=1;t<=3;t++){
      const tp=Math.max(0,g.prog-t*.06);
      const tpv=tp;
      const tx2=(1-tpv)*(1-tpv)*g.sx+2*(1-tpv)*tpv*((g.sx+g.tx)/2)+tpv*tpv*g.tx;
      const ty2=(1-tpv)*(1-tpv)*g.sy+2*(1-tpv)*tpv*(Math.min(g.sy,g.ty)-90)+tpv*tpv*g.ty;
      ctx.fillStyle=g.type.col;
      const ts=5-t;
      ctx.fillRect(~~tx2-ts/2,~~ty2-ts/2,ts,ts);
    }
    ctx.globalAlpha=1;
    // Label formule au-dessus du flacon
    ctx.font='bold 7px monospace'; ctx.textAlign='center';
    ctx.strokeStyle=C.BLACK; ctx.lineWidth=1.5;
    ctx.strokeText(g.type.name,cx,cy-20);
    ctx.fillStyle=g.type.col; ctx.fillText(g.type.name,cx,cy-20);
  }
}

// ── Élèves de la classe (top-down) ──
const _SHIRT_COLS=['#4488ff','#ff8844','#44bb55','#cc44cc','#ccbb22','#44cccc','#ee5555','#88aaff'];
function drawStudent(dx,dy,type,idx,frame){
  const cx=~~(dx+22), cy=~~(dy-8);
  // Ombre
  ctx.fillStyle='rgba(0,0,0,.15)'; ctx.beginPath();
  ctx.ellipse(cx,cy+10,10,4,0,0,Math.PI*2); ctx.fill();
  // Corps (vu de dessus)
  const sc=_SHIRT_COLS[idx%_SHIRT_COLS.length];
  r(cx-9,cy,18,13,sc);
  // Tête
  r(cx-6,cy-11,12,9,C.SKIN);
  // Cheveux
  const hc=[C.DBROWN,C.YELLOW,C.DGRAY,C.BROWN,'#cc3344'][idx%5];
  r(cx-7,cy-14,14,5,hc);
  // Animation selon type
  if(type==='sleep'){
    r(cx-7,cy-4,14,8,C.SKIN); // tête sur le bureau
    if(~~(frame/25)%2===0){ ctx.font='9px monospace'; ctx.textAlign='center'; ctx.fillStyle='rgba(140,140,255,.9)'; ctx.fillText('z',cx+14,cy-10); }
    if(~~(frame/40)%2===0){ ctx.font='7px monospace'; ctx.fillStyle='rgba(140,140,255,.7)'; ctx.fillText('z',cx+20,cy-15); }
  } else if(type==='phone'){
    r(cx+7,cy-9,6,9,'#111');
    r(cx+8,cy-8,4,7,'#3366ff'); // écran
    ctx.font='7px monospace'; ctx.textAlign='left'; ctx.fillStyle='rgba(255,80,80,.9)'; ctx.fillText('♥',cx+17,cy-8);
  } else if(type==='scared'){
    ctx.font='9px monospace'; ctx.textAlign='center'; ctx.fillStyle='rgba(80,130,255,.9)';
    ctx.fillText('💧',cx-14,cy-12); ctx.fillText('💧',cx+10,cy-10);
  } else if(type==='oblivious'){
    r(cx-9,cy-1,16,8,'#ffe8c0'); // livre ouvert
    r(cx-8,cy,4,5,'#4466ff');    // texte
    r(cx-2,cy,4,5,'#4466ff');
  } else if(type==='bored'){
    // Regarde par la fenêtre (hors-sujet)
    ctx.font='8px monospace'; ctx.textAlign='center'; ctx.fillStyle='rgba(200,200,200,.7)';
    if(~~(frame/60)%2===0) ctx.fillText('...',cx,cy-14);
  }
  // Réaction si grenade vient d'atterrir près
  const react=CL_STU_REACT[idx];
  if(react&&react.t>0){
    const al=Math.min(1,react.t/30);
    ctx.globalAlpha=al;
    ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.strokeStyle=C.BLACK; ctx.lineWidth=2;
    ctx.strokeText(react.msg,cx,cy-22);
    ctx.fillStyle=C.YELLOW; ctx.fillText(react.msg,cx,cy-22);
    ctx.globalAlpha=1;
  }
}
function drawAllStudents(){
  for(let i=0;i<CL_STUDENTS.length;i++){
    const s=CL_STUDENTS[i];
    drawStudent(s.x,s.y,s.t,i,G.frame);
  }
}

function drawIntello(il,idx){
  const ix=~~il.x, iy=~~il.y;
  const cx=ix-13, cy=iy-28; // coin haut-gauche du sprite (26×30)
  const alert=il.shoutT>0;
  // Ombre portée
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.beginPath(); ctx.ellipse(ix,iy+4,14,5,0,0,Math.PI*2); ctx.fill();
  // Corps — pull bleu électrique
  r(cx+2, cy+18, 22, 18, '#0044cc');
  r(cx+4, cy+18, 18, 4,  '#0055ff'); // col
  // Bras
  r(cx,   cy+18, 4, 14, '#0044cc');
  r(cx+22,cy+18, 4, 14, '#0044cc');
  // Main gauche (stylo/crayon)
  r(cx-3, cy+28, 4, 2, C.SKIN);
  r(cx-4, cy+24, 2, 5, '#ffcc00'); // crayon
  // Tête (plus grande que les élèves normaux)
  r(cx+4, cy+2, 18, 16, C.SKIN);
  // Cheveux bien coiffés foncés
  r(cx+3, cy,   20, 5, '#1a1a3a');
  r(cx+3, cy+2, 3,  8, '#1a1a3a'); // raie côté
  // ÉNORMES LUNETTES — trait ULTRA distinctif
  // Monture épaisse noire
  r(cx+2,  cy+6,  9, 8, '#111');
  r(cx+15, cy+6,  9, 8, '#111');
  // Verres (gros, ronds, effet reflet)
  r(cx+3,  cy+7,  7, 6, alert?'#ff8800':'#aaddff');
  r(cx+16, cy+7,  7, 6, alert?'#ff8800':'#aaddff');
  // Reflets sur les verres
  r(cx+4,  cy+8,  2, 2, alert?'#ffcc44':'#ffffff');
  r(cx+17, cy+8,  2, 2, alert?'#ffcc44':'#ffffff');
  // Pont central des lunettes
  r(cx+11, cy+9,  4, 2, '#111');
  // Branches latérales
  r(cx+1,  cy+9,  2, 1, '#111');
  r(cx+24, cy+9,  2, 1, '#111');
  // Bouche
  if(alert){
    r(cx+6, cy+14, 14, 3, '#cc0000'); // bouche ouverte qui crie
    r(cx+8, cy+14,  2, 2, C.WHITE);
    r(cx+13,cy+14,  2, 2, C.WHITE);
  } else {
    r(cx+8, cy+15, 10, 2, '#a06050'); // bouche fermée satisfaite
  }
  // Icône permanente "👓" au-dessus (indicateur intello)
  const pulse=Math.sin(Date.now()*0.003+idx*1.3)*0.5+0.5;
  ctx.globalAlpha=0.55+pulse*0.35;
  ctx.font='bold 8px monospace'; ctx.textAlign='center';
  ctx.fillStyle=alert?'#ff4400':'#ffdd00';
  ctx.fillText(alert?'!!':'📚', ix, cy-4);
  ctx.globalAlpha=1;
  // Bulle de dénonciation si alertT>0
  if(il.alertT>0 && il.msg){
    const al=Math.min(1,il.alertT/0.4);
    ctx.globalAlpha=al;
    ctx.font='bold 8px monospace'; ctx.textAlign='center';
    const tw=ctx.measureText(il.msg).width+12;
    // Fond bulle
    ctx.fillStyle='rgba(255,230,0,.97)';
    const bx=ix-tw/2, by=cy-46;
    ctx.beginPath();
    ctx.roundRect?ctx.roundRect(bx,by,tw,16,4):r(bx,by,tw,16,'rgba(255,230,0,.97)');
    ctx.fill();
    // Bordure rouge
    ctx.strokeStyle='#cc0000'; ctx.lineWidth=1.5;
    ctx.stroke();
    // Texte
    ctx.fillStyle='#880000';
    ctx.strokeStyle='#fff'; ctx.lineWidth=2.5;
    ctx.strokeText(il.msg,ix,by+12);
    ctx.fillText(il.msg,ix,by+12);
    // Flèche vers le bas
    ctx.fillStyle='rgba(255,230,0,.97)';
    ctx.beginPath(); ctx.moveTo(ix-5,by+15); ctx.lineTo(ix,by+21); ctx.lineTo(ix+5,by+15); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawAllIntellos(){
  for(let i=0;i<CL_INTELLOS.length;i++) drawIntello(CL_INTELLOS[i],i);
}

// ── Cône de vision ──
function drawVisionCone(tx,ty,angle,range,col,alpha,halfA=Math.PI/2.8){
  ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(tx,ty);
  for(let i=0;i<=20;i++){
    const a=angle-halfA+(2*halfA*i/20);
    ctx.lineTo(tx+Math.cos(a)*range, ty+Math.sin(a)*range);
  }
  ctx.closePath(); ctx.fill(); ctx.restore();
}

// ── Rendu complet salle de classe ──
function drawClassroom(){
  drawClassroomBG();

  // 1 — Zones de danger au sol (sous tout le reste)
  drawClassroomGrenades(); // zones + grenades en vol

  // 2 — Cônes de vision
  const vr=CT.fireT>0?170:(CK.sprinting?145:110)+(CT.speedBoost>0?25:0);
  const vha=CT.fireT>0?Math.PI/2.0:(CK.sprinting?Math.PI/2.5:Math.PI/3.0);
  drawVisionCone(CT.x,CT.y,CT.angle,vr,'#ff1010',CT.fireT>0?.45:.26,vha);
  // Cône prof 2 (bleu)
  drawVisionCone(CT2.x,CT2.y,CT2.angle,95+(CT2.speedBoost>0?25:0),'#1040ff',.22,Math.PI/3.0);
  ctx.strokeStyle='rgba(255,50,50,.32)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(CT.x,CT.y,28,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(40,80,255,.32)';
  ctx.beginPath(); ctx.arc(CT2.x,CT2.y,24,0,Math.PI*2); ctx.stroke();

  // 3 — Particules feu + fumée
  drawParticles();

  // 4 — Élèves
  drawAllStudents();

  // Draw classBoulettes
  for(const b of classBoulettes){
    ctx.fillStyle='#f0f0f0'; ctx.strokeStyle='#aaa'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(~~b.x,~~b.y,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // spiral lines
    ctx.strokeStyle='rgba(180,180,180,.6)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.arc(~~b.x,~~b.y,3,0,Math.PI*1.5); ctx.stroke();
  }

  // 5 — Entités principales
  drawClassroomTeacher(CT);
  drawClassroomTeacher2(CT2);
  drawAllIntellos();
  // Kevin clignote pendant la période de grâce
  if(G.classroomGrace<=0 || Math.floor(Date.now()/120)%2===0)
    drawClassroomKevin(CK.x,CK.y,CK.dir);

  // 6 — Bulles de dialogue
  if(CT.phraseT>0){
    const al=Math.min(1,CT.phraseT/30);
    const tx=CT.x, ty=CT.y-36;
    ctx.globalAlpha=al;
    ctx.font='bold 10px monospace';
    const tw=ctx.measureText(CT.phrase).width;
    r(tx-tw/2-5,ty-13,tw+10,18,'rgba(0,0,0,.9)');
    ctx.textAlign='center';
    ctx.fillStyle=CT.throwing>0?'#ff4000':CT.fireT>0?C.RED:C.ORANGE;
    ctx.fillText(CT.phrase,tx,ty); ctx.globalAlpha=1;
  }
  if(CT2.phraseT>0){
    const al=Math.min(1,CT2.phraseT/30);
    ctx.globalAlpha=al;
    ctx.font='bold 9px monospace';
    const tw2=ctx.measureText(CT2.phrase).width;
    r(CT2.x-tw2/2-5,CT2.y-48,tw2+10,16,'rgba(0,30,120,.9)');
    ctx.textAlign='center'; ctx.fillStyle='#80a0ff';
    ctx.fillText(CT2.phrase,CT2.x,CT2.y-36); ctx.globalAlpha=1;
  }

  // 7 — Indicateur sprint Kevin
  if(CK.sprinting){
    const sp=Math.sin(Date.now()*.012)*.3+.7;
    ctx.globalAlpha=sp;
    ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillStyle=C.YELLOW;
    ctx.fillText('SPRINT — PLUS VISIBLE !',W/2,H/2-160);
    ctx.globalAlpha=1;
  }

  // 8 — Barre de danger
  const distKT=Math.sqrt((CK.x-CT.x)**2+(CK.y-CT.y)**2);
  const danger=Math.max(0,Math.min(1,1-(distKT-28)/195));
  r(0,H-20,W,8,C.DGRAY);
  r(0,H-20,~~(W*danger),8,danger>.65?C.RED:danger>.38?C.ORANGE:C.YELLOW);
  ctx.font='bold 7px monospace'; ctx.textAlign='right'; ctx.fillStyle=C.WHITE;
  ctx.fillText('⚠ DANGER',W-6,H-14);

  // 9 — Compteur grenades actives
  if(CL_ZONES.length>0){
    ctx.font='bold 8px monospace'; ctx.textAlign='left'; ctx.fillStyle='#ff4040';
    ctx.fillText(`☣ ${CL_ZONES.length} ZONE${CL_ZONES.length>1?'S':''} ACTIVE${CL_ZONES.length>1?'S':''}`,6,H-14);
  }

  // Son btn (classroom)
  r(4,4,34,28,C.DGRAY);
  ctx.font='13px monospace'; ctx.textAlign='center'; ctx.fillStyle=C.WHITE; ctx.fillText(G.sound?'🔊':'🔇',21,22);
  // Musique btn (classroom)
  r(42,4,34,28,G.music?'#1a3a1a':C.DGRAY);

  ctx.font='bold 6px monospace'; ctx.fillStyle=G.music?'#88ff88':'#888'; ctx.fillText(G.music?'ON':'OFF',59,29);

  ctx.strokeText('N1 — Salle de classe',82,22);
  ctx.fillStyle=C.WHITE; ctx.fillText('N1 — Salle de classe',82,22);
  ctx.font='8px monospace'; ctx.fillStyle=C.YELLOW;
  ctx.fillText('Rejoins la porte  |  [Shift/Sprint] attention : visible !',22,36);

  drawClassroomVirtualBtns();
}

  // Icône + label
  ctx.globalAlpha=hasBall ? 0.95 : 0.35;

  ctx.fillText('🧻', bcx, by+bh*0.52);

  // ── Feedbacks actifs ──
  if(CTRL.left||CTRL.right||CTRL.up||CTRL.down){
    ctx.globalAlpha=0.8; ctx.fillStyle='#ffff44';

    ctx.font='bold 14px monospace'; ctx.textAlign='center';
    ctx.fillText('💥', bcx, by+bh*0.4);
  }

  ctx.restore();
}
