// ═══ DÉCORS SALLE DE CLASSE (SIDE-SCROLLER) ═══
function drawBG_Classroom(){
  // Tableau noir (fond, haut 55%)
  r(0,0,W,~~(H*0.55),'#183820');
  // Formules sur le tableau
  const formulae=[
    {t:'E=mc²',x:0.08},{t:'F=ma',x:0.18},{t:'PV=nRT',x:0.28},{t:'ΔE=hf',x:0.40},
    {t:'a²+b²=c²',x:0.52},{t:'Σ=∫∂Ω',x:0.65},{t:'∇²ψ=0',x:0.76},{t:'dS/dt≥0',x:0.86},
    {t:'λ=h/p',x:0.13},{t:'v=fλ',x:0.34},{t:'W=qV',x:0.57},{t:'P=F/A',x:0.70},
    {t:'n=c/v',x:0.92},{t:'Δx·Δp≥ℏ/2',x:0.43},
  ];
  ctx.font='bold 9px monospace';
  for(let i=0;i<formulae.length;i++){
    const f=formulae[i];
    const fx=~~(((f.x*2000-cam.x*0.03)%(2000)+2000)%2000 * W/2000);
    const fy=20+~~(Math.sin(i*1.3+G.frame*0.004)*8)+~~(i*14)%~~(H*0.44);
    const alpha=0.5+Math.sin(G.frame*0.02+i)*0.25;
    ctx.globalAlpha=alpha;
    ctx.strokeStyle='#0a2010'; ctx.lineWidth=2;
    ctx.strokeText(f.t,fx,fy+16);
    ctx.fillStyle=`hsl(${110+i*15},60%,75%)`;
    ctx.fillText(f.t,fx,fy+16);
  }
  ctx.globalAlpha=1;

  // Dessin de pénis à la craie (après triggerChalkDraw)
  if(_chalkDrawing&&_chalkDrawing.timer>0){
    const t=_chalkDrawing.timer; // 6→0
    // Fondu : visible plein pendant 4s, fade pendant 2s finales
    const alpha = t>2 ? 1 : t*0.5;
    // Progression de 0→1 sur les 1.5 premières secondes
    const prog = Math.min(1, (6-t)/1.5);
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=4;
    ctx.shadowColor='#ffffaa'; ctx.shadowBlur=10;
    // Position : côté gauche du tableau
    const bx=~~(W*0.18), by=~~(H*0.08);
    const scale=1.5; // taille compacte
    // Révélation progressive par étapes
    // Étape 1 : corps (cylindre = rect arrondi)
    if(prog>0.0){
      const p2=Math.min(1,prog/0.15);
      ctx.beginPath();
      ctx.arc(bx, by+~~(60*scale*p2), ~~(22*scale), Math.PI, 0, false);
      ctx.moveTo(bx-~~(22*scale), by); ctx.lineTo(bx-~~(22*scale), by+~~(60*scale*p2));
      ctx.moveTo(bx+~~(22*scale), by); ctx.lineTo(bx+~~(22*scale), by+~~(60*scale*p2));
      ctx.stroke();
    }
    // Étape 2 : tête (demi-cercle)
    if(prog>0.15){
      ctx.beginPath(); ctx.arc(bx, by, ~~(22*scale), Math.PI, 0, false); ctx.stroke();
    }
    // Étape 3 : couilles
    if(prog>0.35){
      const p3=Math.min(1,(prog-0.35)/0.2);
      ctx.beginPath(); ctx.arc(bx-~~(26*scale), by+~~(60*scale)+~~(14*scale*p3), ~~(16*scale), 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(bx+~~(26*scale), by+~~(60*scale)+~~(14*scale*p3), ~~(16*scale), 0, Math.PI*2); ctx.stroke();
    }
    // Étape 4 : poils et texte
    if(prog>0.6){
      ctx.lineWidth=2;
      for(let i=0;i<5;i++){
        ctx.beginPath();
        ctx.moveTo(bx-~~(18*scale)+i*~~(9*scale), by+~~(76*scale));
        ctx.quadraticCurveTo(bx-~~(22*scale)+i*~~(11*scale), by+~~(95*scale), bx-~~(14*scale)+i*~~(7*scale), by+~~(110*scale));
        ctx.stroke();
      }
      ctx.lineWidth=4;
    }
    if(prog>0.8){
      ctx.font='bold 13px monospace'; ctx.textAlign='center';
      ctx.fillStyle='#ffffff'; ctx.fillText('✏ KEVIN WAS HERE', bx, by+~~(130*scale));
    }
    ctx.restore();
  }

  // Bande verte tableau en bas
  r(0,~~(H*0.55)-4,W,4,'#2a5030');
  // Lumières fluorescentes au plafond
  r(0,0,W,6,'#c0e0b0');
  for(let i=0;i<5;i++){
    const lx=~~(((i*160-cam.x*.04)%(160*5)+160*5)%(160*5)-160);
    ctx.shadowColor='#a0e080'; ctx.shadowBlur=10;
    r(lx,0,140,5,'#d8f0c0');
    ctx.shadowBlur=0;
  }
  // Parquet bois (bas 45%)
  const floorY=~~(H*0.55);
  r(0,floorY,W,H-floorY,'#a06828');
  for(let col=0;col<22;col++){
    const tx=~~(((col*36-cam.x*1.0)%(36*22)+36*22)%(36*22)-36);
    r(tx,floorY,35,H-floorY,'#b07830');
    r(tx+1,floorY,1,H-floorY,'#7a4810');
    r(tx,floorY,35,3,'#c08838'); // reflet
  }
  r(0,floorY,W,4,'#7a4810'); // plinthe bas du tableau
  // Fenêtres côté droit (décor)
  for(let i=0;i<4;i++){
    const wx2=~~(((i*680+1200-cam.x*.08)%(680*4)+680*4)%(680*4)-100);
    if(wx2>-60&&wx2<W+60){
      r(wx2,8,80,~~(H*0.44),'#b8d8f0');
      r(wx2+2,10,76,~~(H*0.44)-6,'#d8eeff');
      r(wx2+40,10,3,~~(H*0.44)-6,'#a0c8e0');
      r(wx2,~~(H*0.44)/2+8,80,3,'#a0c8e0');
      // Ciel extérieur (soleil)
      ctx.fillStyle='#88ccff'; ctx.fillRect(wx2+2,10,76,~~(H*0.44)-6);
      r(wx2+30,20,20,14,'#fff0a0'); // soleil
    }
  }
  // Bureau prof (loin à droite)
  const deskX=~~wx(1950);
  if(deskX>-140&&deskX<W+20){
    r(deskX,GND-44,130,44,'#8B4513');
    r(deskX+2,GND-42,126,40,'#a0622a');
    r(deskX+2,GND-42,126,5,'#c07838'); // reflet
    r(deskX+10,GND-36,40,10,'#cc2020'); // pomme du prof
    ctx.font='9px monospace'; ctx.fillStyle='#cc2020'; ctx.textAlign='center';
    ctx.fillText('🍎',deskX+30,GND-28);
    ctx.font='bold 7px monospace'; ctx.fillStyle=C.WHITE; ctx.textAlign='center';
    ctx.fillText('PROF',deskX+65,GND-20);
  }
  // Plateformes (pupitres)
  for(const p of currentPlats){
    if(p.ground) continue;
    const px=~~wx(p.x);
    if(px>W+p.w||px<-p.w) continue;
    r(px,p.y,p.w,p.h,'#8B6914');
    r(px,p.y,p.w,3,'#c0901a');
    r(px,p.y+p.h-3,p.w,3,'#5a3808');
    // Livres/cahiers sur le bureau
    r(px+4,p.y-8,12,8,'#4466ff');
    r(px+18,p.y-6,10,6,'#cc4422');
    r(px+p.w-20,p.y-7,14,7,'#22aa44');
  }
  // Sol principal
  r(0,GND,W,H-GND,'#c09050');
  for(let tx=~~(-cam.x%48);tx<W;tx+=48){
    r(tx,GND,1,H-GND,'rgba(0,0,0,0.1)');
  }
  r(0,GND-2,W,4,'#7a4810');

  // ── PORTE DE SORTIE N1 ──
  const doorX=~~wx(N1_EXIT_X);
  if(doorX>-80&&doorX<W+20){
    const dH=110, dW=54, dY=GND-dH;
    const blink=~~(Date.now()/400)%2===0;
    if(_n1DoorOpen){
      // Porte ouverte : verte
      r(doorX-6,dY-6,dW+12,dH+6,'#6a3a10');
      r(doorX-4,dY-4,dW+8,dH+4,'#3a8040');
      r(doorX,dY,dW,dH,'#228830');
      r(doorX+2,dY+2,dW-4,dH-2,'#33aa44');
      r(doorX+8,dY+8,dW-16,28,'#aaddff');
      r(doorX+9,dY+9,dW-18,26,'#c8eeff');
      r(doorX+dW-14,dY+dH/2-4,10,8,'#f0c020');
      r(doorX+dW-16,dY+dH/2,12,4,'#f0c020');
      ctx.font='bold 9px monospace'; ctx.textAlign='center';
      ctx.fillStyle=blink?'#ffff00':'#aaaa00';
      ctx.fillText('SORTIE',doorX+dW/2,dY-10);
      ctx.font='16px monospace';
      ctx.fillStyle=blink?'#00ff44':'#00aa22';
      ctx.fillText('⬆',doorX+dW/2,dY+55);
      ctx.shadowColor='#00ff44'; ctx.shadowBlur=blink?18:8;
      r(doorX-2,dY-2,dW+4,4,'#00ff44');
      ctx.shadowBlur=0;
    } else {
      // Porte VERROUILLÉE : rouge + cadenas
      r(doorX-6,dY-6,dW+12,dH+6,'#3a0808');
      r(doorX-4,dY-4,dW+8,dH+4,'#aa2020');
      r(doorX,dY,dW,dH,'#881010');
      r(doorX+2,dY+2,dW-4,dH-2,'#aa2222');
      r(doorX+8,dY+8,dW-16,28,'#662222');
      // Barres de prison
      for(let bi=0;bi<3;bi++) r(doorX+10+bi*12,dY+8,3,28,'#441010');
      // Cadenas
      r(doorX+dW/2-8,dY+dH/2-10,16,14,'#cc8800');
      r(doorX+dW/2-5,dY+dH/2-14,10,8,'#aa6600');
      ctx.strokeStyle='#cc8800'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(doorX+dW/2,dY+dH/2-10,5,Math.PI,0,false); ctx.stroke();
      ctx.font='bold 9px monospace'; ctx.textAlign='center';
      ctx.fillStyle=blink?'#ff4444':'#aa2222';
      ctx.fillText('VERROU',doorX+dW/2,dY-10);
      // Chrono restant
      const timerLeft=Math.ceil(_n1DoorTimer);
      ctx.font='bold 11px monospace';
      ctx.fillStyle=timerLeft<=5?'#ff0000':'#ffaa00';
      ctx.fillText(timerLeft>0?timerLeft+'s':'...', doorX+dW/2,dY-22);
      ctx.shadowColor='#ff2222'; ctx.shadowBlur=blink?14:5;
      r(doorX-2,dY-2,dW+4,4,'#ff2222');
      ctx.shadowBlur=0;
    }
  }
}

// ═══ DÉCORS ═══
const BG={x1:0,x2:0,x3:0};
function updateBG(speed){ BG.x1+=speed*.4; BG.x2+=speed*.9; BG.x3+=speed*1.5; }

function drawBG(){
  // Ciel béton
  r(0,0,W,42,C.DGRAY);
  // Néons
  for(let i=0;i<6;i++){
    const nx=(i*120-BG.x2*.3)%720-20;
    r(~~nx,5,80,9,C.YELLOW); r(~~nx+2,7,76,5,C.WHITE);
  }
  // Mur
  r(0,42,W,GND-42,C.CEMENT);
  // Fenêtres (layer 1)
  for(let rep=0;rep<5;rep++){
    const sx=~~(((rep*280-cam.x*.35)%(280*5)+280*5)%(280*5)-280);
    if(sx<W+100&&sx>-180){
      r(sx+10,55,80,60,C.DGRAY); r(sx+14,59,72,52,C.DBLUE);
      r(sx+14,59,72,5,C.DGRAY);
      ctx.font='bold 10px monospace';
      ctx.fillStyle=C.RED;    ctx.textAlign='left'; ctx.fillText('KEVIN',sx+100,72);
      ctx.fillStyle=C.YELLOW; ctx.fillText('WAS',   sx+100,84);
      ctx.fillStyle=C.ORANGE; ctx.fillText('HERE',  sx+100,96);
      r(sx+100,52,70,48,C.BEIGE); r(sx+100,52,70,6,C.RED);
      ctx.font='7px monospace'; ctx.fillStyle=C.BLACK;
      ctx.fillText('JOURNÉE',sx+102,65); ctx.fillText('PORTES',sx+102,74); ctx.fillText('OUVERTES',sx+100,83);
      ctx.strokeStyle=C.RED; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(sx+100,52); ctx.lineTo(sx+170,98); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+170,52); ctx.lineTo(sx+100,98); ctx.stroke();
    }
  }
  // Casiers (layer 2)
  const LSIZE=52;
  for(let i=0;i<14;i++){
    const lx=~~(((i*LSIZE - cam.x*.7)%(LSIZE*14)+LSIZE*14)%(LSIZE*14)-LSIZE);
    if(lx>W+LSIZE||lx<-LSIZE) continue;
    const ly=118, lh=GND-ly-8;
    r(lx,ly,LSIZE-2,lh,C.DBLUE); r(lx+2,ly+2,LSIZE-6,lh-4,C.BLUE);
    r(lx,ly+~~(lh/2)-3,LSIZE-2,6,C.DGRAY);
    r(lx+38,ly+~~(lh/4)-10,6,20,C.DGRAY); r(lx+38,ly+~~(3*lh/4)-10,6,20,C.DGRAY);
    for(let v=0;v<5;v++) r(lx+4,ly+8+v*9,LSIZE-10,2,C.DBLUE);
    if(((i+~~(cam.x/LSIZE))%7===0)){
      r(lx+4,ly+4,LSIZE-10,~~(lh/2)-8,C.BLACK);
      r(lx+18,ly+~~(lh/4),8,28,C.WHITE); r(lx+17,ly+~~(lh/4)+26,10,8,C.RED);
    }
  }
  // Sol
  const TW=40,TH=30;
  for(let col=0;col<20;col++){
    const tx=~~(((col*TW-cam.x*1.0)%(TW*20)+TW*20)%(TW*20)-TW);
    r(tx,GND,TW-1,TH,C.BEIGE); r(tx+TW-2,GND,2,TH,C.DGRAY);
    if((col*13)%5===0) r(tx+14,GND+10,7,5,C.GRAY);
  }
  r(0,GND+TH,W,H-GND-TH,C.BEIGE);
  r(0,GND-2,W,4,C.DGRAY);

  // Plateformes en bois (en coordonnées écran)
  for(const p of PLATS){
    if(p.ground) continue;
    const px=~~wx(p.x);
    if(px>W+p.w||px<-p.w) continue;
    // Corps bois
    r(px,p.y,p.w,p.h,C.WOOD);
    // Joints de planches verticaux
    for(let jx=0;jx<p.w;jx+=13) r(px+jx,p.y,1,p.h,C.WOODD);
    // Reflet dessus clair
    r(px,p.y,p.w,3,C.WOODL);
    // Ombre dessous foncée
    r(px,p.y+p.h-3,p.w,3,C.WOODD);
    // Vis aux extrémités
    r(px+2,p.y+2,3,3,C.WOODD); r(px+p.w-5,p.y+2,3,3,C.WOODD);
  }

  // Cloche de fin (fin du niveau)
  const bellX=~~wx(4050);
  if(bellX>-80&&bellX<W+80){
    r(bellX+10,GND-80,30,80,C.DGRAY);
    ctx.font='36px monospace'; ctx.textAlign='center';
    ctx.fillText('🔔',bellX+25,GND-55);
    ctx.font='bold 8px monospace'; ctx.fillStyle=C.YELLOW;
    ctx.fillText('SORTIE!',bellX+25,GND-14);
    // Aura
    ctx.strokeStyle=C.YELLOW; ctx.lineWidth=2;
    const a=Math.sin(Date.now()*.003)*.5+.5;
    ctx.globalAlpha=a*.6;
    ctx.beginPath(); ctx.arc(bellX+25,GND-65,28,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
}

// ═══ CONTRÔLES ═══
const CTRL={left:false,right:false,jump:false,atk:false,kiss:false,up:false,down:false};
// Boutons classiques (utilisés en mode 'buttons' ou PC)
// ── Boutons ronds style Genshin ──────────────────────────────────────────
// cx/cy = centre, r = rayon. Positionnés dans les zones naturelles du pouce.
const GBT = {
  mvL:  { cx:72,    cy:H-72, r:54, col:'#cc2200', icon:'◄', lbl:'GAUCHE' },
  mvR:  { cx:178,   cy:H-72, r:54, col:'#cc2200', icon:'►', lbl:'DROITE' },
  saut: { cx:W-66,  cy:H-120,r:54, col:'#1a7a30', icon:'▲', lbl:'SAUT'   },
  atk:  { cx:W-142, cy:H-62, r:48, col:'#1848c8', icon:'🥖',lbl:'ATK'    },
  ball: { cx:W-66,  cy:H-55, r:40, col:'#887700', icon:'📄', lbl:'BALL'  },
};
// Alias legacy pour compatibilité avec le reste du code (mode 'buttons')
const BTN_ZONES={
  left: {x:6,    y:H-68, w:60,h:62, col:'#d03000', icon:'◀', lbl:'',      key:''},
  right:{x:74,   y:H-68, w:60,h:62, col:'#d03000', icon:'▶', lbl:'',      key:''},
  ball: {x:W-256,y:H-68, w:60,h:62, col:'#887700', icon:'📄', lbl:'BALL', key:'X'},
  kiss: {x:W-188,y:H-68, w:60,h:62, col:'#b0106e', icon:'💋', lbl:'BISOU',key:'E'},
  atk:  {x:W-120,y:H-68, w:60,h:62, col:'#1848c8', icon:'🥖', lbl:'ATK', key:'Z'},
  jump: {x:W-60, y:H-68, w:58,h:62, col:'#1a8030', icon:'▲', lbl:'SAUT', key:'⎵'},
};

// Zones mobiles (mode 'zones')
const MZ = {
  L_END:    W*0.42,  // limite droite de la zone gauche
  L_MID:    W*0.21,  // point milieu → <mid=gauche, >mid=droite
  R_START:  W*0.58,  // limite gauche de la zone droite
  ATK_SPLIT:H*0.55,  // séparation ATK (haut) / SAUT (bas) dans zone droite
  TOP:      55,      // zone UI en haut
};

const activeTouches=new Map(); // id → {type, dir, startX, startY, startTime, swiped}

// ── Helpers zones ──
function _mzLeft(gx){ return gx < MZ.L_MID; }
function _setMoveDir(id, gx, gy){
  const dir = _mzLeft(gx)?'left':'right';
  const prev = activeTouches.get(id);
  if(prev&&prev.type==='lzone'){
    if(prev.dir==='left'&&dir!=='left')  CTRL.left=false;
    if(prev.dir==='right'&&dir!=='right') CTRL.right=false;
    prev.dir=dir;
  }
  CTRL[dir]=true;
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(AC&&AC.state==='suspended') AC.resume();
  for(const t of e.changedTouches){
    const rect=canvas.getBoundingClientRect();
    const sc=W/rect.width;
    const gx=(t.clientX-rect.left)*sc, gy=(t.clientY-rect.top)*sc;

    // ── Écrans non-jeu ──
    if(G.state===ST.MENU){ startGame(); return; }
    if(G.state===ST.INTRO){ startClassroom(); return; }
    if(G.state===ST.PAUSE){
      if(gx>W/2-90&&gx<W/2+90&&gy>H/2-10&&gy<H/2+40){ togglePause(); return; }
      if(gx>W/2-60&&gx<W/2+60&&gy>H/2+55&&gy<H/2+95){ goMenu(); return; }
      return;
    }
    if(G.state===ST.OVER){ restartCurrentLevel(); return; }
    if(G.state===ST.WIN){ goMenu(); return; }
    if(G.state===ST.L2END){ startCantine(); return; }
    if(G.state===ST.L3END){ startLevel3(); return; }
    if(G.state===ST.CTRANSIT){
      startCorridor(); return;
    }

    // ── Boutons UI (toujours actifs) ──
    if(gx<42&&gy<42){ toggleSound(); continue; }
    if(gx>=42&&gx<82&&gy<42){ toggleMusic(); continue; }
    if(G.state===ST.PLAY&&gx>W-42&&gy<42){ togglePause(); continue; }

    // ══════════════════════════════════════════════════════════
    //  CLASSROOM (top-down) — même en mode zones, D-pad virtuel
    // ══════════════════════════════════════════════════════════
    if(G.state===ST.CLASSROOM){
      if(isMobile&&mobileMode==='zones'){
        if(gx<W*0.55&&gy>MZ.TOP){
          // Zone gauche → D-pad virtuel (déterminé par touchmove)
          activeTouches.set(t.identifier,{type:'dpad',startX:gx,startY:gy});
        } else if(gx>=W*0.55&&gy>MZ.TOP){
          // Zone droite → lancer boulette
          if(CK.hasBoulette&&CK.bouletteT<=0){
            CTRL.kiss=true;
            setTimeout(()=>{ CTRL.kiss=false; },80);
          }
        }
      } else {
        // Mode buttons : ancienne logique
        let hit=null;
        for(const [k,z] of Object.entries(BTN_ZONES)){
          if(k==='ball') continue;
          if(gx>=z.x&&gx<=z.x+z.w&&gy>=z.y&&gy<=z.y+z.h){ hit=k; break; }
        }
        if(hit){ activeTouches.set(t.identifier,{type:'btn',btn:hit}); CTRL[hit]=true; }
        if(!hit&&gy<H-70){ CK.sprinting=!CK.sprinting; activeTouches.set(t.identifier,{type:'sprint'}); }
      }
      continue;
    }

    // ══════════════════════════════════════════════════════════
    //  PLAY (side-scroller)
    // ══════════════════════════════════════════════════════════
    if(G.state===ST.PLAY){
      if(isMobile&&mobileMode==='zones'){
        if(gy<=MZ.TOP) continue;

        // ── Détection cercles Genshin ──
        const _d=(b)=>{ const dx=gx-b.cx,dy=gy-b.cy; return dx*dx+dy*dy; };
        const inMvL  = _d(GBT.mvL)  <= GBT.mvL.r *GBT.mvL.r;
        const inMvR  = _d(GBT.mvR)  <= GBT.mvR.r *GBT.mvR.r;
        const inSaut = _d(GBT.saut) <= GBT.saut.r*GBT.saut.r;
        const inAtk  = _d(GBT.atk)  <= GBT.atk.r *GBT.atk.r;
        const ballAvail = KV.hasBoulette||(G.level===1&&KV.boulettes>0);
        const inBall = ballAvail && _d(GBT.ball) <= GBT.ball.r*GBT.ball.r;

        if(inMvL){
          activeTouches.set(t.identifier,{type:'mvL'}); CTRL.left=true; continue;
        }
        if(inMvR){
          activeTouches.set(t.identifier,{type:'mvR'}); CTRL.right=true; continue;
        }
        if(inSaut){
          activeTouches.set(t.identifier,{type:'saut'}); CTRL.jump=true; doJump(); jumpHeld=true; continue;
        }
        if(inAtk){
          activeTouches.set(t.identifier,{type:'atk'}); CTRL.atk=true; doAtk(); continue;
        }
        if(inBall){
          activeTouches.set(t.identifier,{type:'ball'}); doThrowBall(); continue;
        }

        // Zone gauche étendue (hors cercles) → mouvement
        if(gx < W*0.40 && gy > MZ.TOP){
          const dir = gx < W*0.20 ? 'left' : 'right';
          activeTouches.set(t.identifier,{type:'lzone',dir,startX:gx,startY:gy});
          CTRL[dir]=true; continue;
        }

        // Zone centrale → tap Kevin = KISS
        {
          const camX=Math.max(0,Math.min(WORLD_W-W,KV.x-W/3));
          const ksx=KV.x-camX;
          if(Math.abs(gx-ksx-16)<44&&Math.abs(gy-KV.y-24)<44){ doKiss(); continue; }
        }

      } else {
        // Mode buttons : ancienne logique
        let hit=null;
        for(const [k,z] of Object.entries(BTN_ZONES)){
          if(gx>=z.x&&gx<=z.x+z.w&&gy>=z.y&&gy<=z.y+z.h){ hit=k; break; }
        }
        if(hit){
          activeTouches.set(t.identifier,{type:'btn',btn:hit});
          CTRL[hit]=true;
          if(hit==='jump'){ doJump(); jumpHeld=true; }
          if(hit==='atk')  doAtk();
          if(hit==='kiss') doKiss();
          if(hit==='ball') doThrowBall();
        }
      }
    }
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const touch=activeTouches.get(t.identifier);
    if(!touch) continue;
    const rect=canvas.getBoundingClientRect();
    const sc=W/rect.width;
    const gx=(t.clientX-rect.left)*sc, gy=(t.clientY-rect.top)*sc;

    // D-pad classroom
    if(touch.type==='dpad'){
      const dx=gx-touch.startX, dy=gy-touch.startY;
      const thr=14;
      CTRL.left=false; CTRL.right=false; CTRL.up=false; CTRL.down=false;
      if(Math.abs(dx)>thr||Math.abs(dy)>thr){
        if(Math.abs(dx)>Math.abs(dy)){ CTRL.left=dx<0; CTRL.right=dx>0; }
        else { CTRL.up=dy<0; CTRL.down=dy>0; }
      }
    }

    // Zone gauche : sliding direction
    if(touch.type==='lzone'){ _setMoveDir(t.identifier,gx,gy); }
    // Cercles mvL/mvR : slide entre les deux
    if(touch.type==='mvL'||touch.type==='mvR'){
      const nowL = gx < (GBT.mvL.cx+GBT.mvR.cx)/2;
      if(nowL && touch.type==='mvR'){ CTRL.right=false; CTRL.left=true; touch.type='mvL'; }
      if(!nowL && touch.type==='mvL'){ CTRL.left=false; CTRL.right=true; touch.type='mvR'; }
    }

    // Zone droite : détection swipe
    if(touch.type==='rzone'&&!touch.swiped){
      const dx=gx-touch.startX, dy=gy-touch.startY;
      if(Math.abs(dx)>35){
        touch.swiped=true;
        if(dx<0) doAtk();       // swipe gauche → ATK
      } else if(dy>35){
        touch.swiped=true;
        doThrowBall();          // swipe bas → BALL
      }
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const touch=activeTouches.get(t.identifier);
    if(!touch){ activeTouches.delete(t.identifier); continue; }

    if(touch.type==='btn')      { CTRL[touch.btn]=false; }
    if(touch.type==='lzone')    { CTRL[touch.dir]=false; }
    if(touch.type==='mvL')      { CTRL.left=false; }
    if(touch.type==='mvR')      { CTRL.right=false; }
    if(touch.type==='saut')     { jumpHeld=false; CTRL.jump=false; }
    if(touch.type==='atk')      { CTRL.atk=false; }
    if(touch.type==='rzone')    { jumpHeld=false; CTRL.jump=false; }
    if(touch.type==='rzone_atk'){ CTRL.atk=false; }
    if(touch.type==='dpad')     { CTRL.left=false; CTRL.right=false; CTRL.up=false; CTRL.down=false; }

    activeTouches.delete(t.identifier);
  }
},{passive:false});

canvas.addEventListener('touchcancel',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const touch=activeTouches.get(t.identifier);
    if(touch){
      if(touch.type==='btn')      CTRL[touch.btn]=false;
      if(touch.type==='lzone')    CTRL[touch.dir]=false;
      if(touch.type==='mvL')      CTRL.left=false;
      if(touch.type==='mvR')      CTRL.right=false;
      if(touch.type==='saut')     { jumpHeld=false; CTRL.jump=false; }
      if(touch.type==='atk')      CTRL.atk=false;
      if(touch.type==='rzone')    { jumpHeld=false; CTRL.jump=false; }
      if(touch.type==='rzone_atk'){ CTRL.atk=false; }
      if(touch.type==='dpad')     { CTRL.left=false; CTRL.right=false; CTRL.up=false; CTRL.down=false; }
    }
    activeTouches.delete(t.identifier);
  }
},{passive:false});

// Jump continu (tenir la touche)
let jumpHeld = false;
// ── Game feel ──
let coyoteT   = 0;  // frames depuis dernier sol (coyote time)
let jumpBufT  = 0;  // frames depuis dernier appui saut (buffer)
const COYOTE_F = 8;

document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(G.state===ST.PLAY){
    if(e.code==='ArrowLeft' ||e.code==='KeyA'||k==='q') { e.preventDefault(); CTRL.left=true; }
    if(e.code==='ArrowRight'||e.code==='KeyD')          { e.preventDefault(); CTRL.right=true; }
    if((e.code==='Space'||e.code==='ArrowUp')&&!jumpHeld){
      e.preventDefault(); jumpHeld=true; doJump();
    }
    if(k==='z') { e.preventDefault(); doAtk(); }
    if(k==='x') { e.preventDefault(); doThrowBall(); }
    if(k==='e') doKiss();
    if(k==='p') togglePause();
    if(k==='m') toggleSound();
    if(k==='n') toggleMusic();
  } else if(G.state===ST.CLASSROOM){
    e.preventDefault();
    if(e.code==='ArrowLeft' ||e.code==='KeyA') CTRL.left =true;
    if(e.code==='ArrowRight'||e.code==='KeyD') CTRL.right=true;
    if(e.code==='ArrowUp'   ||e.code==='KeyW') CTRL.up   =true;
    if(e.code==='ArrowDown' ||e.code==='KeyS') CTRL.down =true;
    if(e.code==='ShiftLeft' ||e.code==='ShiftRight') CK.sprinting=true;
    if(e.code==='Space') CTRL.kiss=true; // lancer boulette
  } else if(G.state===ST.MENU){
    if(e.code==='Space'||e.code==='Enter') startGame();
  } else if(G.state===ST.INTRO){
    if(e.code==='Space'||e.code==='Enter') startClassroom();
  } else if(G.state===ST.OVER){
    if(e.code==='Space'||e.code==='Enter') restartCurrentLevel();
  } else if(G.state===ST.WIN){
    if(e.code==='Space'||e.code==='Enter') goMenu();
  } else if(G.state===ST.L2END){
    if(e.code==='Space'||e.code==='Enter') startCantine();
  } else if(G.state===ST.L3END){
    if(e.code==='Space'||e.code==='Enter') startLevel3();
  } else if(G.state===ST.PAUSE){
    if(e.code==='KeyP'||e.code==='Space') togglePause();
  }
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(e.code==='ArrowLeft' ||e.code==='KeyA'||k==='q') { CTRL.left =false; }
  if(e.code==='ArrowRight'||e.code==='KeyD')           { CTRL.right=false; }
  if(e.code==='Space'||e.code==='ArrowUp')             { jumpHeld=false; CTRL.up=false; CTRL.kiss=false; }
  if(e.code==='ArrowDown' ||e.code==='KeyS')           { CTRL.down=false; CTRL.atk=false; }
  if(e.code==='ShiftLeft' ||e.code==='ShiftRight')     { CK.sprinting=false; }
});

function togglePause(){
  if(G.state===ST.PLAY){ G.state=ST.PAUSE; stopMusic(); }
  else if(G.state===ST.PAUSE){ G.state=ST.PLAY; startMusic(); }
}
function toggleSound(){
  G.sound=!G.sound; localStorage.setItem('fs_snd',G.sound);
  if(!G.sound){ stopMusic(); stopClassroomMusic(); }
  else {
    if(G.state===ST.PLAY) startMusic();
    else if(G.state===ST.CLASSROOM) startClassroomMusic();
  }
}
function toggleMusic(){
  G.music=!G.music; localStorage.setItem('fs_music',G.music);
  if(!G.music){ stopMusic(); stopClassroomMusic(); }
  else {
    if(G.state===ST.PLAY) startMusic();
    else if(G.state===ST.CLASSROOM) startClassroomMusic();
  }
}

function _drawBtn(z, icon, lbl, pressed, col){
  const r12=12;
  // Ombre portée
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath();
  ctx.roundRect?ctx.roundRect(z.x+3,z.y+5,z.w,z.h,r12):ctx.rect(z.x+3,z.y+5,z.w,z.h);
  ctx.fill();
  // Fond coloré (plus clair si pressé)
  ctx.fillStyle=pressed
    ? col.replace(/[^,]+\)$/,'1)').replace('#','').length>6 ? col : col+'ff'
    : col+'cc';
  if(pressed) ctx.fillStyle=col; // full opaque quand pressé
  ctx.globalAlpha=pressed?1:0.82;
  ctx.beginPath();
  ctx.roundRect?ctx.roundRect(z.x,z.y,z.w,z.h,r12):ctx.rect(z.x,z.y,z.w,z.h);
  ctx.fill();
  ctx.globalAlpha=1;
  // Surbrillance haut (effet 3D)
  ctx.fillStyle=pressed?'rgba(0,0,0,.15)':'rgba(255,255,255,.28)';
  ctx.beginPath();
  ctx.roundRect?ctx.roundRect(z.x+2,z.y+2,z.w-4,z.h/2,r12):ctx.rect(z.x+2,z.y+2,z.w-4,z.h/2);
  ctx.fill();
  // Bordure
  ctx.strokeStyle=pressed?'rgba(255,255,255,.9)':'rgba(255,255,255,.55)';
  ctx.lineWidth=pressed?2.5:2;
  ctx.beginPath();
  ctx.roundRect?ctx.roundRect(z.x,z.y,z.w,z.h,r12):ctx.rect(z.x,z.y,z.w,z.h);
  ctx.stroke();
  // Icône (plus petite pour laisser place aux labels)
  ctx.textAlign='center';
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,.6)'; ctx.shadowBlur=4;
  ctx.font=`bold ${z.key?22:26}px monospace`;
  ctx.fillText(icon, z.x+z.w/2, z.y+z.h/2+(lbl?-2:8));
  // Touche clavier (coin haut-gauche, petite pastille)
  if(z.key){
    ctx.font='bold 8px monospace';
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.textAlign='left';
    ctx.fillText('['+z.key+']', z.x+4, z.y+10);
  }
  // Label action (bas du bouton)
  if(lbl){
    ctx.font='bold 8px monospace';
    ctx.fillStyle='#fff';
    ctx.textAlign='center';
    ctx.fillText(lbl, z.x+z.w/2, z.y+z.h-5);
  }
  ctx.shadowBlur=0;
}

// ── Dessin d'un bouton rond Genshin ─────────────────────────────────────
function _drawGBtn(b, icon, label, pressed, available){
  if(available===false) return;
  const {cx,cy,r,col}=b;
  ctx.save();
  ctx.textBaseline='middle';

  // Fond : semi-transparent + plus opaque si pressé
  ctx.globalAlpha = pressed ? 0.72 : 0.30;
  ctx.fillStyle   = col;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();

  // Brillance intérieure (halo haut du bouton — effet 3D Genshin)
  const grd = ctx.createRadialGradient(cx,cy-r*0.3,r*0.1, cx,cy-r*0.1,r*0.9);
  grd.addColorStop(0,'rgba(255,255,255,0.18)');
  grd.addColorStop(1,'rgba(255,255,255,0)');
  ctx.globalAlpha = 1;
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();

  // Contour blanc
  ctx.globalAlpha = pressed ? 0.95 : 0.50;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = pressed ? 2.5 : 1.5;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();

  // Halo coloré quand pressé
  if(pressed){
    ctx.globalAlpha = 0.30;
    ctx.strokeStyle = col; ctx.lineWidth = 6;
    ctx.shadowColor = col; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(cx,cy,r+3,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Icône
  ctx.globalAlpha = pressed ? 1.0 : 0.88;
  ctx.fillStyle   = '#fff';
  ctx.textAlign   = 'center';
  ctx.font = `bold ${r>48?36:r>40?30:24}px monospace`;
  ctx.fillText(icon, cx, cy - 7);

  // Label
  ctx.font = `bold 10px monospace`;
  ctx.globalAlpha = pressed ? 1.0 : 0.72;
  ctx.fillText(label, cx, cy + r - 13);

  ctx.restore();
}

function _drawMobileZonesUI(){
  ctx.save();

  // ══ BOUTONS MOUVEMENT (gauche) — style joystick Genshin ══
  // Fond de la zone joystick
  ctx.globalAlpha = 0.07;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(125, H-72, 110, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle='#fff'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(125,H-72,108,0,Math.PI*2); ctx.stroke();

  // Séparateur vertical au centre du joystick
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle='#fff'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(125,H-72-54); ctx.lineTo(125,H-72+54); ctx.stroke();

  // Les deux flèches
  _drawGBtn(GBT.mvL, '◄', '', CTRL.left);
  _drawGBtn(GBT.mvR, '►', '', CTRL.right);

  // ══ CLUSTER ACTION (droite) — disposition Genshin diamond ══
  // Fond cluster transparent
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(W-104, H-88, 104, 96, 0, 0, Math.PI*2); ctx.fill();

  // SAUT — gros bouton en haut
  _drawGBtn(GBT.saut, '▲', 'SAUT', CTRL.jump);

  const atkIcon  = G.level===4 ? '🪣' : '🥖';

  _drawGBtn(GBT.atk, atkIcon, atkLabel, CTRL.atk);

  // BALL — bouton bas droit (seulement si disponible)
  const ballAvail = KV.hasBoulette || (G.level===1 && KV.boulettes>0);
  if(ballAvail){
    const ballCount = G.level===1 ? KV.boulettes : '';
    _drawGBtn(GBT.ball, '📄', `BALL${ballCount?` x${ballCount}`:''}`, false);
  }

  // ══ Indicateur boulettes N1 au centre ══
  if(G.level===1){
    ctx.globalAlpha=0.80; ctx.fillStyle='#fff';
    ctx.font='bold 11px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`📄 x${KV.boulettes}`, W/2, H-18);
  }

  ctx.restore();
}

  r(x+18,y+dy-6,5,5,C.BLACK); r(x+18,y+dy-6,5,2,C.WHITE); r(x+20,y+dy-6,2,5,C.WHITE);

// ═══ BOUCLE DE JEU ═══
function update(dt){
  // Tick killFlash always (freeze or not)
  if(killFlash){
    killFlash.timer -= dt*60;
    if(killFlash.timer<=0) killFlash=null;
  }
  if(G.state===ST.PLAY){
    // If frozen by kill flash → only update particles, skip game logic
    if(killFlash && killFlash.freeze){
      updateParticles(dt);
      G.frame++;
      return;
    }
    // Tick intox
    if(KV.intox > 0){
      KV.intox -= dt;
      if(KV.intox < 0) KV.intox = 0;
    }
    updateCam();
    updateKevin(dt);
    updateEnemies(dt);
    updateBonuses(dt);
    if(G.level===1){
      // Niveau 1 côté boulettes — pas de baguette ni brosse
      updateBouletteItems(dt);
      updateTokTokItems(dt);
      if(KV.bouletteT>0) KV.bouletteT-=dt;
      // Craie
      for(const c of chalkItems){
        if(!c.on) continue;
        const kb=kvHB();
        if(kb.x<c.x+12&&kb.x+kb.w>c.x&&kb.y+kb.h>c.y-10&&kb.y<c.y+10){
          c.on=false; triggerChalkDraw();
        }
      }
      // Chaises
      for(const ch of chairItems){
        if(!ch.on) continue;
        if(Math.abs(KV.x+16-ch.x)<50&&KV.y<GND-60){
          ch.on=false; KV.hasChair=true;
          spawnFT('🪑 CHAISE RAMASSÉE !', KV.x+16, KV.y-40, '#ffcc00', true);
          break;
        }
      }
      // Timer porte
      if(_n1DoorTimer>0){
        _n1DoorTimer-=dt;
        if(_n1DoorTimer<=0){
          _n1DoorOpen=false; _n1DoorTimer=0;
          spawnFT('⏰ PORTE VERROUILLÉE ! Bats le boss !', W/2+cam.x, 60, '#ff2200', true);
        }
      }
      if(!_n1DoorOpen){
        const foui=enemies.find(e=>e.type==='FOUI'&&e.on&&e.state!=='dead');
        if(!foui){ _n1DoorOpen=true; spawnFT('🚪 PORTE OUVERTE !', N1_EXIT_X+27, GND-60, '#00ff44', true); }
      }
      // Décrémente le dessin de craie
      if(_chalkDrawing&&_chalkDrawing.timer>0) _chalkDrawing.timer-=dt;
      // Décrémente le flash BONUS BITE
      if(_biteBonus&&_biteBonus.timer>0) _biteBonus.timer-=dt;
    } else if(G.level===3){ // cantine
      updateBaguetteItems(dt);
      updateCopines(dt);
      updateBouletteItems(dt);
      updateTokTokItems(dt);
      if(KV.bouletteT>0) KV.bouletteT-=dt;
    } else if(G.level===4){
      updateSmokeItems(dt);
      updateBrosseItems(dt);
      updateBouletteItems(dt);
      updateTokTokItems(dt);
      if(KV.bouletteT>0) KV.bouletteT-=dt;
    } else {
      updateCopines(dt);
      updateBaguetteItems(dt);
      updateBouletteItems(dt);
      updateTokTokItems(dt);
      if(KV.bouletteT>0) KV.bouletteT-=dt;
    }
    // Update kvBoulettes (anciens niveaux 2/3/4)
    if(G.level!==1){
      for(let i=kvBoulettes.length-1;i>=0;i--){
        const b=kvBoulettes[i];
        b.x+=b.vx*dt*60; b.y+=b.vy*dt*60; b.life-=dt*60;
        if(b.life<=0||b.x<cam.x-50||b.x>cam.x+W+50){ kvBoulettes.splice(i,1); continue; }
        for(const e of enemies){
          if(e.state==='dead'||!e.on) continue;
          if(b.x>e.x+2&&b.x<e.x+e.w-2&&b.y>e.y+2&&b.y<e.y+e.h-2){
            hitEnemy(e); spawnFT('📄 BOULETTE !',e.x+e.w/2,e.y-20,'#ffffff',true);
            kvBoulettes.splice(i,1); break;
          }
        }
      }
    }
    updateBlockers(dt);
    updateParticles(dt);
    updateBG(Math.abs(KV.vx)*.6+.5);
    if(KV.action!=='dead') G.maxX=Math.max(G.maxX,KV.x);
    G.score = G.scoreBonus + G.killScore + ~~(G.maxX/8);
    // Condition de victoire
    if(G.level===1){
      // Atteindre la porte de sortie → victoire N1 (uniquement si porte ouverte)
      if(KV.x >= N1_EXIT_X && KV.onGnd && _n1DoorOpen){
        winGame();
      } else if(KV.x >= N1_EXIT_X && KV.onGnd && !_n1DoorOpen){
        // Porte verrouillée : empêcher Kevin de passer + message
        KV.x = N1_EXIT_X - 40;
        if(~~(G.frame)%60===0) spawnFT('🔒 TUEZ LE BOSS !', KV.x+16, KV.y-50, '#ff4444', true);
      }
    } else {
      if(KV.x>=4050) winGame();
    }
    G.frame++;
  } else if(G.state===ST.CLASSROOM){
    cam.x=0;
    updateClassroom(dt);
    G.frame++;
  } else if(G.state===ST.L2END){
    G.frame++;
  } else if(G.state===ST.L3END){
    G.frame++;
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  switch(G.state){
    case ST.MENU:      drawMenu(); break;
    case ST.INTRO:     drawIntro(); break;
    case ST.CLASSROOM: drawClassroom(); break;
    case ST.CTRANSIT:  drawTransition(); break;
    case ST.L2END:     drawL2End(); break;
    case ST.L3END:     drawL3End(); break;
    case ST.PLAY:
    case ST.PAUSE:
      if(G.level===4) drawBG_L3(); else if(G.level===3) drawBG_Cantine(); else if(G.level===1) drawBG_Classroom(); else drawBG();
      drawBlockers();
      if(G.level===4){
        drawSmokeItems();
        drawBrosseItems();
      } else if(G.level===1){
        // Niveau 1 : craies + chaises
        drawChalkItems();
        drawChairItems();
      } else {
        drawBaguetteItems();
      }
      drawBouletteItems();
      drawTokTokItems(); // dessiné pour tous les niveaux (tokTokItems=[] en N1 si aucun)
      for(const e of enemies) drawEnemy(e);
      drawBonuses();
      if(G.level!==4&&G.level!==1) drawCopines();
      // Projectiles (coords monde → screen via wx)
      for(const p of projectiles){
        const px=~~wx(p.x), py=~~p.y;
        if(px<-50||px>W+50) continue;
        if(p.boulettePaper){
          // Boulette de papier : sphère marron
          ctx.fillStyle='#8B5A1A'; ctx.strokeStyle='#6a3808'; ctx.lineWidth=1;
          ctx.beginPath(); ctx.arc(px,py,8,0,Math.PI*2); ctx.fill(); ctx.stroke();
          ctx.fillStyle='#a07030';
          ctx.beginPath(); ctx.arc(px-2,py-2,3,0,Math.PI*2); ctx.fill();
        } else if(p.gomme){
          // Gomme : petit rectangle rose avec rotation
          ctx.save();
          ctx.translate(px, py);
          ctx.rotate(p.angle||0);
          ctx.fillStyle='#ff99cc'; ctx.strokeStyle='#cc66aa'; ctx.lineWidth=1;
          ctx.fillRect(-7,-4,14,8);
          ctx.strokeRect(-7,-4,14,8);
          ctx.fillStyle='#ffbbdd';
          ctx.fillRect(-6,-3,5,3);
          ctx.restore();
        } else if(p.stylo){
          // Stylo : corps bleu avec traînée d'encre
          ctx.save();
          if(p.inkTrail&&p.inkTrail.length>1){
            ctx.strokeStyle='rgba(40,60,200,0.4)'; ctx.lineWidth=2;
            ctx.beginPath();
            ctx.moveTo(~~wx(p.inkTrail[0].x), p.inkTrail[0].y);
            for(let ti=1;ti<p.inkTrail.length;ti++){
              ctx.lineTo(~~wx(p.inkTrail[ti].x), p.inkTrail[ti].y);
            }
            ctx.stroke();
          }
          ctx.translate(px, py);
          const styloAngle = (p.vx||0)>0 ? -0.2 : Math.PI+0.2;
          ctx.rotate(styloAngle);
          ctx.fillStyle='#2244cc'; ctx.fillRect(-10,-2,18,4);
          ctx.fillStyle='#4466ee'; ctx.fillRect(-10,-2,14,2);
          ctx.fillStyle='#c0c0c0'; ctx.fillRect(8,-1,4,2);
          ctx.fillStyle='#111133'; ctx.fillRect(12,-1,2,2);
          ctx.restore();
        } else if(p.chaise){
          // Chaise en rotation
          ctx.save();
          ctx.translate(px, py);
          ctx.rotate(p.angle||0);
          ctx.fillStyle='#8B6914'; ctx.fillRect(-12,-8,24,5);
          ctx.fillStyle='#c0901a'; ctx.fillRect(-12,-8,24,2);
          ctx.fillStyle='#8B6914'; ctx.fillRect(-12,-18,4,12);
          ctx.fillStyle='#8B6914'; ctx.fillRect(8,-18,4,12);
          ctx.fillStyle='#8B6914'; ctx.fillRect(-12,-18,24,3);
          ctx.fillStyle='#6a4808'; ctx.fillRect(-10,-3,3,10);
          ctx.fillStyle='#6a4808'; ctx.fillRect(7,-3,3,10);
          ctx.restore();
        } else if(p.formulaCloud){
          // Nuage de formule — semi-transparent vert
          const alpha=Math.min(0.72, p.life/200*0.72);
          ctx.save();
          ctx.globalAlpha=alpha;
          ctx.fillStyle='rgba(60,200,80,1)';
          ctx.beginPath(); ctx.ellipse(px,py,28,18,0,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='rgba(100,240,120,0.5)';
          ctx.beginPath(); ctx.ellipse(px-8,py-4,14,10,0,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='rgba(80,220,100,0.4)';
          ctx.beginPath(); ctx.ellipse(px+10,py+4,10,8,0,0,Math.PI*2); ctx.fill();
          ctx.font='bold 8px monospace'; ctx.textAlign='center';
          ctx.fillStyle='rgba(255,255,220,0.95)';
          ctx.fillText(p.formulaText||'E=mc²',px,py+3);
          ctx.restore();
        } else if(p.bookFall){
          // Livre tombant — rectangle marron avec lignes
          ctx.fillStyle='#8B4513';
          ctx.fillRect(px-10,py-14,20,18);
          ctx.fillStyle='#a0522d';
          ctx.fillRect(px-9,py-13,18,16);
          // Tranche
          ctx.fillStyle='#f0e8d0';
          ctx.fillRect(px-10,py-13,2,16);
          // Lignes de texte
          ctx.fillStyle='rgba(50,50,100,0.5)';
          for(let li=0;li<4;li++) ctx.fillRect(px-6,py-10+li*4,12,2);
        } else if(p.mop){ drawMop(px,py,p.angle||0); }
        else if(p.puree){
          // Blob de purée (jaune/beige)
          ctx.globalAlpha=0.9;
          ctx.fillStyle='#e8d060'; ctx.beginPath();
          ctx.ellipse(px,py,10,7,0,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#f0e080';
          ctx.beginPath(); ctx.ellipse(px-2,py-2,5,4,0,0,Math.PI*2); ctx.fill();
          ctx.globalAlpha=1;
        } else if(p.vomit){
          // Arc de vomi (vert fluo)
          ctx.globalAlpha=0.85;
          ctx.fillStyle='#88ee44';
          ctx.beginPath(); ctx.ellipse(px,py,8,6,0,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#aaff66';
          ctx.beginPath(); ctx.ellipse(px-1,py-1,4,3,0,0,Math.PI*2); ctx.fill();
          ctx.globalAlpha=1;
        } else if(p.bouffe){
          // Projectile bouffe (pain/pomme random)
          ctx.font='14px monospace'; ctx.textAlign='center';
          ctx.fillText(['🍎','🍞','🥕','🥐'][~~(p.life*0.04)%4], px, py);
        } else {
          drawEquation(px,py,p.formula,p.col);
        }
      }
      drawKvBoulettes();
      drawKevin(~~wx(KV.x),~~KV.y);
      // TokTok golden glow
      if(KV.tokTok>0){
        const alpha=Math.sin(Date.now()*.01)*.3+.5;
        const sx=~~wx(KV.x+16), sy=~~KV.y;
        ctx.globalAlpha=alpha*.7;
        ctx.shadowColor='#ffcc00'; ctx.shadowBlur=20;
        ctx.font='20px monospace'; ctx.textAlign='center';
        ctx.fillText('📱',sx,sy-50);
        ctx.shadowBlur=0; ctx.globalAlpha=1;
        // Aura dorée autour de Kevin
        ctx.globalAlpha=alpha*.35;
        ctx.fillStyle='#ffcc00';
        ctx.beginPath(); ctx.ellipse(sx,sy+20,28,38,0,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;
      }
      // Overlay TokTok invincibilité
      drawTokTokOverlay();
      // Effet défoncé (overlay violet + texte)
      if(KV.defonce>0){
        const da=Math.min(0.38,KV.defonce*.12)*(Math.sin(Date.now()*.012)*.3+.7);
        ctx.fillStyle=`rgba(90,0,170,${da})`; ctx.fillRect(0,0,W,H);
        ctx.save(); ctx.globalAlpha=Math.min(1,KV.defonce*.45);
        ctx.font='bold 18px monospace'; ctx.textAlign='center';
        ctx.strokeStyle=C.BLACK; ctx.lineWidth=3;
        ctx.strokeText('DÉFONCÉ... 🌿',W/2,H/2);
        ctx.fillStyle='#a060ff'; ctx.fillText('DÉFONCÉ... 🌿',W/2,H/2);
        ctx.restore();
      }
      drawParticles();
      drawHUD();
      drawKillFlash();
      drawBiteBonus();
      drawIntoxOverlay();
      if(G.state===ST.PAUSE) drawPause();
      break;
    case ST.OVER:  drawGameOver(); break;
    case ST.WIN:   drawWin(); break;
  }
}

let lastTS=0;
function loop(ts){
  // Premier frame : lastTS=0 → dt serait énorme → Kevin tombe hors sol
  if(lastTS===0) lastTS=ts-16;
  const dt=Math.min((ts-lastTS)/1000,.033); // max 33ms = 30fps min
  lastTS=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

  });

  brosseItems=[]; smokeItems=[]; blockers=[];

  if(_classroomInsultInt){ clearInterval(_classroomInsultInt); _classroomInsultInt=null; }
  G.state=ST.OVER;
  stopMusic();
  if(G.score>G.best){ G.best=G.score; localStorage.setItem('fs_hs',G.best); }

function winGame(){
  if(G.level===1){
    // Niveau 1 terminé → transition vers le couloir
    if(_classroomInsultInt){ clearInterval(_classroomInsultInt); _classroomInsultInt=null; }
    G.killScore += 500; // bonus fin de classe
    G.score = G.scoreBonus + G.killScore + ~~(G.maxX/8);
    G.levelScore = G.score;
    G.state=ST.CTRANSIT; G.transitStart=Date.now();
    stopMusic(); sfx.win();
    window.speechSynthesis&&window.speechSynthesis.cancel();
    setTimeout(()=>{ if(G.state===ST.CTRANSIT) startCorridor(); }, 3200);
  } else if(G.level===2){
    G.levelScore = G.score - G.scoreBonus;
    G.state=ST.L2END; G.transitStart=Date.now();
    stopMusic(); sfx.bell();
    setTimeout(()=>{ if(G.state===ST.L2END) startCantine(); }, 5500);
  } else if(G.level===3){
    G.levelScore = G.score - G.scoreBonus;
    G.state=ST.L3END; G.transitStart=Date.now();
    stopMusic(); sfx.bell();
    setTimeout(()=>{ if(G.state===ST.L3END) startLevel3(); }, 5500);
  } else {
    G.state=ST.WIN;
    stopMusic(); sfx.win();
    if(G.score>G.best){ G.best=G.score; localStorage.setItem('fs_hs',G.best); }
  }
}
function goMenu(){
  if(_classroomInsultInt){ clearInterval(_classroomInsultInt); _classroomInsultInt=null; }
  G.state=ST.MENU; stopMusic(); stopClassroomMusic();
  window.speechSynthesis&&window.speechSynthesis.cancel();
}

// Gestion clic clavier sur menu/game over/win
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const sc=W/rect.width;
  const gx=(e.clientX-rect.left)*sc, gy=(e.clientY-rect.top)*sc;
  if(G.state===ST.MENU){ startGame(); return; }
  if(G.state===ST.INTRO){ startClassroom(); return; }
  if(G.state===ST.L2END){ startCantine(); return; }
  if(G.state===ST.L3END){ startLevel3(); return; }
  if(G.state===ST.OVER){
    if(gy>H/2+70&&gy<H/2+132) restartCurrentLevel();
    else if(gy>H/2+130) goMenu();
    return;
  }
  if(G.state===ST.WIN){
    if(gy>H/2+55&&gy<H/2+116) startCorridor();
    else if(gy>H/2+115) goMenu();
    return;
  }
  if(G.state===ST.PAUSE){
    if(gy>H/2-15&&gy<H/2+45) togglePause();
    else if(gy>H/2+50) goMenu();
    return;
  }
  if(G.state===ST.PLAY){
    if(gx>W-42&&gy<42) togglePause();
    if(gx<42&&gy<42) toggleSound();
  }
});

// ═══ INIT ═══
resize();
requestAnimationFrame(loop);

// ── Bouton plein écran ──
(function(){
  const btn = document.getElementById('fs-btn');
  if(!btn) return;

  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  const isStandalone = navigator.standalone === true;

  // Sur iOS en standalone (ajouté à l'écran d'accueil) → déjà plein écran, cache le bouton
  if(isIOS && isStandalone){ btn.style.display='none'; return; }

  // Sur iOS standard : pas de requestFullscreen → affiche tooltip
  if(isIOS){
    btn.textContent = '↗ Plein écran';
    // Crée le tooltip d'instructions
    const tip = document.createElement('div');
    tip.id = 'ios-tip';
    tip.style.cssText = `
      display:none; position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
      background:rgba(20,20,20,0.96); color:#fff; font:14px monospace;
      border:2px solid #ffcc00; border-radius:14px; padding:14px 20px;
      z-index:999; text-align:center; line-height:1.7; max-width:300px;
      box-shadow:0 4px 24px rgba(0,0,0,0.7);
    `;
    tip.innerHTML = `<b>📱 Plein écran iPhone :</b><br>
      1. Tape <b>⬆ Partager</b> (barre Safari)<br>
      2. Choisis <b>"Sur l'écran d'accueil"</b><br>
      3. Ouvre le jeu depuis l'icône — mode full ! 🎮<br>
      <small style="color:#aaa">← Tap pour fermer →</small>`;
    document.body.appendChild(tip);

    btn.addEventListener('click', ()=>{
      tip.style.display = tip.style.display==='none' ? 'block' : 'none';
    });
    tip.addEventListener('click', ()=>{ tip.style.display='none'; });
    return;
  }

  // Tous les autres navigateurs : fullscreen standard
  btn.addEventListener('click', ()=>{
    if(!document.fullscreenElement){
      (document.documentElement.requestFullscreen ||
       document.documentElement.webkitRequestFullscreen ||
       document.documentElement.mozRequestFullScreen
      ).call(document.documentElement).catch(()=>{});
      try{ screen.orientation?.lock('landscape'); }catch(e){}
    } else {
      (document.exitFullscreen||document.webkitExitFullscreen||
       document.mozCancelFullScreen).call(document)();
    }
  });
  document.addEventListener('fullscreenchange', ()=>{
    btn.textContent = document.fullscreenElement ? '✕ QUITTER PLEIN ÉCRAN' : '⛶ PLEIN ÉCRAN';
  });
})();
</script>
