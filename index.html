let AC=null;
function getAC(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; }
function resetAC(){
  // Ferme l'AudioContext courant → termine TOUS les oscillateurs en vol
  if(AC){ try{ AC.close(); }catch(e){} AC=null; }
}
function tone(freq,dur,type='square',vol=0.25,delay=0){
  if(!G.sound) return;
  try{const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;o.frequency.value=freq;
    const t=a.currentTime+delay;g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}
}
function noise(dur,fc=800,vol=0.3){
  if(!G.sound)return;
  try{const a=getAC(),buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=a.createBufferSource();src.buffer=buf;
    const f=a.createBiquadFilter();f.type='bandpass';f.frequency.value=fc;
    const g=a.createGain();g.gain.value=vol;src.connect(f);f.connect(g);g.connect(a.destination);src.start();}catch(e){}
}

let _ttMusicInt = null;

const _TT_BPM_MS = 107; // ~140 BPM, croches

function startTokTokMusic(){
  if(_ttMusicInt) return;
  _ttBeat = 0;

  _ttMusicInt = setInterval(()=>{
    if(KV.tokTok <= 0){ stopTokTokMusic(); return; }
    if(G.state !== ST.PLAY || !G.sound) return;
    const b = _ttBeat % 16;
    // Kick : temps 0 et 8
    if(b===0||b===8)  noise(.07, 70, .55);
    // Snare : temps 4 et 12
    if(b===4||b===12) noise(.05, 280, .35);
    // Hi-hat : toutes les croches
    noise(.02, 7000, .10);
    // Basse (onde carrée grave pulsante)
    if(b===0||b===2||b===8||b===10) tone([98,98,110,131][~~(b/4)],.1,'square',.22);
    // Mélodie synthé : gamme penta de Do
    const mel=[523,659,784,880,1047,1319,1568];
    const pat=[0,2,4,2,5,4,2,0,  1,3,5,3,6,5,3,1];
    tone(mel[pat[b]],.09,'square',.14);
    _ttBeat++;
  }, _TT_BPM_MS);
}
function stopTokTokMusic(){
  if(_ttMusicInt){ clearInterval(_ttMusicInt); _ttMusicInt=null; }

const TOKTOK_OVERLAY_MSGS = [
  '⚡ AUCUN PROF PEUT TE TOUCHER ⚡',
  '📱 ABONNÉS : ∞  |  COLLES : 0 📱',
  '🔥 KEVIN EST INTOUCHABLE 🔥',

function drawTokTokOverlay(){
  if(KV.tokTok <= 0) return;
  const prog = Math.max(0, KV.tokTok / 5); // 1→0
  const f = G.frame;
  const hue = (f * 5) % 360;

  // Franges rainbow sur les bords
  ctx.save();
  ctx.globalAlpha = 0.22 + Math.sin(f * 0.3) * 0.08;
  const grdT = ctx.createLinearGradient(0,0,W,0);
  grdT.addColorStop(0, `hsl(${hue},100%,55%)`);
  grdT.addColorStop(0.5, `hsl(${(hue+120)%360},100%,55%)`);
  grdT.addColorStop(1, `hsl(${(hue+240)%360},100%,55%)`);
  ctx.fillStyle = grdT;
  ctx.fillRect(0, 48, W, 6);
  ctx.fillRect(0, H-60, W, 6);
  ctx.restore();

  // Texte rotatif (change toutes les 2s ≈ 120 frames)
  const msgIdx = ~~(((5 - KV.tokTok) / 5 * TOKTOK_OVERLAY_MSGS.length)) % TOKTOK_OVERLAY_MSGS.length;
  const msg = TOKTOK_OVERLAY_MSGS[msgIdx];

  // Fond semi-opaque derrière le texte
  const pulse = 1 + Math.sin(f * 0.2) * 0.06;
  const sz = ~~(18 * pulse);
  ctx.save();
  ctx.globalAlpha = 0.55 + Math.sin(f * 0.25) * 0.1;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, H/2 - sz - 6, W, sz * 2 + 18);
  ctx.restore();

  // Texte rainbow géant
  ctx.save();
  ctx.font = `900 ${sz}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Ombre noire
  ctx.lineWidth = 5; ctx.strokeStyle = '#000';
  ctx.globalAlpha = 0.9;
  ctx.strokeText(msg, W/2, H/2);
  // Dégradé rainbow
  const grd = ctx.createLinearGradient(0, H/2 - sz, 0, H/2 + sz);
  grd.addColorStop(0,   `hsl(${hue},100%,65%)`);
  grd.addColorStop(0.33,`hsl(${(hue+90)%360},100%,65%)`);
  grd.addColorStop(0.66,`hsl(${(hue+180)%360},100%,65%)`);
  grd.addColorStop(1,   `hsl(${(hue+270)%360},100%,65%)`);
  ctx.fillStyle = grd;
  ctx.fillText(msg, W/2, H/2);
  ctx.restore();

  // Barre de progression invincibilité
  const bw = W * 0.55, bx = W/2 - bw/2, by = H/2 + sz + 8;
  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#111'; ctx.fillRect(bx - 2, by - 2, bw + 4, 10);
  const barG = ctx.createLinearGradient(bx, 0, bx + bw * prog, 0);
  barG.addColorStop(0, `hsl(${hue},100%,55%)`);
  barG.addColorStop(1, `hsl(${(hue+120)%360},100%,55%)`);
  ctx.fillStyle = barG; ctx.fillRect(bx, by, bw * prog, 6);
  ctx.restore();

  // Sparkles orbitaux
  const emojis = ['⭐','✨','💫','🔥','📱','💸'];
  ctx.save();
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  for(let i = 0; i < 6; i++){
    const a = f * 0.07 + i * 1.047;
    const rx = ~~(W/2 + Math.cos(a) * 260);
    const ry = ~~(H/2 + Math.sin(a) * 90);
    const es = ~~(13 + Math.sin(f * 0.2 + i) * 3);
    ctx.globalAlpha = 0.8 + Math.sin(f * 0.15 + i) * 0.2;
    ctx.font = `${es}px monospace`;
    ctx.fillStyle = `hsl(${(hue + i*60) % 360},100%,70%)`;
    ctx.fillText(emojis[i], rx, ry);
  }
  ctx.restore();
}

  if(_shoutTO){ clearTimeout(_shoutTO); _shoutTO=null; }

function _doShout(){
  _shoutTO=null;
  if(G.state!==ST.PLAY||!G.sound) return;
  // Choisir une phrase différente de la précédente
  let p;
  do { p=PROF_PHRASES[~~(Math.random()*PROF_PHRASES.length)]; } while(p===_lastPhrase);
  _lastPhrase=p;
  // Afficher en jeu
  spawnFT('😤 '+p, W/2, 30+Math.random()*30, '#ff2200', true);
  // Voix synthétique
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(p);
    u.lang='fr-FR'; u.rate=1.0+Math.random()*.5; u.pitch=0.6+Math.random()*.5; u.volume=0.7;
    window.speechSynthesis.speak(u);
  }
  // Prochain cri dans 6-10s
  _shoutTO=setTimeout(_doShout, 6000+Math.random()*4000);
}

// ── Text-to-Speech (voix prof en colère) ──
function speak(text){
  if(!G.sound||!window.speechSynthesis)return;
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='fr-FR'; u.pitch=1.5; u.rate=1.05; u.volume=0.85;
    // Cherche une voix française si dispo
    const voices=window.speechSynthesis.getVoices();
    const frVoice=voices.find(v=>v.lang.startsWith('fr'));
    if(frVoice) u.voice=frVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function resetKevin(){
  KV.x=80; KV.y=GND-48; KV.vx=0; KV.vy=0; KV.facing=1;
  KV.onGnd=false; KV.action='idle';
  KV.frame=0; KV.fTimer=0;
  KV.hp=KV.maxHp; KV.invincT=0;
  KV.atkTimer=0; KV.atkCooldown=0; KV.atkPhase=0; KV.deadTimer=0;
  KV.hasBaguette=false; KV.hasBrosse=false; KV.defonce=0;
  KV.hasBoulette=false; KV.bouletteT=0; KV.tokTok=0;
}

function updateKevin(dt){
  if(KV.action==='dead'){ KV.deadTimer+=dt*60; return; }

  // Défoncé (fumée) — décompte + effets
  if(KV.defonce>0){
    KV.defonce-=dt;
    if(KV.defonce<0) KV.defonce=0;
    // Saut automatique aléatoire (panique)
    if(KV.onGnd&&Math.random()<0.007*dt*60){
      KV.vy=JUMP_FORCE*0.75; KV.onGnd=false;
    }
  }

  // Cooldowns
  if(KV.invincT>0) KV.invincT-=dt*60;
  if(KV.atkCooldown>0) KV.atkCooldown-=dt;
  if(KV.atkTimer>0){
    KV.atkTimer-=dt;
    // Phase 0=windup(0.35→0.22) | 1=swing+hitbox(0.22→0.08) | 2=recovery(0.08→0)
    if(KV.atkTimer>0.22)      KV.atkPhase=0;
    else if(KV.atkTimer>0.08) KV.atkPhase=1;
    else                       KV.atkPhase=2;
    if(KV.atkTimer<=0){ KV.atkTimer=0; KV.atkPhase=0; KV.atkCooldown=0.42; }
  }

  // Mouvement horizontal (contrôles inversés si défoncé)
  if(KV.action!=='hurt'){
    const inv=KV.defonce>0; // inversion gauche/droite
    const goLeft  = inv ? CTRL.right : CTRL.left;
    const goRight = inv ? CTRL.left  : CTRL.right;
    if(goLeft)  { KV.vx=Math.max(KV.vx-ACCEL*dt*60, -MAX_VX); KV.facing=-1; }
    if(goRight) { KV.vx=Math.min(KV.vx+ACCEL*dt*60,  MAX_VX); KV.facing=1;  }
    if(!goLeft&&!goRight) KV.vx*=Math.pow(FRIC, dt*60);
  } else {
    // Knockback en cours
    KV.vx *= Math.pow(0.85, dt*60);
    if(Math.abs(KV.vx)<0.1) KV.action='idle';
  }

  // Clamp monde
  KV.x = Math.max(0, Math.min(WORLD_W-32, KV.x + KV.vx*dt*60));

  // Gravité
  KV.vy += GRAVITY*dt*60;
  KV.y  += KV.vy*dt*60;

  // Collision plateformes (PLATS ou PLATS_L3 selon le niveau)
  KV.onGnd=false;
  for(const p of currentPlats){
    if(resolveKvPlat(p)) break;
  }
  // Bagarres au sol — bloquent uniquement quand Kevin est près du sol
  resolveKvBlockers();

  // ── Coyote time ──
  if(KV.onGnd){ coyoteT=COYOTE_F; }
  else if(coyoteT>0){ coyoteT--; }
  // ── Jump buffer ──
  if(jumpBufT>0){ jumpBufT--; if(KV.onGnd||coyoteT>0) _execJump(); }
  // ── Variable jump height (relâcher = couper le saut) ──
  if(!jumpHeld&&KV.vy<0) KV.vy*=0.90;

  // Action
  if(KV.action!=='hurt'&&KV.action!=='attack'){
    if(!KV.onGnd)       KV.action = KV.vy<0?'jump':'fall';
    else if(Math.abs(KV.vx)>0.4) KV.action='run';
    else                KV.action='idle';
  }
  if(KV.atkTimer>0) KV.action='attack';

  // Frames animation
  KV.fTimer+=dt*60;
  if(KV.fTimer>=6){ KV.fTimer=0; KV.frame=(KV.frame+1)%4; }

  // Poussière
  if(KV.onGnd&&KV.action==='run'&&KV.frame%2===0)
    spawnDust(KV.x+8, KV.y+46);
}

function resolveKvPlat(p){
  const kl=KV.x+4, kr=KV.x+28, kfeet=KV.y+48;
  // Vérif chevauchement horizontal
  if(kr<=p.x||kl>=p.x+p.w) return false;
  if(p.ground){
    // Sol : clamp simple, pas besoin de vérifier prev
    if(kfeet>=p.y&&KV.vy>=0){
      KV.y=p.y-48; KV.vy=0; KV.onGnd=true; return true;
    }
  } else {
    // Plateforme flottante : atterrir uniquement en tombant, depuis le dessus
    // Tolérance 20px pour éviter le tunneling à haute vitesse
    if(KV.vy>=0&&kfeet>=p.y&&kfeet<=p.y+20){
      KV.y=p.y-48; KV.vy=0; KV.onGnd=true; return true;
    }
  }
  return false;
}

function resolveKvBlockers(){
  // N'obstrue que si Kevin est au niveau du sol (pas en l'air sur plateforme)
  if(KV.y < GND-80) return;
  for(const b of blockers){
    const kl=KV.x+4, kr=KV.x+28;
    if(kr>b.x+4 && kl<b.x+b.w-4){
      if(KV.vx>=0 && KV.x+16 < b.x+b.w/2){ KV.x=b.x+4-28; KV.vx=0; }
      else if(KV.vx<=0 && KV.x+16 >= b.x+b.w/2){ KV.x=b.x+b.w-4-4; KV.vx=0; }
    }
  }
}

function _execJump(){
  KV.vy=JUMP_FORCE; KV.onGnd=false; coyoteT=0; jumpBufT=0; sfx.jump();
}
function doJump(){
  if(KV.action==='dead'||KV.action==='hurt') return;
  if(KV.onGnd||coyoteT>0){ _execJump(); }
  else { jumpBufT=JUMP_BUF; } // mémorise le saut
}

function _drawBaguette(kx,ky,facing,atkTimer){
  if(atkTimer<=0) return;

  // Pivot = main droite de Kevin
  const hx = facing>0 ? kx+28 : kx+4;
  const hy = ky+20;

  // Progression 0→1 sur toute l'animation
  const prog = Math.max(0, Math.min(1, 1 - atkTimer/0.35));

  // Arc de balayage façon coup d'épée :
  // Droite : -120° (levé derrière) → +30° (étendu devant en bas)
  // Gauche : miroir
  const ARC_START = -Math.PI * 0.68; // levé haut-arrière
  const ARC_END   =  Math.PI * 0.18; // étendu bas-avant
  // Easing : lent au départ, ultra-rapide au milieu, ralentit en fin
  const ease = prog < 0.5
    ? 2 * prog * prog
    : 1 - Math.pow(-2*prog+2, 2)/2;
  const angle = ARC_START + (ARC_END - ARC_START) * ease;
  // Miroir si face gauche
  const finalAngle = facing>0 ? angle : Math.PI - angle;

  // ── Traînée motion-blur (3 fantômes) ──
  // uniquement pendant la phase de balayage rapide (prog 0.25→0.85)
  if(prog>0.25 && prog<0.85){
    for(let t=1;t<=3;t++){
      const tp = Math.max(0, prog - t*0.09);
      const te = tp<0.5 ? 2*tp*tp : 1-Math.pow(-2*tp+2,2)/2;
      const ta = ARC_START+(ARC_END-ARC_START)*te;
      const tfa = facing>0 ? ta : Math.PI-ta;
      ctx.save();
      ctx.globalAlpha=(4-t)*.08;
      ctx.translate(hx,hy); ctx.rotate(tfa);
      ctx.fillStyle=C.LBGE; ctx.fillRect(-3,-52,7,64);
      ctx.restore();
    }
  }

  // ── Baguette principale ──
  ctx.save();
  ctx.translate(hx,hy);
  ctx.rotate(finalAngle);
  // Corps
  ctx.fillStyle=C.BGUE; ctx.fillRect(-3,-52,8,65);
  ctx.fillStyle=C.LBGE; ctx.fillRect(-1,-50,4,61);
  // Entailles (grignées, c'est la cantine)
  ctx.fillStyle=C.BGUE;
  ctx.fillRect(-2,-40,7,2); ctx.fillRect(-2,-25,7,2); ctx.fillRect(-2,-10,7,2);
  // Pointe
  ctx.fillStyle=C.BGUE; ctx.fillRect(-2,-57,6,9);
  ctx.fillStyle=C.LBGE; ctx.fillRect(-1,-55,3,6);
  ctx.restore();
  ctx.globalAlpha=1;
}

function drawEnemy(e){
  if(!e.on) return;
  const sx=~~wx(e.x), sy=~~wy(e.y);
  if(sx<-e.def.w-10||sx>W+10) return;

  const fl=e.facing<0;

  ctx.save();
  // Flash DANS le save pour restauration automatique
  const flash=e.hitT>0&&Math.floor(e.hitT/3)%2===0;
  if(flash) ctx.globalAlpha=.4;

  if(fl){
    ctx.translate(sx+e.def.w, 0);
    ctx.scale(-1, 1);
    switch(e.type){
      case 'FOUI': _drawFouine(0,sy,e.frame); break;
      case 'CALC': _drawCalc(0,sy,e.frame);   break;
      case 'GROG': _drawGrog(0,sy);           break;
      case 'KEKE': _drawKeke(0,sy,e.frame);   break;
      case 'TONY': _drawTony(0,sy,e.frame);   break;
      case 'MBAT': _drawMbat(0,sy,e.frame);   break;
      case 'PION': _drawPion(0,sy,e.frame);   break;
    }
  } else {
    switch(e.type){
      case 'FOUI': _drawFouine(sx,sy,e.frame); break;
      case 'CALC': _drawCalc(sx,sy,e.frame);   break;
      case 'GROG': _drawGrog(sx,sy);           break;
      case 'KEKE': _drawKeke(sx,sy,e.frame);   break;
      case 'TONY': _drawTony(sx,sy,e.frame);   break;
      case 'MBAT': _drawMbat(sx,sy,e.frame);   break;
      case 'PION': _drawPion(sx,sy,e.frame);   break;
    }
  }
  ctx.restore(); // restaure globalAlpha + transform

  // HP bar
  if(e.hp<e.def.hp&&e.hp>0){
    const bw=e.def.w, bx=sx, by=sy-10;
    r(bx,by,bw,5,C.DRED);
    r(bx,by,~~(bw*e.hp/e.def.hp),5,C.GREEN);
    rOut(bx,by,bw,5,'rgba(0,0,0,0)',C.BLACK);
  }

  // Nom
  ctx.font='bold 7px monospace'; ctx.textAlign='center';
  ctx.strokeStyle=C.BLACK; ctx.lineWidth=2;
  ctx.strokeText(e.def.name,sx+e.def.w/2,sy-12);
  ctx.fillStyle=C.WHITE; ctx.fillText(e.def.name,sx+e.def.w/2,sy-12);

  // Phrase — bulle lisible au-dessus du nom
  if(e.phraseT>0){
    const al=Math.min(1,e.phraseT/30);
    const tx=sx+e.def.w/2, ty=sy-30;
    ctx.globalAlpha=al;
    // Fond bulle
    ctx.font='bold 10px monospace';
    const tw=ctx.measureText(e.def.phrase).width;
    r(tx-tw/2-4,ty-12,tw+8,16,'rgba(0,0,0,.75)');
    // Texte
    ctx.textAlign='center';
    ctx.fillStyle=e.type==='FOUI'||e.type==='CALC'||e.type==='GROG'?C.ORANGE:C.NEON;
    ctx.fillText(e.def.phrase,tx,ty);
    ctx.globalAlpha=1;
  }
}

// ── Fumeurs + nuages toxiques ──
function updateSmokeItems(dt){
  const F=dt*60;
  for(const s of smokeItems){
    s.frame+=F;
    s.puffT-=dt;
    if(s.puffT<=0){
      s.puffT=0.7+Math.random()*0.6;
      s.clouds.push({
        x:s.x+(Math.random()*16-8),
        y:s.y-8,
        vx:(Math.random()-.5)*0.35,
        vy:-0.28-Math.random()*0.3,
        r:10, maxR:26+Math.random()*12,
        life:1, decay:0.0035+Math.random()*0.003,
      });
    }
    for(let i=s.clouds.length-1;i>=0;i--){
      const c=s.clouds[i];
      c.x+=c.vx*F; c.y+=c.vy*F;
      c.r=Math.min(c.r+0.12*F, c.maxR);
      c.life-=c.decay*F;
      if(c.life<=0){ s.clouds.splice(i,1); continue; }
      // Collision Kevin (coordonnées monde)
      if(KV.action!=='dead'&&KV.defonce<=0){
        const dxw=KV.x+16-c.x, dyw=KV.y+24-c.y;
        if(Math.sqrt(dxw*dxw+dyw*dyw)<c.r+14){
          KV.defonce=3.2;
          spawnFT('DÉFONCÉ... 🌿',KV.x+16,KV.y-50,'#60dd60',true);
          if(G.sound){ tone(220,.2,'sawtooth',.25); tone(165,.4,'triangle',.18,.1); }
        }
      }
    }
  }
}

      r(bx1,   gy2-4, 16, 6,C.DBROWN); r(bx2,  gy2-4, 16, 6,C.YELLOW);

      r(bx1+4, gy2+4,  6,2,'#70402a'); r(bx2+4,gy2+4,  6,2,'#70402a');
      // Bras enlacés
      r(bx1+16,gy2+14,14,8,C.SKIN);   r(bx2-4, gy2+14,14,8,C.SKIN);

      r(bx1+2, gy2+38, 6,14,C.BLUE);  r(bx1+10,gy2+38, 6,14,C.BLUE);
      r(bx2+2, gy2+38, 6,14,'#603080');r(bx2+10,gy2+38, 6,14,'#603080');
      // Cœurs flottants
      const ht=~~(Math.sin(f*1.4)*5);
      ctx.font='14px monospace'; ctx.textAlign='center'; ctx.fillStyle=C.RED;
      ctx.globalAlpha=.92; ctx.fillText('❤',sx+b.w/2,gy2-16+ht);
      ctx.font='10px monospace'; ctx.globalAlpha=.72;
      ctx.fillText('❤',sx+b.w/2-12,gy2-6+~~(ht*.5));
      ctx.fillText('❤',sx+b.w/2+12,gy2-6+~~(ht*.5));
      ctx.globalAlpha=1;
      // Label
      ctx.font='bold 11px monospace'; ctx.textAlign='center';
      ctx.lineWidth=3; ctx.strokeStyle=C.BLACK;
      ctx.strokeText('💋 CÂLIN 💋',sx+b.w/2,gy2-30);
      ctx.fillStyle=C.PINK; ctx.fillText('💋 CÂLIN 💋',sx+b.w/2,gy2-30);
      // Bordure rose pulsée
      const pp=Math.sin(f*1.2)*.2+.22;
      ctx.globalAlpha=pp;
      ctx.strokeStyle=C.PINK; ctx.lineWidth=2;
      ctx.strokeRect(sx,gy2-34,b.w,84);
      ctx.globalAlpha=1;
      continue; // ne pas tomber dans le code bagarre
    }

    // ── BAGARRE (niveau 2) ──
    const gy2=GND-44;
    const f=b.frame;
    const n=3, sw=~~(b.w/n);

    // Nuages de fumée/poussière de bagarre (fond, avant les persos)
    for(let c=0;c<5;c++){
      const ca=f*.07+c*1.26;
      const cx=sx+b.w*.2+c*(b.w*.15)+Math.sin(ca)*8;
      const cy=gy2+12+Math.cos(ca*.7)*10;
      const cr=10+Math.sin(ca+c)*.5*6+c*2;
      const al=Math.sin(ca*.8)*.22+0.28;
      ctx.globalAlpha=al;
      ctx.fillStyle=`rgba(220,220,220,1)`;
      ctx.beginPath(); ctx.arc(~~cx,~~cy,~~cr,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // Personnages
    for(let i=0;i<n;i++){
      const ex=sx+i*sw+6, ey=gy2;
      const t=f*.10+i*2.1;
      const arm=~~(Math.sin(t)*10);
      const bob=~~(Math.abs(Math.sin(t))*4);
      const c1=['#e05030','#30a050','#3050e0'][i%3];
      const hc=[C.DBROWN,C.DGRAY,C.YELLOW][i%3];
      // Corps
      r(ex+2,ey+14-bob,16,22,c1);
      // Tête (bouge vers le haut à l'impact)
      r(ex+4,ey+2-bob,12,13,C.SKIN);
      r(ex+3,ey-2-bob,14,6,hc);
      // Yeux (colère)
      r(ex+6,ey+5-bob,3,2,C.BLACK); r(ex+11,ey+5-bob,3,2,C.BLACK);
      // Bras — swing énergique
      r(ex-6+arm, ey+14,7,13,C.SKIN);
      r(ex+13-arm,ey+14,7,13,C.SKIN);
      // Poings
      r(ex-8+arm, ey+25,7,7,C.DSKIN);
      r(ex+13-arm,ey+25,7,7,C.DSKIN);
      // Jambes écartées
      r(ex+3, ey+36,7,14,C.BLUE); r(ex+12,ey+36,7,14,C.BLUE);
      r(ex+1, ey+48,9, 5,C.BLACK); r(ex+12,ey+48,9, 5,C.BLACK);

      // Étoiles/impacts aux poings
      if(~~(t*2.5)%4===0){
        ctx.font='13px monospace'; ctx.textAlign='center';
        ctx.globalAlpha=.95;
        const starCols=[C.YELLOW,C.RED,C.WHITE];
        ctx.fillStyle=starCols[~~(t)%3];
        ctx.fillText('★',ex+9+arm,ey+20-bob);
        ctx.globalAlpha=1;
      }
      if(~~(t*2)%5===0){
        ctx.font='11px monospace'; ctx.textAlign='center'; ctx.fillStyle=C.ORANGE;
        ctx.globalAlpha=.85; ctx.fillText('💥',ex+9-arm,ey+18); ctx.globalAlpha=1;
      }
    }

    // Label BAGARRE! — gros, visible, avec outline
    ctx.font='bold 15px monospace'; ctx.textAlign='center';
    ctx.lineWidth=4; ctx.strokeStyle=C.BLACK;
    ctx.strokeText('⚡ BAGARRE ! ⚡',sx+b.w/2,gy2-12);
    ctx.fillStyle=~~(f*.08)%2===0?C.RED:C.YELLOW;
    ctx.fillText('⚡ BAGARRE ! ⚡',sx+b.w/2,gy2-12);

    // Flash orange autour de la zone
    const pulse=Math.sin(f*.15)*.3+.25;
    ctx.globalAlpha=pulse;
    ctx.strokeStyle=C.ORANGE; ctx.lineWidth=3;
    ctx.strokeRect(sx,gy2-16,b.w,66);
    ctx.globalAlpha=1;
  }
}

// ═══ BATMAN KILL FLASH ═══
let killFlash = null;
const BATMAN_WORDS_N2 = ['BAM!','POW!','WHAM!','BAPH!','AÏE!','BLAM!','KA-POW!','CRAC!'];
const BATMAN_WORDS_N3 = ['PAF!','BIM!','BOOM!','SPLASH!','SMASH!','GLOP!','FLAC!'];
const BATMAN_QUIPS_N2 = [
  'Prends-toi ma grosse baguette !',
  "T'as pris la baguette dans la face !",
  'La baguette de la mort !!!',
  "C'est la baguette, bébé !",
  'Mange ça, espèce de prof !',
];
const BATMAN_QUIPS_N3 = [
  'La brosse de chiottes frappe !',
  'PAF dans la tronche !',
  'Brosse-toi les dents avec ça !',
  'Hygiène maximale !',
  'Serpillère de la vengeance !!!',
];
const BATMAN_IMPORTANT = new Set(['GROG','CALC','FOUI','PION','TONY']);
const BATMAN_COLS = ['#ff2200','#ffcc00','#00ffcc','#ff44cc','#ff8800','#44ddff'];

function triggerKillFlash(e){
  const isN3 = G.level===3;
  const isImportant = BATMAN_IMPORTANT.has(e.type);
  const doFreeze = isImportant && Math.random()<0.33;
  const words = isN3 ? BATMAN_WORDS_N3 : BATMAN_WORDS_N2;
  const quips = isN3 ? BATMAN_QUIPS_N3 : BATMAN_QUIPS_N2;
  const dur = doFreeze ? (120+~~(Math.random()*60)) : 50; // frames
  killFlash = {
    word: words[~~(Math.random()*words.length)],
    quip: quips[~~(Math.random()*quips.length)],
    col:  BATMAN_COLS[~~(Math.random()*BATMAN_COLS.length)],
    col2: BATMAN_COLS[~~(Math.random()*BATMAN_COLS.length)],
    timer: dur, maxTimer: dur,
    freeze: doFreeze,
    enemyType: e.type,
    angle: (Math.random()-0.5)*0.18,
    sx: ~~wx(e.x+e.w/2), sy: ~~(e.y+e.h/2), // screen pos at kill moment
  };
  if(doFreeze) speak(killFlash.quip);
}

function drawKillFlash(){
  if(!killFlash) return;
  const t = killFlash.timer, mt = killFlash.maxTimer;
  const progress = t/mt; // 1→0 as it expires
  const fadeIn  = Math.min(1, (mt-t)/(mt*0.15));  // fast fade-in
  const fadeOut = Math.min(1, t/(mt*0.25));         // fade out at end

  // Full-screen freeze overlay (portrait)
  if(killFlash.freeze){
    // Dark overlay
    ctx.save();
    ctx.globalAlpha = Math.min(0.82, fadeIn*0.82);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0,0,W,H);
    ctx.restore();

    // Scanlines effect
    ctx.save();
    ctx.globalAlpha = Math.min(0.15, fadeIn*0.15);
    for(let y=0;y<H;y+=4){
      ctx.fillStyle='#000';
      ctx.fillRect(0,y,W,2);
    }
    ctx.restore();

    // Giant pixelated enemy portrait (center screen)
    const shake = t<10 ? (Math.random()-0.5)*8 : 0;
    const wiggle = Math.sin(G.frame*0.5)*6*(progress*0.7+0.3);
    const px = W/2 + shake + wiggle*0.5;
    const py = H/2 - 20 + shake*0.5;
    drawBatmanPortrait(killFlash.enemyType, px, py, progress, G.frame);

    // Freeze quip text
    const qa = fadeIn*fadeOut;
    if(qa>0.05){
      ctx.save();
      ctx.globalAlpha = qa;
      ctx.textAlign = 'center';
      const qsize = Math.min(22, 14+Math.floor(fadeIn*8));
      ctx.font = `bold ${qsize}px monospace`;
      ctx.lineWidth = 5; ctx.strokeStyle = '#000';
      ctx.strokeText(killFlash.quip, W/2, H-38);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(killFlash.quip, W/2, H-38);
      ctx.restore();
    }
  }

  // Batman WORD — always shown
  const wordAlpha = fadeIn * (killFlash.freeze ? 1 : fadeOut);
  if(wordAlpha>0.04){
    const pulse = killFlash.freeze ? 1 : (1+Math.sin(G.frame*0.35)*0.1);
    const baseSize = killFlash.freeze ? 96 : 72;
    const sz = ~~(baseSize * pulse * (0.6+fadeIn*0.4));
    const wx2 = killFlash.freeze ? W/2 : Math.min(Math.max(killFlash.sx, sz/2+10), W-sz/2-10);
    const wy  = killFlash.freeze ? H/2-90 : Math.max(killFlash.sy-60, sz/2+10);

    ctx.save();
    ctx.globalAlpha = wordAlpha;
    ctx.translate(wx2, wy);
    ctx.rotate(killFlash.angle);

    // Shadow / outline
    ctx.font = `900 ${sz}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Thick black outline
    ctx.lineWidth = sz*0.12;
    ctx.strokeStyle = '#000000';
    ctx.strokeText(killFlash.word, 0, 0);

    // Secondary color (offset)
    ctx.fillStyle = killFlash.col2;
    ctx.fillText(killFlash.word, sz*0.04, sz*0.04);

    // Main color
    ctx.fillStyle = killFlash.col;
    ctx.fillText(killFlash.word, 0, 0);

    // White highlight
    ctx.globalAlpha = wordAlpha*0.5;
    ctx.fillStyle = '#ffffff';
    ctx.font = `900 ${~~(sz*0.9)}px monospace`;
    ctx.fillText(killFlash.word, 0, 0);

    ctx.restore();
  }

  // Small quip (non-freeze mode)
  if(!killFlash.freeze){
    const qa = fadeIn*fadeOut;
    if(qa>0.05){
      ctx.save();
      ctx.globalAlpha = qa;
      ctx.textAlign='center';
      ctx.font=`bold 14px monospace`;
      const qx = Math.min(Math.max(killFlash.sx, 80), W-80);
      const qy = Math.max(killFlash.sy-120, 20);
      ctx.lineWidth=4; ctx.strokeStyle='#000';
      ctx.strokeText(killFlash.quip, qx, qy);
      ctx.fillStyle=killFlash.col;
      ctx.fillText(killFlash.quip, qx, qy);
      ctx.restore();
    }
  }
}

function drawBatmanPortrait(type, cx, cy, progress, frame){
  // Pixelated oversized dying prof portrait
  const s = 5; // pixel scale (each "pixel" = 5px)
  const wigX = Math.sin(frame*0.6)*s*2;
  const wigY = Math.cos(frame*0.4)*s*1.5;

  ctx.save();
  ctx.imageSmoothingEnabled = false;

  const P = (px,py,pw,ph,col,alpha)=>{
    ctx.globalAlpha = (alpha||1)*Math.min(1, (1-progress)*4+0.4);
    ctx.fillStyle=col;
    ctx.fillRect(~~(cx+px*s+wigX),~~(cy+py*s+wigY),pw*s,ph*s);
  };

  // Face / corps selon type
  if(type==='FOUI'||type==='CALC'){
    // Prof classique (tête ronde, costume)
    P(-4,-14,8,8,C.SKIN);     // tête
    P(-2,-16,4,3,'#605030');  // cheveux
    P(-4,-7,8,12,'#334488');  // corps
    P(-6,-5,3,10,'#334488');  // bras G
    P(3,-5,3,10,'#334488');   // bras D
    P(-3,5,3,8,'#223');       // jambe G
    P(0,5,3,8,'#223');        // jambe D
    P(-3,-12,2,3,C.WHITE);    // oeil G
    P(1,-12,2,3,C.WHITE);     // oeil D
    P(-2,-11,2,2,'#000');     // pupille G (spirale mort)
    P(1,-11,2,2,'#000');      // pupille D
    P(-3,-11,6,1,'#000');     // sourcils froncés
    P(-2,-9,4,1,C.RED);       // bouche ouverte (cri)
    // Baguette dans la tête
    const bagAngle = Math.sin(frame*0.8)*0.3+0.1;
    ctx.save();
    ctx.translate(cx+wigX, cy+(-16)*s+wigY);
    ctx.rotate(bagAngle);
    ctx.globalAlpha = Math.min(1,(1-progress)*4+0.4);
    ctx.fillStyle=C.BGUE; ctx.fillRect(-s,-8*s,s*2,s*10);
    ctx.fillStyle=C.LBGE; ctx.fillRect(0,-8*s,s,s*10);
    ctx.fillStyle=C.YELLOW; ctx.fillRect(-s,-9*s,s*2,s*2); // pain de mie qui dépasse
    ctx.restore();
    // Étoiles de mort autour de la tête
    for(let i=0;i<5;i++){
      const a = frame*0.15+i*1.257;
      const sr = (7+i)*s;
      const sx2=cx+Math.cos(a)*sr+wigX, sy2=cy+(-10)*s+Math.sin(a)*sr*0.6+wigY;
      ctx.globalAlpha=0.9*Math.min(1,(1-progress)*4+0.4);
      ctx.fillStyle=['#ff0','#f80','#f00','#ff0','#fff'][i];
      ctx.fillRect(~~sx2,~~sy2,s*2,s*2);
    }

}

// ═══ UPDATE ENNEMIS ═══
function updateEnemies(dt){
  for(const e of enemies){
    if(!e.on) continue;
    if(e.state==='dead'){
      e.deadT+=dt*60;
      e.y+=dt*60*2; // tombe
      if(e.deadT>60){ e.on=false; } continue;
    }
    if(e.hitT>0) e.hitT-=dt*60;
    if(e.state==='hurt'){ e.x+=e.vx*dt*60; e.hitT-=0; if(e.hitT<=0) e.state='patrol'; }

    // Y sinusoïdal pour les volantes (avant le reste)
    if(e.def.flying){
      e.y = e.baseY + Math.sin(Date.now()/480 + e.phaseOff)*16;
    }

    const dist=Math.abs(e.x+e.def.w/2 - KV.x-16);
    // IA
    if(dist < e.def.sight && e.state!=='hurt'){
      e.state='chase';
      e.phraseT=Math.max(e.phraseT,70);
    } else if(dist>e.def.sight*1.3 && e.state==='chase'){
      e.state='patrol';
    }
    if(e.state==='patrol'){
      e.x+=e.vx*dt*60;
      if(e.x<=e.patrolL||e.x>=e.patrolR){ e.vx*=-1; }
    } else if(e.state==='chase'){
      const dir=KV.x<e.x?-1:1;
      e.vx=e.def.spd*1.2*dir;
      e.x+=e.vx*dt*60;
    }
    e.facing = e.vx<0?-1:1;
    e.frame+=dt*60;
    if(e.phraseT>0) e.phraseT-=dt*60;

    // Calcul lance équation / Pion lance serpillère
    if(e.type==='CALC'&&e.state==='chase'){
      e.projTimer+=dt;
      if(e.projTimer>3){ e.projTimer=0; spawnProj(e.x+e.w/2,e.y+20); }
    }
    if(e.type==='PION'&&e.state==='chase'){
      e.projTimer+=dt;
      if(e.projTimer>3.5){ e.projTimer=0; spawnMopProj(e.x+e.w/2,e.y+22); }
    }

    // Collision baguette de Kevin
    const bgHB=getBaguetteHB();
    if(bgHB&&e.state!=='hurt'&&e.hitT<=0){
      const eHB={x:e.x,y:e.y,w:e.w,h:e.h};
      if(overlap(bgHB,eHB)){
        hitEnemy(e);
      }
    }
    // Collision corps Kevin
    if(e.state!=='dead'){
      const kh=kvHB();
      const eh={x:e.x+4,y:e.y+4,w:e.w-8,h:e.h-8};
      if(overlap(kh,eh)) hurtKevin(e.x+e.w/2, e.type);
    }
  }
  // Projectiles (coordonnées MONDE)
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.x+=p.vx*dt*60; p.y+=p.vy*dt*60; p.vy+=.12*dt*60; p.life-=dt*60;
    if(p.mop) p.angle=(p.angle||0)+p.avel*dt*60; // rotation serpillère
    if(p.life<=0||p.x<-50||p.x>WORLD_W+50){ projectiles.splice(i,1); continue; }
    if(KV.invincT<=0&&KV.action!=='dead'){
      const kb=kvHB();
      if(p.x>kb.x&&p.x<kb.x+kb.w&&p.y>kb.y&&p.y<kb.y+kb.h){
        projectiles.splice(i,1); hurtKevin(p.x, p.mop?'PION':'CALC');
      }
    }
  }
}

function hitEnemy(e){

  if(e.hp<=0){
    e.state='dead'; e.deadT=0;
    spawnBurst(e.x+e.w/2,e.y+e.h/2,C.ORANGE,18);

function initClassroom(){
  Object.keys(CTRL).forEach(k=>{ CTRL[k]=false; });
  // Kevin démarre en bas-gauche entre col0 et col1 (sous rangée A)
  CK.x=68; CK.y=368; CK.dir=3; CK.vx=0; CK.vy=0; CK.sprinting=false;
  // Prof 1 (Mme Atomique) — démarre haut-droit pour laisser Kevin respirer
  CT.x=643; CT.y=118; CT.angle=Math.PI;
  CT.ptIdx=5; CT.ptTimer=2.0;
  CT.phraseT=0; CT.phrase=''; CT.fireT=0; CT.mutterT=1.8+Math.random()*1.5;
  CT.alertT=0; CT.throwTimer=2.5+Math.random()*3; CT.throwing=0; CT.speedBoost=0;
  // Prof 2 (Mme Curie) — zone haute
  CT2.x=460; CT2.y=160; CT2.angle=Math.PI;
  CT2.ptIdx=0; CT2.ptTimer=1;
  CT2.phraseT=0; CT2.phrase=''; CT2.alertT=0; CT2.speedBoost=0;
  // Intellos
  CL_INTELLOS.forEach(il=>{ il.alertT=0; il.shoutT=0; });
  CL_GRENADES=[]; CL_ZONES=[]; classBoulettes=[];
  CL_STU_REACT.forEach(r2=>{ r2.t=0; r2.msg=''; });
  CK.hasBoulette=true; CK.bouletteT=0;
  G.classroomGrace=2.0; // 2s d'invincibilité au départ
  cam.x=0;
  PTPOOL.forEach(p=>p.on=false); FTPOOL.forEach(f=>f.on=false);
}

function updateClassroom(dt){
  const F=dt*60;
  if(G.classroomGrace>0) G.classroomGrace-=dt;

  // ── Kevin mouvement avec accélération/décélération ──
  const isMoving = CTRL.left||CTRL.right||(CTRL.up||CTRL.jump)||(CTRL.down||CTRL.atk);
  const maxSpd = CK.sprinting ? 4.4 : 3.0;
  const accel  = 0.4;
  const fric   = Math.pow(0.78, F);
  let mvx=0, mvy=0;
  if(CTRL.left)            mvx=-1;
  if(CTRL.right)           mvx= 1;
  if(CTRL.up  ||CTRL.jump) mvy=-1;
  if(CTRL.down||CTRL.atk)  mvy= 1;
  if(mvx&&mvy){ const n=1/Math.SQRT2; mvx*=n; mvy*=n; }
  // Mise à jour de la direction de regard seulement si Kevin bouge
  if(mvx>0.1) CK.dir=0; else if(mvy>0.1) CK.dir=1;
  else if(mvx<-0.1) CK.dir=2; else if(mvy<-0.1) CK.dir=3;
  // Appliquer accélération ou friction
  if(mvx){ CK.vx=Math.max(-maxSpd,Math.min(maxSpd, CK.vx+mvx*accel*F)); }
  else    { CK.vx*=fric; if(Math.abs(CK.vx)<0.05) CK.vx=0; }
  if(mvy){ CK.vy=Math.max(-maxSpd,Math.min(maxSpd, CK.vy+mvy*accel*F)); }
  else    { CK.vy*=fric; if(Math.abs(CK.vy)<0.05) CK.vy=0; }

  // Collision pupitres — axe X séparé
  const BUF=9;
  let nx=CK.x+CK.vx;
  for(const d of CL_DESKS){
    if(nx>d.x-BUF&&nx<d.x+d.w+BUF&&CK.y>d.y-BUF&&CK.y<d.y+d.h+BUF){
      if(CK.vx>0){ nx=d.x-BUF-0.5; CK.vx=0; }
      else        { nx=d.x+d.w+BUF+0.5; CK.vx=0; }
    }
  }
  CK.x=Math.max(22,Math.min(W-22,nx));
  // Collision pupitres — axe Y séparé
  let ny=CK.y+CK.vy;
  for(const d of CL_DESKS){
    if(CK.x>d.x-BUF&&CK.x<d.x+d.w+BUF&&ny>d.y-BUF&&ny<d.y+d.h+BUF){
      if(CK.vy>0){ ny=d.y-BUF-0.5; CK.vy=0; }
      else        { ny=d.y+d.h+BUF+0.5; CK.vy=0; }
    }
  }
  CK.y=Math.max(22,Math.min(H-22,ny));
  // Poussière si sprint
  if(CK.sprinting&&isMoving&&G.frame%3===0) spawnDust(CK.x,CK.y);

  // ── Mme Atomique — patrouille ──
  CT.ptTimer-=dt;
  const pt=CT_PATROL[CT.ptIdx%CT_PATROL.length];
  const pdx=pt.x-CT.x, pdy=pt.y-CT.y;
  const pdist=Math.sqrt(pdx*pdx+pdy*pdy);
  if(pdist<8||CT.ptTimer<=0){
    CT.ptIdx=(CT.ptIdx+1)%CT_PATROL.length;
    CT.ptTimer=(CT.ptIdx===0)?2.5:0.5+Math.random()*1.2;
  }
  if(pdist>8){
    const sp1=CT.speed*(CT.speedBoost>0?1.7:1);
    CT.x+=(pdx/pdist)*sp1*F;
    CT.y+=(pdy/pdist)*sp1*F;
    CT.angle=Math.atan2(pdy,pdx);
  } else {
    CT.angle+=0.028*F;
  }
  CT.throwing=Math.max(0,CT.throwing-dt);

  // ── Feu aléatoire ──
  CT.fireT=Math.max(0,CT.fireT-dt);
  CT.mutterT-=dt;
  if(CT.mutterT<=0){
    CT.mutterT=2+Math.random()*2.5;
    CT.phrase=CL_INSULTS[~~(Math.random()*CL_INSULTS.length)];
    CT.phraseT=75; CT.fireT=1.4;
    const spk=['VOUS ÊTES TOUS NULS !','VOUS ÊTES LA PIRE CLASSE !','Boulard, collé 3h !','Silence immédiatement !','C\'est inadmissible !'];
    speak(spk[~~(Math.random()*spk.length)]);
    for(let i=0;i<8;i++){
      const p=_getPT(); if(!p) continue;
      const fa=CT.angle+(Math.random()-.5)*Math.PI/2.2;
      const fv=1.4+Math.random()*2.8;
      Object.assign(p,{on:true,wx:CT.x+Math.cos(CT.angle)*24,
        wy:CT.y+Math.sin(CT.angle)*24,
        col:Math.random()<.5?C.RED:C.ORANGE,type:'exp',
        vx:Math.cos(fa)*fv,vy:Math.sin(fa)*fv,
        life:1,decay:.028+Math.random()*.04,size:4+~~(Math.random()*7)});
    }
  }

  // ── LANCEMENT DE GRENADE CHIMIQUE ──
  CT.throwTimer-=dt;
  if(CT.throwTimer<=0){
    throwFormulaGrenade();
    CT.throwTimer=3+Math.random()*4;
    CT.throwing=0.6;
  }

  // ── Grenades en vol ──
  for(let i=CL_GRENADES.length-1;i>=0;i--){
    const g=CL_GRENADES[i];
    g.prog+=g.spd*F;
    if(g.prog>=1){ landGrenade(g); CL_GRENADES.splice(i,1); continue; }
    // Position Bézier (arc parabolique)
    const p=g.prog;
    const bx=(1-p)*(1-p)*g.sx+2*(1-p)*p*((g.sx+g.tx)/2)+p*p*g.tx;
    const by=(1-p)*(1-p)*g.sy+2*(1-p)*p*(Math.min(g.sy,g.ty)-90)+p*p*g.ty;
    g.cx=bx; g.cy=by; // stocker pour dessin
  }

  // ── Zones de danger au sol ──
  for(let i=CL_ZONES.length-1;i>=0;i--){
    const z=CL_ZONES[i];
    z.life-=z.decay*F;
    if(z.life<=0){ CL_ZONES.splice(i,1); continue; }
    const dx=CK.x-z.x, dy=CK.y-z.y;
    if(Math.sqrt(dx*dx+dy*dy)<z.r*.75){
      CT.phrase='AH AH ! TU AS MARCHÉ DEDANS !!!'; CT.phraseT=120;
      sfx.bonk();
      spawnBurst(CK.x,CK.y,z.col2,18);
      caughtInClassroom(); return;
    }
  }

  if(CT.phraseT>0) CT.phraseT-=F;
  if(CT.alertT>0) CT.alertT-=dt;
  if(CT.speedBoost>0) CT.speedBoost-=dt;

  // Throw boulette classroom
  if(CTRL.kiss && CK.hasBoulette && CK.bouletteT<=0){
    CK.bouletteT=0.5;
    classBoulettes.push({x:CK.x, y:CK.y, vx:CK.dir===1||CK.dir===3?4:-4, vy:0, life:1.5});
  }
  if(CK.bouletteT>0) CK.bouletteT-=dt;
  // Update classBoulettes
  for(let i=classBoulettes.length-1;i>=0;i--){
    const b=classBoulettes[i];
    b.x+=b.vx*dt*60; b.y+=b.vy*dt*60; b.life-=dt;
    if(b.life<=0||b.x<0||b.x>W||b.y<0||b.y>H){ classBoulettes.splice(i,1); continue; }
    // Collision intellos → +500pts
    let hit=false;
    for(const il of CL_INTELLOS){
      if(Math.abs(b.x-il.x)<18&&Math.abs(b.y-il.y)<18){
        il.shoutT=0.1; // mini-stun
        G.killScore+=500; G.score=G.killScore;
        spawnFT('💥 +500 BOULETTE !!!',il.x,il.y-30,C.YELLOW,true);
        spawnBurst(il.x,il.y,C.YELLOW,10);
        if(G.sound) tone(600,.1,'square',.3);
        classBoulettes.splice(i,1); hit=true; break;
      }
    }
    if(hit) continue;
    // Collision profs → rebondit (immortels)
    for(const ct of [CT,CT2]){
      if(Math.abs(b.x-ct.x)<22&&Math.abs(b.y-ct.y)<22){
        b.vx=-b.vx; b.vy=-b.vy;
        spawnFT('IMMORTELLE !',ct.x,ct.y-30,'#ff8080');
        break;
      }
    }
  }

  // ── Intello balances : alertent la prof si Kevin approche ──
  for(const il of CL_INTELLOS){
    if(il.shoutT>0) il.shoutT-=dt;
    if(il.alertT>0) il.alertT-=dt;
    const dix=CK.x-il.x, diy=CK.y-il.y;
    const didist=Math.sqrt(dix*dix+diy*diy);
    if(didist<88 && il.shoutT<=0){
      il.shoutT=3.5; il.alertT=3.5;
      il.msg=INTELLO_SHOUTS[~~(Math.random()*INTELLO_SHOUTS.length)];
      // Boost les deux profs
      CT.speedBoost=3.5; CT2.speedBoost=3.5;
      spawnFT(il.msg,il.x,il.y-30,'#ffee00',true);
      if(G.sound){ tone(880,.06,'square',.35); tone(1200,.04,'square',.3,.06); }
    }
  }

  // ── Patrouille Prof 2 (Mme Curie) ──
  CT2.ptTimer-=dt;
  const pt2=CT2_PATROL[CT2.ptIdx%CT2_PATROL.length];
  const pd2x=pt2.x-CT2.x, pd2y=pt2.y-CT2.y;
  const pd2dist=Math.sqrt(pd2x*pd2x+pd2y*pd2y);
  if(pd2dist<8||CT2.ptTimer<=0){
    CT2.ptIdx=(CT2.ptIdx+1)%CT2_PATROL.length;
    CT2.ptTimer=0.6+Math.random()*0.8;
  }
  if(pd2dist>8){
    const sp2=CT2.speed*(CT2.speedBoost>0?1.7:1);
    CT2.x+=(pd2x/pd2dist)*sp2*F; CT2.y+=(pd2y/pd2dist)*sp2*F;
    CT2.angle=Math.atan2(pd2y,pd2x);
  } else CT2.angle+=0.04*F;
  if(CT2.phraseT>0) CT2.phraseT-=F;
  if(CT2.alertT>0) CT2.alertT-=dt;
  if(CT2.speedBoost>0) CT2.speedBoost-=dt;

  // ── Cône de vision (Prof 1) ──
  const spd1boost=CT.speedBoost>0;
  const vrange=CT.fireT>0?170:(CK.sprinting?145:110)+(spd1boost?25:0);
  const vhalf =CT.fireT>0?Math.PI/2.0:(CK.sprinting?Math.PI/2.5:Math.PI/3.0);
  const kdx=CK.x-CT.x, kdy=CK.y-CT.y;
  const kdist=Math.sqrt(kdx*kdx+kdy*kdy);
  let spotted=false;
  if(kdist<vrange){
    const aToK=Math.atan2(kdy,kdx);
    let diff=aToK-CT.angle;
    while(diff>Math.PI) diff-=Math.PI*2; while(diff<-Math.PI) diff+=Math.PI*2;
    if(Math.abs(diff)<vhalf) spotted=true;
  }
  if(kdist<28) spotted=true;

  // ── Cône de vision Prof 2 ──
  if(!spotted){
    const vr2=95+(CT2.speedBoost>0?25:0);
    const k2dx=CK.x-CT2.x, k2dy=CK.y-CT2.y;
    const k2dist=Math.sqrt(k2dx*k2dx+k2dy*k2dy);
    if(k2dist<vr2){
      const aToK2=Math.atan2(k2dy,k2dx);
      let diff2=aToK2-CT2.angle;
      while(diff2>Math.PI) diff2-=Math.PI*2; while(diff2<-Math.PI) diff2+=Math.PI*2;
      if(Math.abs(diff2)<Math.PI/2.8) spotted=true;
    }
    if(k2dist<24) spotted=true;
  }

  if(spotted && G.classroomGrace<=0){
    CT.phrase='JE TE VOIS !!!'; CT.phraseT=120; CT.alertT=0.5;
    CT2.phrase='ARRÊTEZ-VOUS !!!'; CT2.phraseT=120; CT2.alertT=0.5;
    sfx.bonk(); sfx.hurt();
    spawnBurst(CK.x,CK.y,C.RED,22);
    caughtInClassroom(); return;
  }

  // ── Porte de sortie (haut-droit) ──
  if(CK.x>CL_DOOR.x-10 && CK.x<CL_DOOR.x+CL_DOOR.w+10 && CK.y<CL_DOOR.y+CL_DOOR.h+10){
    escapedClassroom(); return;
  }

  updateStudentReactions(dt);
  updateParticles(dt);
}

function throwFormulaGrenade(){
  const type=CL_GRENADE_TYPES[~~(Math.random()*CL_GRENADE_TYPES.length)];
  // Cible aléatoire dans la salle (peut atterrir n'importe où !)
  const tx=30+Math.random()*(W-60);
  const ty=100+Math.random()*(H-130);
  const phrase=CL_THROW_PHRASES[~~(Math.random()*CL_THROW_PHRASES.length)];
  CT.phrase=phrase; CT.phraseT=100;
  CL_GRENADES.push({
    sx:CT.x, sy:CT.y, tx, ty, cx:CT.x, cy:CT.y,
    prog:0, spd:0.016+Math.random()*0.01,
    type, rot:0,
  });
  if(G.sound){ tone(350+Math.random()*150,.05,'sawtooth',.35); }
}

function landGrenade(g){
  const type=g.type;
  // Zone de danger
  CL_ZONES.push({
    x:g.tx, y:g.ty, r:type.r,
    life:1, decay:0.0025,  // dure ~240 frames = 4s
    col:type.zCol, col2:type.col, zBord:type.zBord,
    name:type.name, msg:type.msg, zMsg:type.zMsg,
    pulse:Math.random()*6.28,
  });
  // Explosion de particules
  for(let i=0;i<18;i++){
    const p=_getPT(); if(!p) continue;
    const a=Math.random()*Math.PI*2;
    const v=1.5+Math.random()*3.5;
    Object.assign(p,{on:true,wx:g.tx,wy:g.ty,
      col:Math.random()<.5?type.col:C.YELLOW,type:'exp',
      vx:Math.cos(a)*v,vy:Math.sin(a)*v,

// ── Grenades et zones chimiques (dessin) ──
function drawClassroomGrenades(){
  // 1) Zones de contamination au sol
  for(const z of CL_ZONES){
    const pulse=Math.sin(Date.now()*.006+z.pulse)*.15+0.85;
    ctx.save();
    ctx.globalAlpha=z.life*pulse;
    // Remplissage
    ctx.fillStyle=z.col;
    ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
    // Contour pulsé
    ctx.strokeStyle=z.zBord; ctx.lineWidth=2;
    ctx.setLineDash([6,3]); ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // Label formule au centre
    ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,.92)';
    ctx.fillText(z.zMsg,z.x,z.y-2);
    ctx.font='7px monospace'; ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.fillText(`${~~(z.life*100)}%`,z.x,z.y+10);
    ctx.restore();
  }

  // 2) Grenades en vol (arc parabolique)
  for(const g of CL_GRENADES){
    const cx=~~g.cx, cy=~~g.cy;
    const rot=g.prog*Math.PI*5; // rotation pendant le vol
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(rot);
    // Corps du flacon chimique
    r(-5,-9,10,8,g.type.col);      // corps
    r(-3,-13,6,5,'rgba(255,255,255,.75)'); // liquide
    r(-2,-15,4,4,C.DGRAY);           // bouchon
    // Bulles/fumée
    ctx.globalAlpha=.6+Math.sin(g.prog*20)*.2;
    ctx.fillStyle=g.type.col;
    ctx.fillRect(-1,-17,2,2);
    ctx.restore();
    // Traînée
    ctx.globalAlpha=.25;
    for(let t=1;t<=3;t++){
      const tp=Math.max(0,g.prog-t*.06);
      const tpv=tp;
      const tx2=(1-tpv)*(1-tpv)*g.sx+2*(1-tpv)*tpv*((g.sx+g.tx)/2)+tpv*tpv*g.tx;
      const ty2=(1-tpv)*(1-tpv)*g.sy+2*(1-tpv)*tpv*(Math.min(g.sy,g.ty)-90)+tpv*tpv*g.ty;
      ctx.fillStyle=g.type.col;
      const ts=5-t;
      ctx.fillRect(~~tx2-ts/2,~~ty2-ts/2,ts,ts);
    }
    ctx.globalAlpha=1;
    // Label formule au-dessus du flacon
    ctx.font='bold 7px monospace'; ctx.textAlign='center';
    ctx.strokeStyle=C.BLACK; ctx.lineWidth=1.5;
    ctx.strokeText(g.type.name,cx,cy-20);
    ctx.fillStyle=g.type.col; ctx.fillText(g.type.name,cx,cy-20);
  }
}

const _SHIRT_COLS=['#4488ff','#ff8844','#44bb55','#cc44cc','#ccbb22','#44cccc','#ee5555','#88aaff'];
function drawStudent(dx,dy,type,idx,frame){

  ctx.fillStyle='rgba(0,0,0,.15)'; ctx.beginPath();

  } else if(type==='scared'){

    ctx.fillText('💧',cx-14,cy-12); ctx.fillText('💧',cx+10,cy-10);

// ── Cône de vision ──
function drawVisionCone(tx,ty,angle,range,col,alpha,halfA=Math.PI/2.8){
  ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(tx,ty);
  for(let i=0;i<=20;i++){
    const a=angle-halfA+(2*halfA*i/20);
    ctx.lineTo(tx+Math.cos(a)*range, ty+Math.sin(a)*range);
  }
  ctx.closePath(); ctx.fill(); ctx.restore();
}

  ctx.beginPath(); ctx.arc(CT2.x,CT2.y,24,0,Math.PI*2); ctx.stroke();

  // 3 — Particules feu + fumée
  drawParticles();

  // 4 — Élèves
  drawAllStudents();

  // Draw classBoulettes
  for(const b of classBoulettes){
    ctx.fillStyle='#f0f0f0'; ctx.strokeStyle='#aaa'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(~~b.x,~~b.y,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // spiral lines
    ctx.strokeStyle='rgba(180,180,180,.6)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.arc(~~b.x,~~b.y,3,0,Math.PI*1.5); ctx.stroke();
  }

  // 5 — Entités principales
  drawClassroomTeacher(CT);
  drawClassroomTeacher2(CT2);
  drawAllIntellos();
  // Kevin clignote pendant la période de grâce
  if(G.classroomGrace<=0 || Math.floor(Date.now()/120)%2===0)
    drawClassroomKevin(CK.x,CK.y,CK.dir);

  // 6 — Bulles de dialogue
  if(CT.phraseT>0){
    const al=Math.min(1,CT.phraseT/30);
    const tx=CT.x, ty=CT.y-36;
    ctx.globalAlpha=al;
    ctx.font='bold 10px monospace';
    const tw=ctx.measureText(CT.phrase).width;
    r(tx-tw/2-5,ty-13,tw+10,18,'rgba(0,0,0,.9)');
    ctx.textAlign='center';
    ctx.fillStyle=CT.throwing>0?'#ff4000':CT.fireT>0?C.RED:C.ORANGE;
    ctx.fillText(CT.phrase,tx,ty); ctx.globalAlpha=1;
  }
  if(CT2.phraseT>0){
    const al=Math.min(1,CT2.phraseT/30);
    ctx.globalAlpha=al;
    ctx.font='bold 9px monospace';
    const tw2=ctx.measureText(CT2.phrase).width;
    r(CT2.x-tw2/2-5,CT2.y-48,tw2+10,16,'rgba(0,30,120,.9)');
    ctx.textAlign='center'; ctx.fillStyle='#80a0ff';
    ctx.fillText(CT2.phrase,CT2.x,CT2.y-36); ctx.globalAlpha=1;
  }

  // 7 — Indicateur sprint Kevin
  if(CK.sprinting){
    const sp=Math.sin(Date.now()*.012)*.3+.7;
    ctx.globalAlpha=sp;
    ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillStyle=C.YELLOW;
    ctx.fillText('SPRINT — PLUS VISIBLE !',W/2,H/2-160);
    ctx.globalAlpha=1;
  }

  // 8 — Barre de danger
  const distKT=Math.sqrt((CK.x-CT.x)**2+(CK.y-CT.y)**2);
  const danger=Math.max(0,Math.min(1,1-(distKT-28)/195));
  r(0,H-20,W,8,C.DGRAY);
  r(0,H-20,~~(W*danger),8,danger>.65?C.RED:danger>.38?C.ORANGE:C.YELLOW);
  ctx.font='bold 7px monospace'; ctx.textAlign='right'; ctx.fillStyle=C.WHITE;
  ctx.fillText('⚠ DANGER',W-6,H-14);

  // 9 — Compteur grenades actives
  if(CL_ZONES.length>0){
    ctx.font='bold 8px monospace'; ctx.textAlign='left'; ctx.fillStyle='#ff4040';
    ctx.fillText(`☣ ${CL_ZONES.length} ZONE${CL_ZONES.length>1?'S':''} ACTIVE${CL_ZONES.length>1?'S':''}`,6,H-14);
  }

  // Son btn (classroom)
  r(4,4,34,28,C.DGRAY);
  ctx.font='13px monospace'; ctx.textAlign='center'; ctx.fillStyle=C.WHITE; ctx.fillText(G.sound?'🔊':'🔇',21,22);
  // Musique btn (classroom)
  r(42,4,34,28,G.music?'#1a3a1a':C.DGRAY);
  ctx.font='12px monospace'; ctx.fillStyle=G.music?'#88ff88':'#666'; ctx.fillText('🎵',59,19);
  ctx.font='bold 6px monospace'; ctx.fillStyle=G.music?'#88ff88':'#888'; ctx.fillText(G.music?'ON':'OFF',59,29);

  // 10 — HUD titre + instructions
  ctx.font='bold 11px monospace'; ctx.textAlign='left';
  ctx.strokeStyle=C.BLACK; ctx.lineWidth=2;
  ctx.strokeText('N1 — Salle de classe',82,22);
  ctx.fillStyle=C.WHITE; ctx.fillText('N1 — Salle de classe',82,22);
  ctx.font='8px monospace'; ctx.fillStyle=C.YELLOW;
  ctx.fillText('Rejoins la porte  |  [Shift/Sprint] attention : visible !',22,36);

  drawClassroomVirtualBtns();
}

function _drawClassroomZonesUI(){
  const rx=16;

  ctx.globalAlpha=0.18;
  ctx.fillStyle='#fff';
  _rr(8, H-92, W*0.5-14, 84, rx); ctx.fill();

  const bx=W*0.58, bw=W*0.4-6, by=H-92, bh=84, bcx=bx+bw/2;

    ctx.font='bold 14px monospace'; ctx.textAlign='center';
    ctx.fillText('💥', bcx, by+bh*0.4);

  ctx.restore();
}

function drawControlHints(entries){
  // entries = [{k:'← →', d:'Se déplacer'}, ...]
  const cols=2, rows=Math.ceil(entries.length/cols);
  const PW=310, PH=14+rows*18, PX=W/2-PW/2, PY=H-PH-38;
  // Fond
  ctx.fillStyle='rgba(0,0,0,.72)';
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(PX,PY,PW,PH,6); else ctx.rect(PX,PY,PW,PH);
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1; ctx.stroke();
  // Titre
  ctx.font='bold 7px monospace'; ctx.textAlign='center'; ctx.fillStyle='#aaa';
  ctx.fillText('⌨  CONTRÔLES  |  📱 boutons colorés sur mobile',W/2,PY+9);
  // Entrées en 2 colonnes
  const colW=PW/cols;
  entries.forEach((e,i)=>{
    const col=i%cols, row=~~(i/cols);
    const ex=PX+col*colW+6, ey=PY+14+row*18;
    // Touche (fond gris)
    ctx.fillStyle='#3a3a3a'; ctx.strokeStyle='#777'; ctx.lineWidth=1;
    const kw=Math.max(28,ctx.measureText(e.k).width+10);
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(ex,ey-8,kw,13,3); else ctx.rect(ex,ey-8,kw,13);
    ctx.fill(); ctx.stroke();
    ctx.font='bold 8px monospace'; ctx.textAlign='center'; ctx.fillStyle='#fff';
    ctx.fillText(e.k,ex+kw/2,ey+1);
    // Description
    ctx.font='8px monospace'; ctx.textAlign='left'; ctx.fillStyle='#ccc';
    ctx.fillText(e.d,ex+kw+5,ey+1);
  });
  ctx.textAlign='center';
}

    ctx.font='bold 7px monospace'; ctx.fillStyle=C.YELLOW;

    const a=Math.sin(Date.now()*.003)*.5+.5;
    ctx.strokeStyle=C.YELLOW; ctx.lineWidth=1.5;
    ctx.globalAlpha=a*.5;
    ctx.beginPath(); ctx.arc(bellX,GND-52,22,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
}

const BG={x1:0,x2:0,x3:0};
function updateBG(speed){ BG.x1+=speed*.4; BG.x2+=speed*.9; BG.x3+=speed*1.5; }

function drawBG(){
  // Ciel béton
  r(0,0,W,42,C.DGRAY);
  // Néons
  for(let i=0;i<6;i++){
    const nx=(i*120-BG.x2*.3)%720-20;
    r(~~nx,5,80,9,C.YELLOW); r(~~nx+2,7,76,5,C.WHITE);
  }
  // Mur
  r(0,42,W,GND-42,C.CEMENT);
  // Fenêtres (layer 1)
  for(let rep=0;rep<5;rep++){
    const sx=~~(((rep*280-cam.x*.35)%(280*5)+280*5)%(280*5)-280);
    if(sx<W+100&&sx>-180){
      r(sx+10,55,80,60,C.DGRAY); r(sx+14,59,72,52,C.DBLUE);
      r(sx+14,59,72,5,C.DGRAY);
      ctx.font='bold 10px monospace';
      ctx.fillStyle=C.RED;    ctx.textAlign='left'; ctx.fillText('KEVIN',sx+100,72);
      ctx.fillStyle=C.YELLOW; ctx.fillText('WAS',   sx+100,84);
      ctx.fillStyle=C.ORANGE; ctx.fillText('HERE',  sx+100,96);
      r(sx+100,52,70,48,C.BEIGE); r(sx+100,52,70,6,C.RED);
      ctx.font='7px monospace'; ctx.fillStyle=C.BLACK;
      ctx.fillText('JOURNÉE',sx+102,65); ctx.fillText('PORTES',sx+102,74); ctx.fillText('OUVERTES',sx+100,83);
      ctx.strokeStyle=C.RED; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(sx+100,52); ctx.lineTo(sx+170,98); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+170,52); ctx.lineTo(sx+100,98); ctx.stroke();
    }
  }
  // Casiers (layer 2)
  const LSIZE=52;
  for(let i=0;i<14;i++){
    const lx=~~(((i*LSIZE - cam.x*.7)%(LSIZE*14)+LSIZE*14)%(LSIZE*14)-LSIZE);
    if(lx>W+LSIZE||lx<-LSIZE) continue;
    const ly=118, lh=GND-ly-8;
    r(lx,ly,LSIZE-2,lh,C.DBLUE); r(lx+2,ly+2,LSIZE-6,lh-4,C.BLUE);
    r(lx,ly+~~(lh/2)-3,LSIZE-2,6,C.DGRAY);
    r(lx+38,ly+~~(lh/4)-10,6,20,C.DGRAY); r(lx+38,ly+~~(3*lh/4)-10,6,20,C.DGRAY);
    for(let v=0;v<5;v++) r(lx+4,ly+8+v*9,LSIZE-10,2,C.DBLUE);
    if(((i+~~(cam.x/LSIZE))%7===0)){
      r(lx+4,ly+4,LSIZE-10,~~(lh/2)-8,C.BLACK);
      r(lx+18,ly+~~(lh/4),8,28,C.WHITE); r(lx+17,ly+~~(lh/4)+26,10,8,C.RED);
    }
  }
  // Sol
  const TW=40,TH=30;
  for(let col=0;col<20;col++){
    const tx=~~(((col*TW-cam.x*1.0)%(TW*20)+TW*20)%(TW*20)-TW);
    r(tx,GND,TW-1,TH,C.BEIGE); r(tx+TW-2,GND,2,TH,C.DGRAY);
    if((col*13)%5===0) r(tx+14,GND+10,7,5,C.GRAY);
  }
  r(0,GND+TH,W,H-GND-TH,C.BEIGE);
  r(0,GND-2,W,4,C.DGRAY);

  // Plateformes en bois (en coordonnées écran)
  for(const p of PLATS){
    if(p.ground) continue;
    const px=~~wx(p.x);
    if(px>W+p.w||px<-p.w) continue;
    // Corps bois
    r(px,p.y,p.w,p.h,C.WOOD);
    // Joints de planches verticaux
    for(let jx=0;jx<p.w;jx+=13) r(px+jx,p.y,1,p.h,C.WOODD);
    // Reflet dessus clair
    r(px,p.y,p.w,3,C.WOODL);
    // Ombre dessous foncée
    r(px,p.y+p.h-3,p.w,3,C.WOODD);
    // Vis aux extrémités
    r(px+2,p.y+2,3,3,C.WOODD); r(px+p.w-5,p.y+2,3,3,C.WOODD);
  }

  // Cloche de fin (fin du niveau)
  const bellX=~~wx(4050);
  if(bellX>-80&&bellX<W+80){
    r(bellX+10,GND-80,30,80,C.DGRAY);
    ctx.font='36px monospace'; ctx.textAlign='center';
    ctx.fillText('🔔',bellX+25,GND-55);
    ctx.font='bold 8px monospace'; ctx.fillStyle=C.YELLOW;
    ctx.fillText('SORTIE!',bellX+25,GND-14);
    // Aura
    ctx.strokeStyle=C.YELLOW; ctx.lineWidth=2;
    const a=Math.sin(Date.now()*.003)*.5+.5;
    ctx.globalAlpha=a*.6;
    ctx.beginPath(); ctx.arc(bellX+25,GND-65,28,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
}

// ═══ CONTRÔLES ═══
const CTRL={left:false,right:false,jump:false,atk:false,kiss:false,up:false,down:false};
// Boutons classiques (utilisés en mode 'buttons' ou PC)
const BTN_ZONES={
  left: {x:6,    y:H-68, w:60,h:62, col:'#d03000', icon:'◀', lbl:'',        key:''},
  right:{x:74,   y:H-68, w:60,h:62, col:'#d03000', icon:'▶', lbl:'',        key:''},
  ball: {x:W-256,y:H-68, w:60,h:62, col:'#887700', icon:'🧻', lbl:'BALL',   key:'X'},
  kiss: {x:W-188,y:H-68, w:60,h:62, col:'#b0106e', icon:'💋', lbl:'BISOU',  key:'E'},
  atk:  {x:W-120,y:H-68, w:60,h:62, col:'#1848c8', icon:'🥖', lbl:'ATK',   key:'Z'},
  jump: {x:W-60, y:H-68, w:58,h:62, col:'#1a8030', icon:'▲', lbl:'SAUT',   key:'⎵'},
};

// Zones mobiles (mode 'zones')
const MZ = {
  L_END:    W*0.42,  // limite droite de la zone gauche
  L_MID:    W*0.21,  // point milieu → <mid=gauche, >mid=droite
  R_START:  W*0.58,  // limite gauche de la zone droite
  ATK_SPLIT:H*0.55,  // séparation ATK (haut) / SAUT (bas) dans zone droite
  TOP:      55,      // zone UI en haut
};

const activeTouches=new Map(); // id → {type, dir, startX, startY, startTime, swiped}

// ── Helpers zones ──
function _mzLeft(gx){ return gx < MZ.L_MID; }
function _setMoveDir(id, gx, gy){
  const dir = _mzLeft(gx)?'left':'right';
  const prev = activeTouches.get(id);
  if(prev&&prev.type==='lzone'){
    if(prev.dir==='left'&&dir!=='left')  CTRL.left=false;
    if(prev.dir==='right'&&dir!=='right') CTRL.right=false;
    prev.dir=dir;
  }
  CTRL[dir]=true;
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(AC&&AC.state==='suspended') AC.resume();
  for(const t of e.changedTouches){
    const rect=canvas.getBoundingClientRect();
    const sc=W/rect.width;
    const gx=(t.clientX-rect.left)*sc, gy=(t.clientY-rect.top)*sc;

    // ── Écrans non-jeu ──
    if(G.state===ST.MENU){ startGame(); return; }
    if(G.state===ST.INTRO){ startClassroom(); return; }
    if(G.state===ST.PAUSE){
      if(gx>W/2-90&&gx<W/2+90&&gy>H/2-10&&gy<H/2+40){ togglePause(); return; }
      if(gx>W/2-60&&gx<W/2+60&&gy>H/2+55&&gy<H/2+95){ goMenu(); return; }
      return;
    }
    if(G.state===ST.OVER){ restartCurrentLevel(); return; }
    if(G.state===ST.WIN){ goMenu(); return; }
    if(G.state===ST.L2END){ startLevel3(); return; }
    if(G.state===ST.CTRANSIT){
      startCorridor(); return;
    }

    // ── Boutons UI (toujours actifs) ──
    if(gx<42&&gy<42){ toggleSound(); continue; }
    if(gx>=42&&gx<82&&gy<42){ toggleMusic(); continue; }
    if(G.state===ST.PLAY&&gx>W-42&&gy<42){ togglePause(); continue; }

    // ══════════════════════════════════════════════════════════
    //  CLASSROOM (top-down) — même en mode zones, D-pad virtuel
    // ══════════════════════════════════════════════════════════
    if(G.state===ST.CLASSROOM){
      if(isMobile&&mobileMode==='zones'){
        if(gx<W*0.55&&gy>MZ.TOP){
          // Zone gauche → D-pad virtuel (déterminé par touchmove)
          activeTouches.set(t.identifier,{type:'dpad',startX:gx,startY:gy});
        } else if(gx>=W*0.55&&gy>MZ.TOP){
          // Zone droite → lancer boulette
          if(CK.hasBoulette&&CK.bouletteT<=0){
            CTRL.kiss=true;
            setTimeout(()=>{ CTRL.kiss=false; },80);
          }
        }
      } else {
        // Mode buttons : ancienne logique
        let hit=null;
        for(const [k,z] of Object.entries(BTN_ZONES)){
          if(k==='ball') continue;
          if(gx>=z.x&&gx<=z.x+z.w&&gy>=z.y&&gy<=z.y+z.h){ hit=k; break; }
        }
        if(hit){ activeTouches.set(t.identifier,{type:'btn',btn:hit}); CTRL[hit]=true; }
        if(!hit&&gy<H-70){ CK.sprinting=!CK.sprinting; activeTouches.set(t.identifier,{type:'sprint'}); }
      }
      continue;
    }

    // ══════════════════════════════════════════════════════════
    //  PLAY (side-scroller)
    // ══════════════════════════════════════════════════════════
    if(G.state===ST.PLAY){
      if(isMobile&&mobileMode==='zones'){
        if(gy<=MZ.TOP) continue; // zone UI, déjà gérée

        // Zone gauche → mouvement
        if(gx<MZ.L_END){
          const dir=_mzLeft(gx)?'left':'right';
          activeTouches.set(t.identifier,{type:'lzone',dir,startX:gx,startY:gy});
          CTRL[dir]=true;
          continue;
        }

        // Zone droite → SAUT (bas) ou ATK (haut)
        if(gx>=MZ.R_START){
          if(gy >= MZ.ATK_SPLIT){
            // Bouton SAUT (moitié basse)
            activeTouches.set(t.identifier,{type:'rzone',startX:gx,startY:gy,startTime:Date.now(),swiped:false});
            CTRL.jump=true;
            doJump(); jumpHeld=true;
          } else {
            // Bouton ATK (moitié haute)
            activeTouches.set(t.identifier,{type:'rzone_atk'});
            CTRL.atk=true;
            doAtk();
          }
          continue;
        }
        // BALL : petit bouton central (visible si hasBoulette)
        if(KV.hasBoulette && gx>=MZ.L_END && gx<MZ.R_START && gy>=H*0.72){
          doThrowBall(); continue;
        }

        // Zone centrale → tap sur Kevin = KISS contextuel
        {
          const camX=Math.max(0,Math.min(WORLD_W-W,KV.x-W/3));
          const ksx=KV.x-camX, ksy=KV.y;
          if(Math.abs(gx-ksx-16)<44&&Math.abs(gy-ksy-24)<44){
            doKiss(); continue;
          }
        }

      } else {
        // Mode buttons : ancienne logique
        let hit=null;
        for(const [k,z] of Object.entries(BTN_ZONES)){
          if(gx>=z.x&&gx<=z.x+z.w&&gy>=z.y&&gy<=z.y+z.h){ hit=k; break; }
        }
        if(hit){
          activeTouches.set(t.identifier,{type:'btn',btn:hit});
          CTRL[hit]=true;
          if(hit==='jump'){ doJump(); jumpHeld=true; }
          if(hit==='atk')  doAtk();
          if(hit==='kiss') doKiss();
          if(hit==='ball') doThrowBall();
        }
      }
    }
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const touch=activeTouches.get(t.identifier);
    if(!touch) continue;
    const rect=canvas.getBoundingClientRect();
    const sc=W/rect.width;
    const gx=(t.clientX-rect.left)*sc, gy=(t.clientY-rect.top)*sc;

    // D-pad classroom
    if(touch.type==='dpad'){
      const dx=gx-touch.startX, dy=gy-touch.startY;
      const thr=14;
      CTRL.left=false; CTRL.right=false; CTRL.up=false; CTRL.down=false;
      if(Math.abs(dx)>thr||Math.abs(dy)>thr){
        if(Math.abs(dx)>Math.abs(dy)){ CTRL.left=dx<0; CTRL.right=dx>0; }
        else { CTRL.up=dy<0; CTRL.down=dy>0; }
      }
    }

    // Zone gauche : sliding direction
    if(touch.type==='lzone'){ _setMoveDir(t.identifier,gx,gy); }

    // Zone droite : détection swipe
    if(touch.type==='rzone'&&!touch.swiped){
      const dx=gx-touch.startX, dy=gy-touch.startY;
      if(Math.abs(dx)>35){
        touch.swiped=true;
        if(dx<0) doAtk();       // swipe gauche → ATK
      } else if(dy>35){
        touch.swiped=true;
        doThrowBall();          // swipe bas → BALL
      }
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const touch=activeTouches.get(t.identifier);
    if(!touch){ activeTouches.delete(t.identifier); continue; }

    if(touch.type==='btn')      { CTRL[touch.btn]=false; }
    if(touch.type==='lzone')    { CTRL[touch.dir]=false; }
    if(touch.type==='rzone')    { jumpHeld=false; CTRL.jump=false; }
    if(touch.type==='rzone_atk'){ CTRL.atk=false; }
    if(touch.type==='dpad')     { CTRL.left=false; CTRL.right=false; CTRL.up=false; CTRL.down=false; }

    activeTouches.delete(t.identifier);
  }
},{passive:false});

canvas.addEventListener('touchcancel',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const touch=activeTouches.get(t.identifier);
    if(touch){
      if(touch.type==='btn')      CTRL[touch.btn]=false;
      if(touch.type==='lzone')    CTRL[touch.dir]=false;
      if(touch.type==='rzone')    { jumpHeld=false; CTRL.jump=false; }
      if(touch.type==='rzone_atk'){ CTRL.atk=false; }
      if(touch.type==='dpad')     { CTRL.left=false; CTRL.right=false; CTRL.up=false; CTRL.down=false; }
    }
    activeTouches.delete(t.identifier);
  }
},{passive:false});

// Jump continu (tenir la touche)
let jumpHeld = false;
// ── Game feel ──
let coyoteT   = 0;  // frames depuis dernier sol (coyote time)
let jumpBufT  = 0;  // frames depuis dernier appui saut (buffer)
const COYOTE_F = 8;
const JUMP_BUF = 10;
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(G.state===ST.PLAY){
    if(e.code==='ArrowLeft' ||e.code==='KeyA'||k==='q') { e.preventDefault(); CTRL.left=true; }
    if(e.code==='ArrowRight'||e.code==='KeyD')          { e.preventDefault(); CTRL.right=true; }
    if((e.code==='Space'||e.code==='ArrowUp')&&!jumpHeld){
      e.preventDefault(); jumpHeld=true; doJump();
    }
    if(k==='z') { e.preventDefault(); doAtk(); }
    if(k==='x') { e.preventDefault(); doThrowBall(); }
    if(k==='e') doKiss();
    if(k==='p') togglePause();
    if(k==='m') toggleSound();
    if(k==='n') toggleMusic();
  } else if(G.state===ST.CLASSROOM){
    e.preventDefault();
    if(e.code==='ArrowLeft' ||e.code==='KeyA') CTRL.left =true;
    if(e.code==='ArrowRight'||e.code==='KeyD') CTRL.right=true;
    if(e.code==='ArrowUp'   ||e.code==='KeyW') CTRL.up   =true;
    if(e.code==='ArrowDown' ||e.code==='KeyS') CTRL.down =true;
    if(e.code==='ShiftLeft' ||e.code==='ShiftRight') CK.sprinting=true;
    if(e.code==='Space') CTRL.kiss=true; // lancer boulette
  } else if(G.state===ST.MENU){
    if(e.code==='Space'||e.code==='Enter') startGame();
  } else if(G.state===ST.INTRO){
    if(e.code==='Space'||e.code==='Enter') startClassroom();
  } else if(G.state===ST.OVER){
    if(e.code==='Space'||e.code==='Enter') restartCurrentLevel();
  } else if(G.state===ST.WIN){
    if(e.code==='Space'||e.code==='Enter') goMenu();
  } else if(G.state===ST.L2END){
    if(e.code==='Space'||e.code==='Enter') startLevel3();
  } else if(G.state===ST.PAUSE){
    if(e.code==='KeyP'||e.code==='Space') togglePause();
  }
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(e.code==='ArrowLeft' ||e.code==='KeyA'||k==='q') { CTRL.left =false; }
  if(e.code==='ArrowRight'||e.code==='KeyD')           { CTRL.right=false; }
  if(e.code==='Space'||e.code==='ArrowUp')             { jumpHeld=false; CTRL.up=false; CTRL.kiss=false; }
  if(e.code==='ArrowDown' ||e.code==='KeyS')           { CTRL.down=false; CTRL.atk=false; }
  if(e.code==='ShiftLeft' ||e.code==='ShiftRight')     { CK.sprinting=false; }
});

function togglePause(){
  if(G.state===ST.PLAY){ G.state=ST.PAUSE; stopMusic(); }
  else if(G.state===ST.PAUSE){ G.state=ST.PLAY; startMusic(); }
}
function toggleSound(){
  G.sound=!G.sound; localStorage.setItem('fs_snd',G.sound);
  if(!G.sound){ stopMusic(); stopClassroomMusic(); }
  else {
    if(G.state===ST.PLAY) startMusic();
    else if(G.state===ST.CLASSROOM) startClassroomMusic();
  }
}
function toggleMusic(){
  G.music=!G.music; localStorage.setItem('fs_music',G.music);
  if(!G.music){ stopMusic(); stopClassroomMusic(); }
  else {
    if(G.state===ST.PLAY) startMusic();
    else if(G.state===ST.CLASSROOM) startClassroomMusic();
  }
}

// ═══ TOUCHES VIRTUELLES DESSINÉES ═══
function _drawBtn(z, icon, lbl, pressed, col){
  const r12=12;
  // Ombre portée
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath();
  ctx.roundRect?ctx.roundRect(z.x+3,z.y+5,z.w,z.h,r12):ctx.rect(z.x+3,z.y+5,z.w,z.h);
  ctx.fill();
  // Fond coloré (plus clair si pressé)
  ctx.fillStyle=pressed
    ? col.replace(/[^,]+\)$/,'1)').replace('#','').length>6 ? col : col+'ff'
    : col+'cc';
  if(pressed) ctx.fillStyle=col; // full opaque quand pressé
  ctx.globalAlpha=pressed?1:0.82;
  ctx.beginPath();
  ctx.roundRect?ctx.roundRect(z.x,z.y,z.w,z.h,r12):ctx.rect(z.x,z.y,z.w,z.h);
  ctx.fill();
  ctx.globalAlpha=1;
  // Surbrillance haut (effet 3D)
  ctx.fillStyle=pressed?'rgba(0,0,0,.15)':'rgba(255,255,255,.28)';
  ctx.beginPath();
  ctx.roundRect?ctx.roundRect(z.x+2,z.y+2,z.w-4,z.h/2,r12):ctx.rect(z.x+2,z.y+2,z.w-4,z.h/2);
  ctx.fill();
  // Bordure
  ctx.strokeStyle=pressed?'rgba(255,255,255,.9)':'rgba(255,255,255,.55)';
  ctx.lineWidth=pressed?2.5:2;
  ctx.beginPath();
  ctx.roundRect?ctx.roundRect(z.x,z.y,z.w,z.h,r12):ctx.rect(z.x,z.y,z.w,z.h);
  ctx.stroke();
  // Icône (plus petite pour laisser place aux labels)
  ctx.textAlign='center';
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,.6)'; ctx.shadowBlur=4;
  ctx.font=`bold ${z.key?22:26}px monospace`;
  ctx.fillText(icon, z.x+z.w/2, z.y+z.h/2+(lbl?-2:8));
  // Touche clavier (coin haut-gauche, petite pastille)
  if(z.key){
    ctx.font='bold 8px monospace';
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.textAlign='left';
    ctx.fillText('['+z.key+']', z.x+4, z.y+10);
  }
  // Label action (bas du bouton)
  if(lbl){
    ctx.font='bold 8px monospace';
    ctx.fillStyle='#fff';
    ctx.textAlign='center';
    ctx.fillText(lbl, z.x+z.w/2, z.y+z.h-5);
  }
  ctx.shadowBlur=0;
}

function drawVirtualButtons(){
  if(isMobile&&mobileMode==='zones'){
    _drawMobileZonesUI();
  } else {
    for(const [k,z] of Object.entries(BTN_ZONES)){

  }
}

function _drawMobileZonesUI(){
  const BASE = 0.22;   // alpha fond bouton
  const ICON = 0.90;   // alpha icône/texte
  const PRES = 0.48;   // alpha fond quand pressé
  const RX   = MZ.R_START + 4;
  const RW   = W - MZ.R_START - 8;
  const atkH = MZ.ATK_SPLIT - MZ.TOP - 4;
  const jmpY = MZ.ATK_SPLIT + 4;
  const jmpH = H - jmpY - 4;
  const rx   = 18;
  ctx.save();

  // ══ ZONE GAUCHE : deux boutons séparés ══
  const LY = H - 88;
  const LH = 74;
  const halfW = Math.floor((MZ.L_END - 18) / 2);
  const LX1 = 5, LX2 = LX1 + halfW + 8;

  // Bouton ◄
  ctx.globalAlpha = CTRL.left ? PRES : BASE;
  ctx.fillStyle   = CTRL.left ? '#ff6030' : '#ddeeff';

// ═══ BOUCLE DE JEU ═══
function update(dt){
  // Tick killFlash always (freeze or not)
  if(killFlash){
    killFlash.timer -= dt*60;
    if(killFlash.timer<=0) killFlash=null;
  }
  if(G.state===ST.PLAY){
    // If frozen by kill flash → only update particles, skip game logic
    if(killFlash && killFlash.freeze){
      updateParticles(dt);
      G.frame++;
      return;
    }
    updateCam();
    updateKevin(dt);
    updateEnemies(dt);
    updateBonuses(dt);
    if(G.level===3){
      updateSmokeItems(dt);
      updateBrosseItems(dt);
    } else {
      updateCopines(dt);
      updateBaguetteItems(dt);
    }
    updateBouletteItems(dt);
    updateTokTokItems(dt);
    if(KV.bouletteT>0) KV.bouletteT-=dt;
    // Update kvBoulettes
    for(let i=kvBoulettes.length-1;i>=0;i--){
      const b=kvBoulettes[i];
      b.x+=b.vx*dt*60; b.y+=b.vy*dt*60; b.life-=dt*60;
      if(b.life<=0||b.x<cam.x-50||b.x>cam.x+W+50){ kvBoulettes.splice(i,1); continue; }
      // Hit enemies
      let hitE=false;
      for(const e of enemies){
        if(e.state==='dead'||!e.on) continue;
        if(b.x>e.x+2&&b.x<e.x+e.w-2&&b.y>e.y+2&&b.y<e.y+e.h-2){
          hitEnemy(e); spawnFT('📄 BOULETTE !',e.x+e.w/2,e.y-20,'#ffffff',true);
          kvBoulettes.splice(i,1); hitE=true; break;
        }
      }
    }
    updateBlockers(dt);
    updateParticles(dt);
    updateBG(Math.abs(KV.vx)*.6+.5);
    if(KV.action!=='dead') G.maxX=Math.max(G.maxX,KV.x);
    G.score = G.scoreBonus + G.killScore + ~~(G.maxX/8);
    if(KV.x>=4050) winGame();
    G.frame++;
  } else if(G.state===ST.CLASSROOM){
    cam.x=0;
    updateClassroom(dt);
    G.frame++;
  } else if(G.state===ST.L2END){
    G.frame++;
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  switch(G.state){
    case ST.MENU:      drawMenu(); break;
    case ST.INTRO:     drawIntro(); break;
    case ST.CLASSROOM: drawClassroom(); break;
    case ST.CTRANSIT:  drawTransition(); break;
    case ST.L2END:     drawL2End(); break;
    case ST.PLAY:
    case ST.PAUSE:
      if(G.level===3) drawBG_L3(); else drawBG();
      drawBlockers();
      if(G.level===3){
        drawSmokeItems();
        drawBrosseItems();
      } else {
        drawBaguetteItems();
      }
      drawBouletteItems();
      drawTokTokItems();
      for(const e of enemies) drawEnemy(e);
      drawBonuses();
      if(G.level!==3) drawCopines();
      // Projectiles (coords monde → screen via wx)
      for(const p of projectiles){
        if(p.mop) drawMop(~~wx(p.x),~~p.y,p.angle||0);
        else drawEquation(~~wx(p.x),~~p.y,p.formula,p.col);
      }
      drawKvBoulettes();
      drawKevin(~~wx(KV.x),~~KV.y);
      // TokTok golden glow
      if(KV.tokTok>0){
        const alpha=Math.sin(Date.now()*.01)*.3+.5;
        const sx=~~wx(KV.x+16), sy=~~KV.y;
        ctx.globalAlpha=alpha*.7;
        ctx.shadowColor='#ffcc00'; ctx.shadowBlur=20;
        ctx.font='20px monospace'; ctx.textAlign='center';
        ctx.fillText('📱',sx,sy-50);
        ctx.shadowBlur=0; ctx.globalAlpha=1;
        // Aura dorée autour de Kevin
        ctx.globalAlpha=alpha*.35;
        ctx.fillStyle='#ffcc00';
        ctx.beginPath(); ctx.ellipse(sx,sy+20,28,38,0,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;
      }
      // Overlay TokTok invincibilité
      drawTokTokOverlay();
      // Effet défoncé (overlay violet + texte)
      if(KV.defonce>0){
        const da=Math.min(0.38,KV.defonce*.12)*(Math.sin(Date.now()*.012)*.3+.7);
        ctx.fillStyle=`rgba(90,0,170,${da})`; ctx.fillRect(0,0,W,H);
        ctx.save(); ctx.globalAlpha=Math.min(1,KV.defonce*.45);
        ctx.font='bold 18px monospace'; ctx.textAlign='center';
        ctx.strokeStyle=C.BLACK; ctx.lineWidth=3;
        ctx.strokeText('DÉFONCÉ... 🌿',W/2,H/2);
        ctx.fillStyle='#a060ff'; ctx.fillText('DÉFONCÉ... 🌿',W/2,H/2);
        ctx.restore();
      }
      drawParticles();
      drawHUD();
      drawKillFlash();
      if(G.state===ST.PAUSE) drawPause();
      break;
    case ST.OVER:  drawGameOver(); break;
    case ST.WIN:   drawWin(); break;
  }
}

let lastTS=0;
function loop(ts){
  // Premier frame : lastTS=0 → dt serait énorme → Kevin tombe hors sol
  if(lastTS===0) lastTS=ts-16;
  const dt=Math.min((ts-lastTS)/1000,.033); // max 33ms = 30fps min
  lastTS=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function startGame(){ // depuis le menu → intro story — reset complet
  G.state=ST.INTRO; stopMusic();
  G.score=0; G.killScore=0; G.maxX=0; G.frame=0; G.killer=null;
  G.level=1; G.scoreBonus=0; G.levelScore=0;
}
function startClassroom(){
  G.state=ST.CLASSROOM; G.level=1;
  G.score=0; G.killScore=0; G.maxX=0; G.frame=0; G.killer=null;
  G.scoreBonus=0; G.levelScore=0;
  initClassroom();
  stopMusic();
  startClassroomMusic();
}
function startCorridor(){
  G.state=ST.PLAY; G.level=2;
  G.scoreBonus=G.score; G.killScore=0; G.maxX=0; G.frame=0; G.killer=null;
  currentPlats=PLATS; // reset plateformes niv2
  resetKevin(); cam.x=0; cam.tx=0;
  initLevel();
  PTPOOL.forEach(p=>p.on=false); FTPOOL.forEach(f=>f.on=false);
  startMusic();
}
function startLevel3(){
  G.state=ST.PLAY; G.level=3;
  G.scoreBonus=G.score; G.killScore=0; G.maxX=0; G.frame=0; G.killer=null;
  resetKevin(); cam.x=0; cam.tx=0;
  initLevel3();
  PTPOOL.forEach(p=>p.on=false); FTPOOL.forEach(f=>f.on=false);
  startMusic();
}
function restartCurrentLevel(){
  if(G.level===1) startClassroom();
  else if(G.level===3) startLevel3();
  else startCorridor();
}
function endGame(){
  G.state=ST.OVER;
  stopMusic();
  if(G.score>G.best){ G.best=G.score; localStorage.setItem('fs_hs',G.best); }
}
function winGame(){
  if(G.level===2){
    G.levelScore = G.score - G.scoreBonus; // score N2 pour l'affichage
    G.state=ST.L2END; G.transitStart=Date.now();
    stopMusic(); sfx.bell();
    setTimeout(()=>{ if(G.state===ST.L2END) startLevel3(); }, 5500);
  } else {
    G.state=ST.WIN;
    stopMusic(); sfx.win();
    if(G.score>G.best){ G.best=G.score; localStorage.setItem('fs_hs',G.best); }
  }
}
function goMenu(){
  G.state=ST.MENU; stopMusic(); stopClassroomMusic();
  window.speechSynthesis&&window.speechSynthesis.cancel();
}

  const gx=(e.clientX-rect.left)*sc, gy=(e.clientY-rect.top)*sc;
  if(G.state===ST.MENU){ startGame(); return; }
  if(G.state===ST.INTRO){ startClassroom(); return; }
  if(G.state===ST.L2END){ startLevel3(); return; }
  if(G.state===ST.OVER){
    if(gy>H/2+70&&gy<H/2+132) restartCurrentLevel();
    else if(gy>H/2+130) goMenu();
    return;
  }
  if(G.state===ST.WIN){
    if(gy>H/2+55&&gy<H/2+116) startCorridor();
    else if(gy>H/2+115) goMenu();
    return;
  }
  if(G.state===ST.PAUSE){
    if(gy>H/2-15&&gy<H/2+45) togglePause();
    else if(gy>H/2+50) goMenu();
    return;
  }
  if(G.state===ST.PLAY){
    if(gx>W-42&&gy<42) togglePause();
    if(gx<42&&gy<42) toggleSound();
  }
});

// ═══ INIT ═══
resize();
requestAnimationFrame(loop);

// ── Bouton plein écran ──
(function(){
  const btn=document.getElementById('fs-btn');
  if(!btn) return;
  btn.addEventListener('click',()=>{
    if(!document.fullscreenElement){
      // Demande le plein écran
      (document.documentElement.requestFullscreen||
       document.documentElement.webkitRequestFullscreen||
       document.documentElement.mozRequestFullScreen
      ).call(document.documentElement).catch(()=>{});
      // Tente de verrouiller l'orientation paysage sur mobile
      try{ screen.orientation?.lock('landscape'); }catch(e){}
    } else {
      (document.exitFullscreen||document.webkitExitFullscreen||
       document.mozCancelFullScreen).call(document)();
    }
  });
  // Mise à jour du label selon l'état
  document.addEventListener('fullscreenchange',()=>{
    btn.textContent=document.fullscreenElement?'✕ QUITTER PLEIN ÉCRAN':'⛶ PLEIN ÉCRAN';
  });
})();
</script>
